<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Black World Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    #map {
      height: 100vh;
      width: 100vw;
      filter: brightness(0.28) grayscale(1);
    }

    .panel {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 18px;
      z-index: 9999;
      background: rgba(0,0,0,0.88);
      color: white;
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.55);
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .status {
      opacity: 0.85;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      flex: 1;
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 18px;
    }

    .stat span {
      font-size: 12px;
      opacity: 0.75;
    }

    .buttons {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      border: none;
      border-radius: 16px;
      padding: 14px;
      font-size: 16px;
      font-weight: 800;
    }

    #startBtn {
      background: #00ff99;
      color: #00170e;
    }

   
