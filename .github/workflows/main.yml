name: Deploy iPhone PWA

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PWA files
        run: |
          mkdir -p pwa

          cat > pwa/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <meta name="apple-mobile-web-app-capable" content="yes" />
            <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
            <meta name="theme-color" content="#000000" />
            <title>Black World Map</title>
            <link rel="manifest" href="manifest.json" />
            <link rel="stylesheet" href="style.css" />
            <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
          </head>
          <body>
            <div id="map"></div>

            <div class="panel">
              <h1>Black World Map</h1>
              <p id="status">Ready</p>
              <p id="distance">0.00 km</p>
              <button id="startBtn">Start Trip</button>
              <button id="stopBtn" disabled>Stop</button>
            </div>

            <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
            <script src="app.js"></script>
          </body>
          </html>
          EOF

          cat > pwa/style.css <<'EOF'
          html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          }

          #map {
            width: 100%;
            height: 100vh;
            filter: brightness(0.35) grayscale(1);
          }

          .panel {
            position: fixed;
            left: 14px;
            right: 14px;
            bottom: 20px;
            padding: 16px;
            background: rgba(0,0,0,0.82);
            color: white;
            border-radius: 18px;
            z-index: 9999;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
          }

          h1 {
            margin: 0 0 6px;
            font-size: 20px;
          }

          p {
            margin: 4px 0;
            opacity: 0.9;
          }

          button {
            margin-top: 10px;
            width: 48%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
          }

          #startBtn {
            background: #00ff99;
            color: #001a10;
          }

          #stopBtn {
            background: #333;
            color: white;
          }

          button:disabled {
            opacity: 0.4;
          }
          EOF

          cat > pwa/app.js <<'EOF'
          let map = L.map('map').setView([56.9496, 24.1052], 13);

          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
          }).addTo(map);

          let watchId = null;
          let points = [];
          let distance = 0;
          let polyline = L.polyline([], { color: '#00ff99', weight: 5 }).addTo(map);
          let openedLayer = L.layerGroup().addTo(map);

          const startBtn = document.getElementById('startBtn');
          const stopBtn = document.getElementById('stopBtn');
          const statusEl = document.getElementById('status');
          const distanceEl = document.getElementById('distance');

          function toRad(value) {
            return value * Math.PI / 180;
          }

          function distanceMeters(a, b) {
            const R = 6371000;
            const dLat = toRad(b.lat - a.lat);
            const dLng = toRad(b.lng - a.lng);
            const lat1 = toRad(a.lat);
            const lat2 = toRad(b.lat);

            const x =
              Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.sin(dLng / 2) * Math.sin(dLng / 2) *
              Math.cos(lat1) * Math.cos(lat2);

            return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
          }

          function saveTrack() {
            localStorage.setItem('black_world_map_points', JSON.stringify(points));
            localStorage.setItem('black_world_map_distance', String(distance));
          }

          function loadTrack() {
            const saved = localStorage.getItem('black_world_map_points');
            const savedDistance = localStorage.getItem('black_world_map_distance');

            if (saved) {
              points = JSON.parse(saved);
              polyline.setLatLngs(points);
              points.forEach(p => {
                L.circle(p, {
                  radius: 80,
                  color: '#ffffff',
                  fillColor: '#ffffff',
                  fillOpacity: 0.22,
                  weight: 1
                }).addTo(openedLayer);
              });

              if (points.length > 0) {
                map.setView(points[points.length - 1], 15);
              }
            }

            if (savedDistance) {
              distance = Number(savedDistance);
              distanceEl.textContent = (distance / 1000).toFixed(2) + ' km';
            }
          }

          function onPosition(pos) {
            const point = {
              lat: pos.coords.latitude,
              lng: pos.coords.longitude
            };

            if (points.length > 0) {
              const last = points[points.length - 1];
              const d = distanceMeters(last, point);

              if (d < 5 || d > 1000) return;

              distance += d;
            }

            points.push(point);
            polyline.addLatLng(point);

            L.circle(point, {
              radius: 80,
              color: '#ffffff',
              fillColor: '#ffffff',
              fillOpacity: 0.22,
              weight: 1
            }).addTo(openedLayer);

            map.setView(point, 16);
            distanceEl.textContent = (distance / 1000).toFixed(2) + ' km';
            statusEl.textContent = 'Tracking...';

            saveTrack();
          }

          function onError(error) {
            statusEl.textContent = 'GPS error: ' + error.message;
          }

          startBtn.onclick = () => {
            if (!navigator.geolocation) {
              statusEl.textContent = 'GPS not supported';
              return;
            }

            watchId = navigator.geolocation.watchPosition(
              onPosition,
              onError,
              {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 15000
              }
            );

            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusEl.textContent = 'Waiting for GPS...';
          };

          stopBtn.onclick = () => {
            if (watchId !== null) {
              navigator.geolocation.clearWatch(watchId);
              watchId = null;
            }

            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusEl.textContent = 'Stopped';
          };

          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
          }

          loadTrack();
          EOF

          cat > pwa/manifest.json <<'EOF'
          {
            "name": "Black World Map",
            "short_name": "Black Map",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#000000",
            "theme_color": "#000000",
            "icons": []
          }
          EOF

          cat > pwa/sw.js <<'EOF'
          self.addEventListener('install', event => {
            self.skipWaiting();
          });

          self.addEventListener('fetch', event => {});
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pwa
