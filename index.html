<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WanderGlow V26</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:sans-serif;
}

#map{
  height:100%;
  filter:grayscale(1) brightness(.6);
}

#fog{
  position:absolute;
  inset:0;
  pointer-events:none;
}

/* 🔵 PLAYER */
.player{
  width:10px;
  height:10px;
  background:#00ffb3;
  border-radius:50%;
  box-shadow:0 0 10px #00ffb3;
}

/* UI */
.panel{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  background:#111;
  padding:10px;
  border-radius:10px;
  color:white;
}

.menu{
  position:absolute;
  top:80px;
  right:10px;
  background:#111;
  padding:10px;
  border-radius:10px;
  display:none;
}

.menu.open{display:block}

button{
  width:100%;
  margin-top:5px;
  padding:8px;
  border:0;
  background:#333;
  color:white;
  border-radius:6px;
}

button:active{
  transform:scale(.95);
}

.main{
  background:#00ffb3;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="map"></div>
<canvas id="fog"></canvas>

<div id="menu" class="menu">
  <button onclick="center()">📍 Center</button>
  <button onclick="toggleFollow()">Follow</button>
</div>

<div class="panel">
  <button id="exploreBtn" class="main" onclick="toggleExplore()">Explore</button>
  <button onclick="toggleMenu()">Menu</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map=L.map('map').setView([56.95,24.1],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let lat=0,lng=0;
let marker=null;
let follow=true;
let exploring=false;

let cells={};

let fog=document.getElementById("fog");
let ctx=fog.getContext("2d");
fog.width=innerWidth;
fog.height=innerHeight;

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

/* PLAYER */
function drawPlayer(){
  if(!marker){
    marker=L.marker([lat,lng],{
      icon:L.divIcon({html:'<div class="player"></div>'})
    }).addTo(map);
  }else{
    marker.setLatLng([lat,lng]);
  }
}

/* FOG */
function reveal(x,y,r){
  let g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,"rgba(0,0,0,1)");
  g.addColorStop(1,"rgba(0,0,0,0)");

  ctx.globalCompositeOperation="destination-out";
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";
}

function drawFog(){
  ctx.fillStyle="rgba(0,0,0,.5)";
  ctx.fillRect(0,0,fog.width,fog.height);

  Object.keys(cells).forEach(k=>{
    let p=k.split("_");
    let pt=map.latLngToContainerPoint([p[0]/1000,p[1]/1000]);
    reveal(pt.x,pt.y,80);
  });

  let pt=map.latLngToContainerPoint([lat,lng]);
  reveal(pt.x,pt.y,120);
}

/* GAME */
function toggleExplore(){
  exploring=!exploring;
}

function toggleFollow(){
  follow=!follow;
}

function center(){
  follow=true;
  map.setView([lat,lng],16);
}

/* GPS */
navigator.geolocation.watchPosition(pos=>{
  lat=pos.coords.latitude;
  lng=pos.coords.longitude;

  drawPlayer();

  if(follow){
    map.setView([lat,lng],16);
  }

  if(exploring){
    let key=Math.floor(lat*1000)+"_"+Math.floor(lng*1000);
    cells[key]=true;
  }

  ctx.clearRect(0,0,fog.width,fog.height);
  drawFog();

},()=>alert("GPS error"),{enableHighAccuracy:true});
</script>

</body>
</html>
