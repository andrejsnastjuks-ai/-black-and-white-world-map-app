<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WanderGlow V19</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  font-family:-apple-system;
}

/* MAP */
#map{
  height:100%;
  filter:grayscale(1) brightness(.3);
}

/* PLAYER */
.player{
  width:22px;
  height:22px;
  border-radius:50%;
  background:#7dffd0;
  border:3px solid #fff;
  position:relative;
  box-shadow:0 0 15px #7dffd0;
}

.player::before{
  content:"";
  width:6px;
  height:6px;
  background:#003328;
  border-radius:50%;
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}

.player::after{
  content:"";
  width:60px;
  height:60px;
  border-radius:50%;
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  background:rgba(125,255,208,.2);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(.5);opacity:.7}
  100%{transform:translate(-50%,-50%) scale(2);opacity:0}
}

/* LIGHT */
.light{
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,255,255,.2),
    rgba(125,255,208,.25),
    transparent 75%);
  pointer-events:none;
  transform:translate(-50%,-50%);
}

/* PANEL */
.panel{
  position:absolute;
  bottom:20px;
  left:10px;
  right:10px;
  padding:16px;
  border-radius:22px;
  background:rgba(30,30,30,.7);
  backdrop-filter:blur(20px);
  color:white;
}

.hidden{
  display:none;
}

.showBtn{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  color:white;
  padding:10px 16px;
  border-radius:12px;
  display:none;
}

/* BUTTON */
.btn{
  padding:12px;
  border-radius:12px;
  border:none;
  background:#333;
  color:white;
  transition:.15s;
}

.btn:active{
  transform:scale(.9);
  background:#555;
}

.main{
  background:linear-gradient(90deg,#7dffd0,#baffea);
  color:black;
  font-weight:700;
}

/* ROW */
.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.stat{
  flex:1;
  text-align:center;
  background:rgba(255,255,255,.05);
  padding:10px;
  border-radius:10px;
}

/* PROGRESS */
.progress{
  height:6px;
  background:#222;
  border-radius:6px;
  margin-top:10px;
}

.bar{
  height:100%;
  width:0%;
  background:#7dffd0;
}

/* TOAST */
.toast{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(50,50,50,.9);
  padding:10px 15px;
  border-radius:10px;
  opacity:0;
  transition:.3s;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="light" class="light"></div>
<div id="toast" class="toast"></div>

<button id="showBtn" class="showBtn" onclick="showUI()">Show UI</button>

<div id="panel" class="panel">

<div style="display:flex;justify-content:space-between;">
  <div>
    <b>WanderGlow</b><br>
    <span id="status">Ready</span>
  </div>
  <button class="btn main" onclick="toggle()">Explore</button>
</div>

<div class="row">
  <div class="stat"><div id="cells">0</div><small>Cells</small></div>
  <div class="stat"><div id="xp">0</div><small>XP</small></div>
  <div class="stat"><div id="level">1</div><small>Level</small></div>
</div>

<div class="progress"><div id="bar" class="bar"></div></div>

<div class="row">
  <button class="btn" onclick="stop()">Stop</button>
  <button class="btn main" onclick="place()">Place</button>
  <button class="btn" onclick="center()">📍</button>
  <button class="btn" onclick="hideUI()">Hide</button>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([56.95,24.1],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* STATE */
let exploring=false;
let marker=null;
let lat=0,lng=0;
let lastCell=null;

/* DATA */
let xp=Number(localStorage.xp||0);
let cells=Number(localStorage.cells||0);
let path=JSON.parse(localStorage.path||"[]");

/* LEVEL */
let level=Math.floor(xp/100)+1;

/* LINE */
let line=L.polyline(path,{color:'#7dffd0'}).addTo(map);

/* UI */
function hideUI(){
  panel.classList.add("hidden");
  showBtn.style.display="block";
}

function showUI(){
  panel.classList.remove("hidden");
  showBtn.style.display="none";
}

/* GAME */
function toggle(){
  exploring=!exploring;
  status.innerText = exploring ? "Exploring..." : "Paused";
}

function stop(){
  exploring=false;
  status.innerText="Stopped";
}

function center(){
  if(lat) map.setView([lat,lng],17);
}

function place(){
  toastMsg("⭐ Place saved");
}

/* UPDATE */
function update(){
  document.getElementById("cells").innerText=cells;
  document.getElementById("xp").innerText=xp;
  document.getElementById("level").innerText=level;

  let progress = xp % 100;
  document.getElementById("bar").style.width = progress+"%";

  localStorage.xp=xp;
  localStorage.cells=cells;
}

/* TOAST */
function toastMsg(t){
  toast.innerText=t;
  toast.style.opacity=1;
  setTimeout(()=>toast.style.opacity=0,2000);
}

/* GPS */
navigator.geolocation.watchPosition(pos=>{

  lat=pos.coords.latitude;
  lng=pos.coords.longitude;

  if(!marker){
    marker=L.marker([lat,lng],{
      icon:L.divIcon({
        html:'<div class="player"></div>',
        className:'',
        iconSize:[24,24]
      })
    }).addTo(map);
  }else{
    marker.setLatLng([lat,lng]);
  }

  map.setView([lat,lng],16);

  /* LIGHT */
  let p=map.latLngToContainerPoint([lat,lng]);
  light.style.left=p.x+"px";
  light.style.top=p.y+"px";

  /* PATH */
  path.push([lat,lng]);
  if(path.length>600) path.shift();
  line.setLatLngs(path);
  localStorage.path=JSON.stringify(path);

  /* GAME */
  if(exploring){
    let cell=Math.floor(lat*1000)+"_"+Math.floor(lng*1000);

    if(cell!==lastCell){
      lastCell=cell;
      xp+=10;
      cells++;
      level=Math.floor(xp/100)+1;
      toastMsg("✨ +10 XP");
      update();
    }
  }

},()=>alert("GPS error"),{enableHighAccuracy:true});

update();

</script>

</body>
</html>
