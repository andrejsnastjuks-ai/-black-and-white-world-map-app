<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>WanderGlow</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
  --glass:rgba(255,255,255,.055);
  --glassStrong:rgba(255,255,255,.09);
  --line:rgba(255,255,255,.16);
  --mint:#7dffd0;
  --mint2:#dffff3;
  --blue:#8cc9ff;
  --red:#9b2929;
  --muted:rgba(247,251,255,.64);
}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#010305;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

#map{
  height:100vh;
  width:100vw;
  filter:grayscale(1) brightness(.25) contrast(.9) saturate(.18);
}

.glass{
  background:linear-gradient(180deg,rgba(255,255,255,.085),rgba(255,255,255,.045));
  backdrop-filter:blur(34px) saturate(1.45);
  -webkit-backdrop-filter:blur(34px) saturate(1.45);
  border:1px solid var(--line);
  box-shadow:0 22px 55px rgba(0,0,0,.34);
}

button{
  border:0;
  font-weight:800;
  font-size:15px;
}

.panel{
  position:fixed;
  left:14px;
  right:14px;
  bottom:18px;
  z-index:9999;
  color:white;
  border-radius:34px;
  padding:16px;
}

.top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}

.brand b{
  font-size:23px;
}

.brand small{
  color:var(--muted);
  font-size:14px;
}

.explore{
  min-width:104px;
  padding:14px 18px;
  border-radius:22px;
  background:linear-gradient(135deg,var(--mint),var(--mint2));
  color:#031c13;
  box-shadow:0 0 24px rgba(125,255,208,.28);
}

.stats{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.stat{
  flex:1;
  background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  padding:11px 8px;
  text-align:center;
}

.stat b{
  font-size:20px;
}

.stat span{
  display:block;
  margin-top:2px;
  color:var(--muted);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.7px;
}

.levelBox{
  margin-top:12px;
  background:rgba(255,255,255,.07);
  border-radius:20px;
  padding:11px 12px;
}

.levelTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;
  font-size:14px;
}

.progressBar{
  height:8px;
  margin-top:9px;
  border-radius:99px;
  background:rgba(255,255,255,.095);
  overflow:hidden;
}

.progressFill{
  height:100%;
  width:0%;
  border-radius:99px;
  background:linear-gradient(90deg,var(--mint),var(--blue));
  box-shadow:0 0 18px rgba(125,255,208,.55);
}

.actions{
  display:flex;
  gap:9px;
  margin-top:13px;
}

.action{
  flex:1;
  padding:13px;
  border-radius:20px;
  color:white;
  background:rgba(255,255,255,.09);
}

.action.blue{
  background:linear-gradient(135deg,#4d96ff,#9bd8ff);
}

.capsule{
  position:fixed;
  right:16px;
  top:62px;
  z-index:9999;
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:8px;
  border-radius:34px;
}

.circle{
  width:50px;
  height:50px;
  border-radius:50%;
  color:white;
  font-size:20px;
  background:rgba(255,255,255,.08);
}

.modal{
  display:none;
  position:fixed;
  left:12px;
  right:12px;
  bottom:18px;
  z-index:10000;
  color:white;
  padding:20px;
  border-radius:34px;
  max-height:72vh;
  overflow:auto;
}

.handle{
  width:48px;
  height:5px;
  border-radius:99px;
  background:rgba(255,255,255,.32);
  margin:0 auto 18px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.menuBtn{
  min-height:86px;
  border-radius:24px;
  background:rgba(255,255,255,.085);
  color:white;
  text-align:left;
  padding:16px;
}

.menuBtn strong{
  display:block;
  font-size:16px;
  margin-top:6px;
}

.menuBtn small{
  color:var(--muted);
}

.item{
  background:rgba(255,255,255,.085);
  border-radius:22px;
  padding:14px;
  margin-top:10px;
}

.red{
  background:rgba(155,41,41,.82);
  color:white;
}

.user-dot{
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--mint);
  border:3px solid white;
  box-shadow:0 0 0 9px rgba(125,255,208,.18),0 0 26px rgba(125,255,208,.95);
  animation:pulse 1.8s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 5px rgba(125,255,208,.28),0 0 24px rgba(125,255,208,.95)}
  70%{box-shadow:0 0 0 19px rgba(125,255,208,0),0 0 24px rgba(125,255,208,.95)}
  100%{box-shadow:0 0 0 5px rgba(125,255,208,0),0 0 24px rgba(125,255,208,.95)}
}

.unlock-flash{
  position:fixed;
  width:120px;
  height:120px;
  border-radius:50%;
  pointer-events:none;
  z-index:9998;
  background:radial-gradient(circle,rgba(125,255,208,.55),rgba(125,255,208,.18),rgba(125,255,208,0));
  transform:translate(-50%,-50%) scale(.2);
  animation:unlock .9s ease-out forwards;
}

@keyframes unlock{
  0%{opacity:1;transform:translate(-50%,-50%) scale(.2)}
  80%{opacity:.75;transform:translate(-50%,-50%) scale(1.8)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(2.2)}
}

.toast{
  position:fixed;
  left:18px;
  right:18px;
  top:58px;
  z-index:10001;
  color:white;
  padding:14px 16px;
  border-radius:24px;
  display:none;
  font-weight:800;
}

input,textarea,select{
  width:100%;
  box-sizing:border-box;
  padding:14px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.08);
  color:white;
  font-size:16px;
}

.leaflet-control-attribution{
  font-size:10px;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="toast" class="toast glass"></div>

<div class="capsule glass">
  <button class="circle" onclick="centerMe()">📍</button>
  <button class="circle" onclick="openPlaceEditor()">⭐</button>
  <button class="circle" onclick="openMenu()">☰</button>
</div>

<div class="panel glass">
  <div class="top">
    <div class="brand">
      <b>WanderGlow</b><br>
      <small id="status">Ready to explore</small>
    </div>
    <button class="explore" onclick="start()">Explore</button>
  </div>

  <div class="stats">
    <div class="stat"><b id="km">0.00</b><span>km</span></div>
    <div class="stat"><b id="cells">0</b><span>cells</span></div>
    <div class="stat"><b id="progress">0%</b><span>city</span></div>
  </div>

  <div class="levelBox">
    <div class="levelTop">
      <b id="levelName">Explorer I</b>
      <span id="levelNeed">0 / 10 cells</span>
    </div>
    <div class="progressBar"><div id="progressFill" class="progressFill"></div></div>
  </div>

  <div class="actions">
    <button class="action" onclick="stop()">Stop</button>
    <button class="action blue" onclick="openPlaceEditor()">Place</button>
    <button class="action" onclick="openMenu()">Menu</button>
  </div>
</div>

<div id="menu" class="modal glass">
  <div class="handle" onclick="closeMenu()"></div>
  <h2>WanderGlow</h2>
  <p style="color:var(--muted)">Открывай город шаг за шагом. Чем больше клеток открыто — тем выше твой уровень.</p>

  <div class="grid">
    <button class="menuBtn" onclick="centerMe()">📍<strong>My location</strong><small>Вернуться к себе</small></button>
    <button class="menuBtn" onclick="showPlaces()">⭐<strong>My places</strong><small>Сохранённые места</small></button>
    <button class="menuBtn" onclick="exportData()">⬇️<strong>Backup</strong><small>Сохранить данные</small></button>
    <button class="menuBtn" onclick="openImport()">⬆️<strong>Import</strong><small>Восстановить</small></button>
  </div>

  <br>
  <button class="red" style="width:100%;padding:14px;border-radius:22px" onclick="deleteAll()">Delete all data</button>
  <button class="action" style="width:100%;margin-top:10px" onclick="closeMenu()">Close</button>

  <div id="list"></div>
</div>

<div id="placeModal" class="modal glass">
  <div class="handle" onclick="closePlaceEditor()"></div>
  <h2>Save place</h2>

  <input id="placeName" placeholder="Название места">

  <br><br>

  <select id="placeCategory">
    <option value="⭐">⭐ Избранное</option>
    <option value="🏨">🏨 Отель</option>
    <option value="🍽️">🍽️ Еда</option>
    <option value="📸">📸 Фото</option>
    <option value="🌳">🌳 Природа</option>
    <option value="📍">📍 Другое</option>
  </select>

  <br><br>

  <button class="action blue" style="width:100%" onclick="savePlaceFromEditor()">Save place</button>
  <button class="action" style="width:100%;margin-top:10px" onclick="closePlaceEditor()">Close</button>
</div>

<div id="importModal" class="modal glass">
  <div class="handle" onclick="closeImport()"></div>
  <h2>Import data</h2>

  <textarea id="importText" rows="8" placeholder="Paste backup JSON here"></textarea>

  <br><br>

  <button class="action blue" style="width:100%" onclick="importData()">Import</button>
  <button class="action" style="width:100%;margin-top:10px" onclick="closeImport()">Close</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map('map',{attributionControl:true}).setView([56.9496,24.1052],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19,
  attribution:'© OpenStreetMap contributors'
}).addTo(map);

let watch=null,current=null,last=null,userMarker=null;
let follow=true;
let total=Number(localStorage.wg_total||0);
let opened=JSON.parse(localStorage.wg_opened||'{}');
let places=JSON.parse(localStorage.wg_places||'[]');

map.on('dragstart',()=>{follow=false;status.innerText='Free map'});
map.on('zoomstart',()=>{follow=false});

function gridKey(lat,lng){
  const size=0.00025;
  return Math.floor(lat/size)+'_'+Math.floor(lng/size);
}

function save(){
  localStorage.wg_total=total;
  localStorage.wg_opened=JSON.stringify(opened);
  localStorage.wg_places=JSON.stringify(places);
}

function drawCell(key){
  const size=0.00025;
  const parts=key.split('_');
  const lat=Number(parts[0])*size;
  const lng=Number(parts[1])*size;

  L.rectangle([[lat,lng],[lat+size,lng+size]],{
    stroke:false,
    fillColor:'#7dffd0',
    fillOpacity:.31
  }).addTo(map);
}

function drawPlace(p){
  const icon=L.divIcon({
    html:`<div style="font-size:24px">${p.cat||'⭐'}</div>`,
    className:'',
    iconSize:[28,28],
    iconAnchor:[14,14]
  });

  L.marker([p.lat,p.lng],{icon}).addTo(map)
    .bindPopup(`<b>${p.cat||'⭐'} ${p.name}</b><br><small>${p.date||''}</small>`);
}

function drawUser(p){
  const icon=L.divIcon({
    html:'<div class="user-dot"></div>',
    className:'',
    iconSize:[28,28],
    iconAnchor:[14,14]
  });

  if(userMarker){
    userMarker.setLatLng(p);
  }else{
    userMarker=L.marker(p,{icon}).addTo(map).bindPopup('Ты здесь');
  }
}

function getLevel(count){
  if(count < 10) return {name:'Explorer I', next:10};
  if(count < 25) return {name:'Explorer II', next:25};
  if(count < 50) return {name:'Traveler I', next:50};
  if(count < 100) return {name:'Traveler II', next:100};
  if(count < 200) return {name:'City Seeker', next:200};
  if(count < 400) return {name:'World Seeker', next:400};
  return {name:'Map Master', next:count};
}

function ui(){
  const count=Object.keys(opened).length;
  km.innerText=(total/1000).toFixed(2);
  cells.innerText=count;

  const cityPct=Math.min(100,count*0.12);
  progress.innerText=cityPct.toFixed(1)+'%';

  const lvl=getLevel(count);
  levelName.innerText=lvl.name;

  const prevLevels=[0,10,25,50,100,200,400];
  let prev=0;
  for(const v of prevLevels){
    if(count>=v) prev=v;
  }

  const need=Math.max(1,lvl.next-prev);
  const done=Math.min(need,count-prev);
  const levelPct=(done/need)*100;

  levelNeed.innerText=count+' / '+lvl.next+' cells';
  progressFill.style.width=levelPct+'%';
}

function showToast(text){
  toast.innerText=text;
  toast.style.display='block';
  setTimeout(()=>toast.style.display='none',2400);
}

function unlockFlash(latlng){
  const p=map.latLngToContainerPoint(latlng);
  const el=document.createElement('div');
  el.className='unlock-flash';
  el.style.left=p.x+'px';
  el.style.top=p.y+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

Object.keys(opened).forEach(drawCell);
places.forEach(drawPlace);
ui();

function start(){
  if(!navigator.geolocation){
    status.innerText='GPS not supported';
    return;
  }

  status.innerText='Finding GPS...';

  watch=navigator.geolocation.watchPosition(pos=>{
    current=[pos.coords.latitude,pos.coords.longitude];
    drawUser(current);

    if(follow){
      map.setView(current,16);
    }

    if(last){
      const d=map.distance(last,current);
      if(d>3&&d<1000)total+=d;
    }

    last=current;

    const key=gridKey(current[0],current[1]);

    if(!opened[key]){
      opened[key]=true;
      drawCell(key);
      unlockFlash(current);

      if(navigator.vibrate)navigator.vibrate(25);

      const count=Object.keys(opened).length;
      const lvl=getLevel(count);

      showToast('✨ New area discovered · '+lvl.name);
    }

    status.innerText=follow?'Exploring':'Free map';
    save();
    ui();

  },e=>{
    status.innerText='GPS error: '+e.message;
  },{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:15000
  });
}

function stop(){
  if(watch)navigator.geolocation.clearWatch(watch);
  watch=null;
  status.innerText='Saved';
}

function centerMe(){
  if(current){
    follow=true;
    map.setView(current,16);
    drawUser(current);
    status.innerText='Following';
  }else{
    alert('Нажми Explore и дождись GPS');
  }
}

function openMenu(){menu.style.display='block'}
function closeMenu(){menu.style.display='none'}

function openPlaceEditor(){
  if(!current){
    alert('Нажми Explore и дождись GPS');
    return;
  }

  placeName.value='';
  placeCategory.value='⭐';
  placeModal.style.display='block';
}

function closePlaceEditor(){placeModal.style.display='none'}

function savePlaceFromEditor(){
  const name=placeName.value.trim();

  if(!name){
    alert('Введите название');
    return;
  }

  const p={
    name,
    cat:placeCategory.value,
    lat:current[0],
    lng:current[1],
    date:new Date().toLocaleDateString()
  };

  places.push(p);
  drawPlace(p);
  save();
  closePlaceEditor();
  showToast('⭐ Place saved');
}

function showPlaces(){
  list.innerHTML='<h3>My places</h3>';

  if(!places.length){
    list.innerHTML+='<div class="item">Пока нет сохранённых мест.</div>';
    return;
  }

  places.forEach((p,i)=>{
    list.innerHTML+=`
      <div class="item">
        <b>${p.cat||'⭐'} ${p.name}</b><br>
        <small>${p.date||''}</small><br><br>
        <button class="action blue" onclick="map.setView([${p.lat},${p.lng}],17);follow=false;closeMenu()">Show</button>
        <button class="red" onclick="removePlace(${i})">Delete</button>
      </div>`;
  });
}

function removePlace(i){
  if(!confirm('Удалить это место?'))return;
  places.splice(i,1);
  save();
  location.reload();
}

function exportData(){
  const data={
    total,
    opened,
    places,
    exportedAt:new Date().toISOString()
  };

  const text=JSON.stringify(data,null,2);

  navigator.clipboard.writeText(text)
    .then(()=>alert('Backup copied'))
    .catch(()=>prompt('Copy backup:',text));
}

function openImport(){importModal.style.display='block'}
function closeImport(){importModal.style.display='none'}

function importData(){
  try{
    const data=JSON.parse(importText.value);

    if(!data.opened||!data.places){
      throw new Error('Bad data');
    }

    localStorage.wg_total=Number(data.total||0);
    localStorage.wg_opened=JSON.stringify(data.opened||{});
    localStorage.wg_places=JSON.stringify(data.places||[]);

    alert('Imported. App will reload.');
    location.reload();

  }catch(e){
    alert('Import error. Проверь JSON.');
  }
}

function deleteAll(){
  const t=prompt('Для удаления всех данных напиши DELETE');

  if(t==='DELETE'){
    localStorage.clear();
    location.reload();
  }else{
    alert('Отмена');
  }
}
</script>

</body>
</html>
