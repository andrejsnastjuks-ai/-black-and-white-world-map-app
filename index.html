<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WanderGlow Travel Fog PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

#map{
  height:100%;
}

.leaflet-tile-pane{
  filter:brightness(.86) contrast(1.05) saturate(1.08);
}

#fog{
  position:absolute;
  inset:0;
  z-index:500;
  pointer-events:none;
}

.userDot{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#00ff88;
  border:4px solid white;
  box-shadow:0 0 0 12px rgba(0,255,136,.22),0 0 32px #00ff88;
}

.panel,.menu,.toast{
  background:rgba(70,70,70,.72);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  color:white;
  box-shadow:0 18px 45px rgba(0,0,0,.35);
}

.panel{
  position:absolute;
  left:14px;
  right:14px;
  bottom:18px;
  z-index:9999;
  padding:18px;
  border-radius:28px;
}

.title{
  font-size:32px;
  font-weight:900;
}

.status{
  margin-top:4px;
  color:rgba(255,255,255,.72);
  font-size:16px;
}

.row{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.stat{
  flex:1;
  text-align:center;
  padding:14px 8px;
  border-radius:20px;
  background:rgba(255,255,255,.10);
}

.stat b{
  font-size:26px;
}

.stat small{
  color:rgba(255,255,255,.65);
}

.progress{
  height:9px;
  background:rgba(255,255,255,.14);
  border-radius:99px;
  overflow:hidden;
  margin-top:12px;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00ff88,#75bbff);
}

.goal{
  margin-top:10px;
  font-size:15px;
  color:rgba(255,255,255,.75);
}

button{
  border:0;
  border-radius:18px;
  padding:14px;
  font-weight:900;
  font-size:16px;
  color:white;
  background:rgba(255,255,255,.12);
}

button:active{
  transform:scale(.94);
}

.main{
  background:linear-gradient(135deg,#00ff88,#baffdd);
  color:#052215;
}

.main.active{
  background:linear-gradient(135deg,#4d96ff,#9bd8ff);
  color:white;
}

.menu{
  display:none;
  position:absolute;
  left:14px;
  right:14px;
  bottom:18px;
  z-index:10000;
  padding:20px;
  border-radius:28px;
}

.menu.open{
  display:block;
}

.toast{
  position:absolute;
  top:22px;
  left:18px;
  right:18px;
  z-index:12000;
  padding:14px;
  border-radius:18px;
  opacity:0;
  transition:.25s;
  font-weight:800;
}

.placeDot{
  width:16px;
  height:16px;
  border-radius:50%;
  background:#ffd23f;
  border:3px solid #111;
  box-shadow:0 0 16px rgba(255,210,63,.9);
}
</style>
</head>

<body>

<div id="map"></div>
<canvas id="fog"></canvas>
<div id="toast" class="toast"></div>

<div id="menu" class="menu">
  <button onclick="centerMe()" style="width:100%">📍 My location</button>
  <button onclick="savePlace()" style="width:100%;margin-top:10px">⭐ Save place</button>
  <button onclick="toggleRoute()" style="width:100%;margin-top:10px">🗺 Route on/off</button>
  <button onclick="backup()" style="width:100%;margin-top:10px">Backup</button>
  <button onclick="importData()" style="width:100%;margin-top:10px">Import</button>
  <button onclick="resetData()" style="width:100%;margin-top:10px;background:#9e2f2f">Reset</button>
  <button onclick="toggleMenu()" style="width:100%;margin-top:10px">Close</button>
</div>

<div class="panel">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
    <div>
      <div class="title">WanderGlow</div>
      <div id="status" class="status">Waiting for GPS...</div>
    </div>
    <button id="exploreBtn" class="main" onclick="toggleExplore()">Explore</button>
  </div>

  <div class="row">
    <div class="stat"><b id="kmView">0.00</b><br><small>KM</small></div>
    <div class="stat"><b id="cellsView">0</b><br><small>Cells</small></div>
    <div class="stat"><b id="xpView">0</b><br><small>XP</small></div>
  </div>

  <div class="progress">
    <div id="bar" class="bar"></div>
  </div>
  <div id="goal" class="goal">Goal: open 10 cells</div>

  <div class="row">
    <button style="flex:1" onclick="centerMe()">📍</button>
    <button style="flex:1" onclick="toggleMenu()">Menu</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([56.95,24.1],15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19,
  attribution:"© OpenStreetMap"
}).addTo(map);

let lat=null,lng=null;
let marker=null;
let firstFix=true;
let exploring=false;
let routeVisible=true;
let lastPoint=null;

let xp=Number(localStorage.wg_rts_xp||0);
let total=Number(localStorage.wg_rts_total||0);
let cells=JSON.parse(localStorage.wg_rts_cells||"{}");
let zones=JSON.parse(localStorage.wg_rts_zones||"{}");
let path=JSON.parse(localStorage.wg_rts_path||"[]");
let places=JSON.parse(localStorage.wg_rts_places||"[]");

const fog=document.getElementById("fog");
const ctx=fog.getContext("2d");

const route=L.polyline(path,{
  color:"#00ff88",
  weight:4,
  opacity:.65
}).addTo(map);

let placeMarkers=[];

function resizeFog(){
  fog.width=window.innerWidth;
  fog.height=window.innerHeight;
  drawFog();
}

window.addEventListener("resize",resizeFog);
map.on("move zoom",drawFog);
resizeFog();

function cellKey(a,b){
  return Math.floor(a*1000)+"_"+Math.floor(b*1000);
}

function zoneKey(a,b){
  return Math.floor(a*100)+"_"+Math.floor(b*100);
}

function cellCenter(key){
  const p=key.split("_");
  return [(Number(p[0])+0.5)/1000,(Number(p[1])+0.5)/1000];
}

function level(){
  return Math.floor(xp/100)+1;
}

function save(){
  localStorage.wg_rts_xp=xp;
  localStorage.wg_rts_total=total;
  localStorage.wg_rts_cells=JSON.stringify(cells);
  localStorage.wg_rts_zones=JSON.stringify(zones);
  localStorage.wg_rts_path=JSON.stringify(path.slice(-1500));
  localStorage.wg_rts_places=JSON.stringify(places);
}

function updateUI(){
  const cellCount=Object.keys(cells).length;

  document.getElementById("xpView").innerText=xp;
  document.getElementById("cellsView").innerText=cellCount;
  document.getElementById("kmView").innerText=(total/1000).toFixed(2);

  document.getElementById("bar").style.width=(xp%100)+"%";

  if(cellCount<10){
    document.getElementById("goal").innerText="Goal: open 10 cells";
  }else if(Object.keys(zones).length<3){
    document.getElementById("goal").innerText="Goal: discover 3 zones";
  }else{
    document.getElementById("goal").innerText="Level "+level()+" · keep exploring";
  }

  save();
}

function toast(text){
  const el=document.getElementById("toast");
  el.innerText=text;
  el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,2000);
}

function drawUser(){
  const icon=L.divIcon({
    html:'<div class="userDot"></div>',
    className:'',
    iconSize:[34,34],
    iconAnchor:[17,17]
  });

  if(!marker){
    marker=L.marker([lat,lng],{
      icon,
      zIndexOffset:10000
    }).addTo(map).bindPopup("Ты здесь");
  }else{
    marker.setLatLng([lat,lng]);
  }
}

/*
  RTS / StarCraft logic:
  - весь мир почти тёмный
  - открытые клетки остаются видимыми
  - текущая зона чуть шире и ярче
  Радиус около 20–30 метров.
*/
function removeFogCircle(x,y,r,strength){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,"rgba(0,0,0,"+strength+")");
  g.addColorStop(.65,"rgba(0,0,0,"+(strength*.75)+")");
  g.addColorStop(1,"rgba(0,0,0,0)");

  ctx.globalCompositeOperation="destination-out";
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";
}

function drawFog(){
  ctx.clearRect(0,0,fog.width,fog.height);

  ctx.fillStyle="rgba(0,0,0,.90)";
  ctx.fillRect(0,0,fog.width,fog.height);

  Object.keys(cells).forEach(key=>{
    const center=cellCenter(key);
    const p=map.latLngToContainerPoint(center);

    // около 20–30 м
    removeFogCircle(p.x,p.y,45,.76);
  });

  if(lat!==null&&lng!==null){
    const p=map.latLngToContainerPoint([lat,lng]);

    // текущий обзор немного шире
    removeFogCircle(p.x,p.y,70,.95);
  }
}

function toggleExplore(){
  exploring=!exploring;
  document.getElementById("exploreBtn").classList.toggle("active",exploring);
  document.getElementById("exploreBtn").innerText=exploring?"Exploring":"Explore";
  document.getElementById("status").innerText=exploring?"Exploring...":"Paused";
}

function centerMe(){
  if(lat===null||lng===null){
    toast("GPS ещё ищет локацию");
    return;
  }
  map.setView([lat,lng],17);
  document.getElementById("status").innerText="Centered";
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function toggleRoute(){
  routeVisible=!routeVisible;

  if(routeVisible){
    map.addLayer(route);
    toast("Route shown");
  }else{
    map.removeLayer(route);
    toast("Route hidden");
  }
}

function savePlace(){
  if(lat===null||lng===null){
    toast("GPS ещё ищет локацию");
    return;
  }

  const name=prompt("Название места")||"Place";
  places.push({
    name,
    lat,
    lng,
    date:new Date().toLocaleDateString()
  });

  drawPlaces();
  save();
  toast("⭐ Place saved");
}

function drawPlaces(){
  placeMarkers.forEach(m=>map.removeLayer(m));
  placeMarkers=[];

  places.forEach((p,i)=>{
    const icon=L.divIcon({
      html:'<div class="placeDot"></div>',
      className:"",
      iconSize:[24,24],
      iconAnchor:[12,12]
    });

    const m=L.marker([p.lat,p.lng],{icon})
      .addTo(map)
      .bindPopup("<b>"+p.name+"</b><br><small>"+(p.date||"")+"</small>");

    placeMarkers.push(m);
  });
}

function backup(){
  const data={xp,total,cells,zones,path,places,exportedAt:new Date().toISOString()};
  const text=JSON.stringify(data,null,2);

  navigator.clipboard.writeText(text)
    .then(()=>toast("Backup copied"))
    .catch(()=>prompt("Copy backup:",text));
}

function importData(){
  const text=prompt("Paste backup JSON");
  if(!text)return;

  try{
    const d=JSON.parse(text);
    xp=Number(d.xp||0);
    total=Number(d.total||0);
    cells=d.cells||{};
    zones=d.zones||{};
    path=d.path||[];
    places=d.places||[];

    route.setLatLngs(path);
    drawPlaces();
    updateUI();
    drawFog();

    toast("Import done");
  }catch(e){
    toast("Import error");
  }
}

function resetData(){
  if(prompt("Для удаления напиши DELETE")!=="DELETE"){
    toast("Cancelled");
    return;
  }

  localStorage.removeItem("wg_rts_xp");
  localStorage.removeItem("wg_rts_total");
  localStorage.removeItem("wg_rts_cells");
  localStorage.removeItem("wg_rts_zones");
  localStorage.removeItem("wg_rts_path");
  localStorage.removeItem("wg_rts_places");

  location.reload();
}

navigator.geolocation.watchPosition(pos=>{
  lat=pos.coords.latitude;
  lng=pos.coords.longitude;

  drawUser();

  if(lastPoint){
    const distance=map.distance(lastPoint,[lat,lng]);
    if(distance>2&&distance<1000){
      total+=distance;
    }
  }

  lastPoint=[lat,lng];

  if(firstFix){
    map.setView([lat,lng],17);
    firstFix=false;
  }

  path.push([lat,lng]);
  if(path.length>1500)path.shift();
  route.setLatLngs(path);

  document.getElementById("status").innerText=exploring?"Exploring...":"GPS ready";

  if(exploring){
    const cKey=cellKey(lat,lng);
    const zKey=zoneKey(lat,lng);

    if(!cells[cKey]){
      cells[cKey]=true;
      xp+=10;
      toast("+10 XP · новая зона открыта");
    }

    if(!zones[zKey]){
      zones[zKey]=true;
      xp+=50;
      toast("🌍 New travel zone +50 XP");
    }
  }

  updateUI();
  drawFog();

},()=>{
  document.getElementById("status").innerText="GPS error";
  toast("Разреши доступ к геолокации");
},{
  enableHighAccuracy:true,
  maximumAge:0,
  timeout:15000
});

drawPlaces();
updateUI();
drawFog();
</script>

</body>
</html>
