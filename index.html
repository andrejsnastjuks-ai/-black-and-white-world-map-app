<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>WanderGlow 005 ULTRA</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#map{height:100%}
.leaflet-tile-pane{filter:brightness(1.09) contrast(1.06) saturate(1.1)}
#fog{position:absolute;inset:0;z-index:500;pointer-events:none}

#accuracyCircle{position:absolute;border-radius:50%;background:rgba(0,255,136,.10);border:2px solid rgba(0,255,136,.24);transform:translate(-50%,-50%);pointer-events:none;z-index:3000;display:none}
#userDot{position:absolute;z-index:4000;width:18px;height:18px;border-radius:50%;background:#00ff88;border:4px solid #fff;box-shadow:0 0 0 12px rgba(0,255,136,.22),0 0 34px #00ff88;transform:translate(-50%,-50%);display:none}

.panel{position:absolute;left:14px;right:14px;bottom:18px;z-index:5000;padding:18px;border-radius:28px;background:rgba(62,62,62,.76);backdrop-filter:blur(24px);color:#fff}
.row{display:flex;gap:10px;margin-top:14px}
.stat{flex:1;text-align:center;background:rgba(255,255,255,.10);padding:10px;border-radius:14px}
button{border:0;border-radius:18px;padding:12px;font-weight:900;background:rgba(255,255,255,.13);color:white}
.main{background:#00ff88;color:#000}
</style>
</head>

<body>

<div id="map"></div>
<canvas id="fog"></canvas>
<div id="accuracyCircle"></div>
<div id="userDot"></div>

<div class="panel">
<div>WanderGlow ULTRA</div>
<div id="status">GPS...</div>

<div class="row">
<div class="stat"><b id="walked">0</b>Walked</div>
<div class="stat"><b id="explored">0</b>Explored</div>
<div class="stat"><b id="areas">0</b>Areas</div>
</div>

<div class="row">
<button onclick="toggleExplore()" class="main">Explore</button>
<button onclick="center()">Follow</button>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map("map").setView([56.95,24.1],15);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let lat=null,lng=null,accuracy=null;
let exploring=false;
let follow=true;
let gpsBuffer=[];
let visited=JSON.parse(localStorage.getItem("ultra_v")||"{}");
let explored=Number(localStorage.getItem("ultra_e")||0);
let walked=Number(localStorage.getItem("ultra_w")||0);

const fog=document.getElementById("fog");
const ctx=fog.getContext("2d");

function resize(){
fog.width=innerWidth;
fog.height=innerHeight;
drawFog();
}
window.addEventListener("resize",resize);
resize();

function metersToPixels(m,lat){
const zoom=map.getZoom();
const mpp=40075016.686*Math.cos(lat*Math.PI/180)/Math.pow(2,zoom+8);
return m/mpp;
}

function erase(x,y,r){
const g=ctx.createRadialGradient(x,y,0,x,y,r);
g.addColorStop(0,"rgba(0,0,0,1)");
g.addColorStop(1,"rgba(0,0,0,0)");
ctx.globalCompositeOperation="destination-out";
ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(x,y,r,0,Math.PI*2);
ctx.fill();
ctx.globalCompositeOperation="source-over";
}

function drawFog(){
ctx.clearRect(0,0,fog.width,fog.height);
ctx.fillStyle="rgba(0,0,0,.9)";
ctx.fillRect(0,0,fog.width,fog.height);

Object.keys(visited).forEach(k=>{
const [a,b]=k.split("_").map(Number);
const p=map.latLngToContainerPoint([a,b]);
erase(p.x,p.y,metersToPixels(25,a));
});

if(lat){
const p=map.latLngToContainerPoint([lat,lng]);
erase(p.x,p.y,metersToPixels(25,lat));
}
}

function updateDot(){
if(!lat)return;
const p=map.latLngToContainerPoint([lat,lng]);
const d=document.getElementById("userDot");
d.style.left=p.x+"px";
d.style.top=p.y+"px";
d.style.display="block";
}

function followMap(){
if(!follow||!lat)return;
map.panTo([lat,lng],{animate:true});
}

navigator.geolocation.watchPosition(pos=>{
const rawLat=pos.coords.latitude;
const rawLng=pos.coords.longitude;
accuracy=pos.coords.accuracy;

gpsBuffer.push({lat:rawLat,lng:rawLng});
if(gpsBuffer.length>5)gpsBuffer.shift();

let avgLat=0,avgLng=0;
gpsBuffer.forEach(p=>{avgLat+=p.lat;avgLng+=p.lng});
avgLat/=gpsBuffer.length;
avgLng/=gpsBuffer.length;

lat=lat?lat*0.7+avgLat*0.3:avgLat;
lng=lng?lng*0.7+avgLng*0.3:avgLng;

updateDot();
drawFog();
followMap();

if(exploring){
const key=lat.toFixed(5)+"_"+lng.toFixed(5);
if(!visited[key]){
visited[key]=true;
explored+=20;
localStorage.setItem("ultra_v",JSON.stringify(visited));
localStorage.setItem("ultra_e",explored);
}
}

document.getElementById("status").innerText="GPS";
document.getElementById("explored").innerText=explored;
document.getElementById("areas").innerText=Object.keys(visited).length;

},{enableHighAccuracy:true});

function toggleExplore(){
exploring=!exploring;
}

function center(){
follow=true;
map.setView([lat,lng],17);
}
</script>

</body>
</html>
