<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Black World Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
}

#map {
  height:100vh;
  width:100%;
  filter: grayscale(1) brightness(0.4);
}

#panel {
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  background:rgba(0,0,0,0.85);
  padding:15px;
  border-radius:15px;
}

button {
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h3>Black World Map</h3>
  <button onclick="start()">Start</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([56.95, 24.1], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

const path = L.polyline([], {color:'lime'}).addTo(map);

let visited = [];

function start() {
  navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const point = [lat, lng];

    map.setView(point, 16);

    // линия маршрута
    path.addLatLng(point);

    // проверка новой зоны
    let isNew = true;

    for (let p of visited) {
      const dist = map.distance(p, point);
      if (dist < 30) {
        isNew = false;
        break;
      }
    }

    if (isNew) {
      visited.push(point);

      L.circle(point, {
        radius: 40,
        color: 'white',
        fillOpacity: 0.4
      }).addTo(map);
    }

  }, err => {
    alert("GPS ошибка: " + err.message);
  }, {
    enableHighAccuracy: true
  });
}
</script>

</body>
</html>
