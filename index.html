<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WanderGlow</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;background:#071015;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#map{height:100vh}
#fog{position:fixed;inset:0;z-index:500;pointer-events:none}
.sheet{position:fixed;left:14px;right:14px;bottom:18px;z-index:9999;background:rgba(12,18,24,.58);backdrop-filter:blur(22px);color:white;border-radius:26px;padding:14px;border:1px solid rgba(255,255,255,.12)}
.top{display:flex;justify-content:space-between;align-items:center}
button{border:0;border-radius:16px;padding:13px;font-weight:800}
.green{background:#28f5a7;color:#022015}.dark{background:rgba(255,255,255,.12);color:white}
.stats{display:flex;gap:8px;margin-top:10px}.box{flex:1;background:rgba(255,255,255,.1);border-radius:14px;padding:9px;text-align:center}
.fab{position:fixed;right:16px;bottom:132px;display:flex;flex-direction:column;gap:10px;z-index:9999}
.circle{width:52px;height:52px;border-radius:50%;background:rgba(12,18,24,.65);color:white;border:1px solid rgba(255,255,255,.15)}
.modal{display:none;position:fixed;inset:0;background:rgba(9,14,20,.9);color:white;z-index:10000;padding:22px}
.leaflet-control-attribution{display:none}
</style>
</head>
<body>

<div id="map"></div>

<svg id="fog">
  <defs>
    <mask id="fogMask">
      <rect width="100%" height="100%" fill="white"/>
      <g id="holes"></g>
    </mask>
  </defs>
  <rect width="100%" height="100%" fill="rgba(25,28,30,0.78)" mask="url(#fogMask)"/>
</svg>

<div class="fab">
  <button class="circle" onclick="addPlace()">⭐</button>
  <button class="circle" onclick="openMenu()">☰</button>
</div>

<div class="sheet">
  <div class="top">
    <div>
      <b style="font-size:21px">WanderGlow</b><br>
      <small id="status">Ready to explore</small>
    </div>
    <button class="green" onclick="start()">Start</button>
  </div>

  <div class="stats">
    <div class="box"><b id="km">0.00</b><br><small>km</small></div>
    <div class="box"><b id="zones">0</b><br><small>zones</small></div>
    <div class="box"><b id="placesCount">0</b><br><small>places</small></div>
  </div>
</div>

<div id="menu" class="modal">
  <h2>WanderGlow</h2>
  <button class="dark" onclick="centerMe()">📍 My location</button>
  <button class="dark" onclick="closeMenu()">Close</button>
  <button class="dark" onclick="deleteAll()">Delete all data</button>
  <div id="list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([56.95,24.1],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

let watch=null,current=null,last=null;
let total=Number(localStorage.total||0);
let zonesData=JSON.parse(localStorage.zones||'[]');
let places=JSON.parse(localStorage.places||'[]');

function save(){
 localStorage.total=total;
 localStorage.zones=JSON.stringify(zonesData);
 localStorage.places=JSON.stringify(places);
}

function ui(){
 km.innerText=(total/1000).toFixed(2);
 zones.innerText=zonesData.length;
 placesCount.innerText=places.length;
}

function metersToPixels(latlng,meters){
 const p1=map.latLngToContainerPoint(latlng);
 const lat=latlng[0];
 const lng=latlng[1]+meters/(111320*Math.cos(lat*Math.PI/180));
 const p2=map.latLngToContainerPoint([lat,lng]);
 return Math.max(10,Math.min(70,Math.abs(p2.x-p1.x)));
}

function drawFog(){
 const holes=document.getElementById('holes');
 holes.innerHTML='';
 zonesData.forEach(z=>{
  const p=map.latLngToContainerPoint(z);
  const r=metersToPixels(z,22);
  const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
  c.setAttribute("cx",p.x);
  c.setAttribute("cy",p.y);
  c.setAttribute("r",r);
  c.setAttribute("fill","black");
  holes.appendChild(c);
 });
}

function drawPlace(p){
 L.marker([p.lat,p.lng]).addTo(map).bindPopup("⭐ "+p.name);
}

places.forEach(drawPlace);
ui();
drawFog();

map.on('move zoom resize',drawFog);

function start(){
 if(!navigator.geolocation){status.innerText="GPS not supported";return}
 status.innerText="Finding GPS...";
 watch=navigator.geolocation.watchPosition(pos=>{
  current=[pos.coords.latitude,pos.coords.longitude];
  map.setView(current,16);

  if(last){
   let d=map.distance(last,current);
   if(d>3&&d<1000) total+=d;
  }

  last=current;

  if(!zonesData.some(z=>map.distance(z,current)<20)){
   zonesData.push(current);
   drawFog();
  }

  status.innerText="Exploring...";
  save();
  ui();
 },e=>status.innerText="GPS error: "+e.message,{enableHighAccuracy:true,maximumAge:0,timeout:15000});
}

function addPlace(){
 if(!current){alert("Нажми Start и дождись GPS");return}
 let name=prompt("Название места:");
 if(!name)return;
 let p={name,lat:current[0],lng:current[1]};
 places.push(p);
 drawPlace(p);
 save();
 ui();
}

function openMenu(){menu.style.display='block'}
function closeMenu(){menu.style.display='none'}
function centerMe(){if(current)map.setView(current,16)}
function deleteAll(){
 let t=prompt("Для удаления всех данных напиши DELETE");
 if(t==="DELETE"){localStorage.clear();location.reload()}
}
</script>
</body>
</html>
