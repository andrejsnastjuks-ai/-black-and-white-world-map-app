<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Black Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; background:black; color:white; font-family:sans-serif;}
#map { height:100vh; filter: grayscale(1) brightness(0.4); }

#panel {
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  background:rgba(0,0,0,0.8);
  padding:15px;
  border-radius:15px;
}

button {
  width:100%;
  padding:15px;
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="panel">
  <h3>Black World Map</h3>
  <button onclick="start()">Start</button>
  <button onclick="openSettings()">⚙️ Settings</button>
</div>

<div id="settings" style="display:none; position:fixed; inset:0; background:black; padding:20px;">
  <h2>Settings</h2>
  <p>Удаление данных защищено</p>
  <button onclick="deleteData()" style="background:red;">Delete all</button>
  <button onclick="closeSettings()">Close</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([56.95,24.1],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let visited = JSON.parse(localStorage.getItem('zones')||'[]');

visited.forEach(p=>{
  L.circle(p,{radius:40,color:'white',fillOpacity:0.4}).addTo(map);
});

function start(){
 navigator.geolocation.watchPosition(pos=>{
   const p=[pos.coords.latitude,pos.coords.longitude];

   map.setView(p,16);

   let newZone=true;
   visited.forEach(v=>{
     if(map.distance(v,p)<30) newZone=false;
   });

   if(newZone){
     visited.push(p);
     localStorage.setItem('zones',JSON.stringify(visited));
     L.circle(p,{radius:40,color:'white',fillOpacity:0.4}).addTo(map);
   }

 });
}

function openSettings(){
 document.getElementById('settings').style.display='block';
}

function closeSettings(){
 document.getElementById('settings').style.display='none';
}

function deleteData(){
 let confirmText=prompt("Напиши DELETE");

 if(confirmText==="DELETE"){
   localStorage.clear();
   alert("Удалено");
   location.reload();
 } else {
   alert("Отмена");
 }
}
</script>

</body>
</html>
