<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WanderGlow</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
 margin:0;height:100%;
 background:#010305;
 font-family:-apple-system;
 overflow:hidden;
}

#map{
 height:100vh;
 filter:grayscale(1) brightness(.22) contrast(.85);
}

.glass{
 background:rgba(255,255,255,.07);
 backdrop-filter:blur(30px);
 border:1px solid rgba(255,255,255,.15);
}

.panel{
 position:fixed;
 left:12px;right:12px;bottom:12px;
 padding:12px;
 border-radius:28px;
 color:white;
}

.top{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.stats{
 display:flex;
 gap:6px;
 margin-top:10px;
}

.box{
 flex:1;
 background:rgba(255,255,255,.08);
 padding:8px;
 border-radius:12px;
 text-align:center;
}

button{
 border:0;
 border-radius:12px;
 padding:10px;
 font-weight:bold;
}

.start{background:#7dffd0;color:black;}
.dark{background:rgba(255,255,255,.1);color:white;}
.blue{background:#5daeff;color:white;}
.red{background:#8b1e1e;color:white;}

.fab{
 position:fixed;
 right:12px;
 top:50px;
 display:flex;
 flex-direction:column;
 gap:8px;
}

.circle{
 width:48px;height:48px;
 border-radius:50%;
 color:white;
}

.user{
 width:16px;height:16px;
 border-radius:50%;
 background:#7dffd0;
 border:3px solid white;
 box-shadow:0 0 20px #7dffd0;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="fab">
<button class="circle glass" onclick="center()">📍</button>
<button class="circle glass" onclick="addPlace()">⭐</button>
<button class="circle glass" onclick="toggleMenu()">☰</button>
</div>

<div id="panel" class="panel glass">

<div class="top">
<div>
<b>WanderGlow</b><br>
<small id="status">Ready</small>
</div>
<button class="start" onclick="start()">Explore</button>
</div>

<div class="stats">
<div class="box"><b id="km">0</b><br>km</div>
<div class="box"><b id="zones">0</b><br>zones</div>
<div class="box"><b id="percent">0%</b><br>progress</div>
</div>

<div style="display:flex;gap:6px;margin-top:8px">
<button class="dark" style="flex:1" onclick="stop()">Stop</button>
<button class="blue" style="flex:1" onclick="showPlaces()">Places</button>
<button class="dark" style="flex:1" onclick="exportData()">Backup</button>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map('map').setView([56.95,24.1],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 maxZoom:19,
 attribution:'© OpenStreetMap contributors'
}).addTo(map);

let watch=null;
let current=null;
let last=null;
let userMarker=null;
let follow=true;

let zones=JSON.parse(localStorage.zones||'[]');
let places=JSON.parse(localStorage.places||'[]');
let total=Number(localStorage.total||0);

map.on('dragstart',()=>follow=false);

function save(){
 localStorage.zones=JSON.stringify(zones);
 localStorage.places=JSON.stringify(places);
 localStorage.total=total;
}

function drawZone(p){
 L.circle(p,{
  radius:25,
  fillColor:'#7dffd0',
  fillOpacity:.3,
  stroke:false
 }).addTo(map);
}

zones.forEach(drawZone);

function drawUser(p){
 if(userMarker){
  userMarker.setLatLng(p);
 }else{
  userMarker=L.marker(p,{
   icon:L.divIcon({
    html:'<div class="user"></div>',
    className:''
   })
  }).addTo(map);
 }
}

function updateUI(){
 km.innerText=(total/1000).toFixed(2);
 zonesEl.innerText=zones.length;

 let percentVal=Math.min(100,zones.length*0.2);
 percent.innerText=percentVal.toFixed(1)+'%';
}

function start(){
 if(!navigator.geolocation){
  alert('GPS нет');
  return;
 }

 watch=navigator.geolocation.watchPosition(pos=>{
  current=[pos.coords.latitude,pos.coords.longitude];

  drawUser(current);

  if(follow){
   map.setView(current,16);
  }

  if(last){
   let d=map.distance(last,current);
   if(d>3 && d<1000) total+=d;
  }
  last=current;

  if(!zones.some(z=>map.distance(z,current)<20)){
   zones.push(current);
   drawZone(current);
  }

  status.innerText="Exploring";
  updateUI();
  save();

 },err=>{
  status.innerText="GPS error";
 },{
  enableHighAccuracy:true
 });
}

function stop(){
 if(watch){
  navigator.geolocation.clearWatch(watch);
 }
 status.innerText="Stopped";
}

function center(){
 if(current){
  follow=true;
  map.setView(current,16);
 }
}

function addPlace(){
 if(!current){
  alert("Нажми Explore");
  return;
 }
 let name=prompt("Название места:");
 if(!name)return;

 places.push({name,lat:current[0],lng:current[1]});
 save();
 alert("Сохранено");
}

function showPlaces(){
 alert("Мест сохранено: "+places.length);
}

function exportData(){
 let data=JSON.stringify({zones,places,total});
 navigator.clipboard.writeText(data);
 alert("Скопировано");
}

updateUI();
</script>

</body>
</html>
