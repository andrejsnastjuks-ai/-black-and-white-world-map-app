<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WanderGlow</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:-apple-system, sans-serif; }
#map { height:100vh; filter:grayscale(1) brightness(.5); }

/* нижняя панель */
.bar {
 position:fixed;
 bottom:20px;
 left:14px;
 right:14px;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(10px);
 color:white;
 padding:12px;
 border-radius:20px;
 display:flex;
 align-items:center;
 justify-content:space-between;
 z-index:9999;
}

/* кнопки */
.btn {
 padding:10px 14px;
 border-radius:12px;
 border:none;
 font-size:14px;
 font-weight:600;
}

.green { background:#00ff99; }
.dark { background:#222; color:white; }

/* плавающие кнопки */
.fab {
 position:fixed;
 right:20px;
 bottom:90px;
 display:flex;
 flex-direction:column;
 gap:10px;
}

.circle {
 width:50px;
 height:50px;
 border-radius:50%;
 border:none;
 font-size:18px;
}

.blue { background:#1a73e8; color:white; }
.black { background:#222; color:white; }

/* меню */
.modal {
 display:none;
 position:fixed;
 inset:0;
 background:black;
 color:white;
 padding:20px;
 z-index:10000;
}
.place {
 background:#111;
 margin:10px 0;
 padding:12px;
 border-radius:12px;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- нижняя панель -->
<div class="bar">
  <div>
    <b>WanderGlow</b><br>
    <small id="km">0.00 км</small>
  </div>
  <div>
    <button class="btn green" onclick="start()">Start</button>
    <button class="btn dark" onclick="stop()">Stop</button>
  </div>
</div>

<!-- плавающие кнопки -->
<div class="fab">
  <button class="circle blue" onclick="addPlace()">⭐</button>
  <button class="circle black" onclick="openMenu()">☰</button>
</div>

<!-- меню -->
<div id="menu" class="modal">
  <h2>WanderGlow</h2>

  <button onclick="showPlaces()">⭐ My places</button>
  <button onclick="centerMe()">📍 My location</button>
  <button onclick="deleteAll()">Delete all</button>
  <button onclick="closeMenu()">Close</button>

  <div id="list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map('map').setView([56.95,24.1],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let watch=null,current=null,last=null,total=Number(localStorage.total||0);
let places=JSON.parse(localStorage.places||'[]');
let route=JSON.parse(localStorage.route||'[]');

const path=L.polyline(route,{color:'#00ff99',weight:5}).addTo(map);

function save(){
 localStorage.total=total;
 localStorage.places=JSON.stringify(places);
 localStorage.route=JSON.stringify(route);
}

function update(){
 km.innerText=(total/1000).toFixed(2)+" км";
}

function start(){
 watch=navigator.geolocation.watchPosition(pos=>{
  current=[pos.coords.latitude,pos.coords.longitude];
  map.setView(current,16);

  route.push(current);
  path.addLatLng(current);

  if(last){
   let d=map.distance(last,current);
   if(d>3&&d<1000) total+=d;
  }

  last=current;
  save();
  update();
 });
}

function stop(){
 if(watch)navigator.geolocation.clearWatch(watch);
}

function addPlace(){
 if(!current){alert("Start first");return;}
 let name=prompt("Place name:");
 if(!name)return;

 let p={name,lat:current[0],lng:current[1]};
 places.push(p);

 L.marker([p.lat,p.lng]).addTo(map).bindPopup("⭐ "+name);

 save();
}

function openMenu(){menu.style.display='block';}
function closeMenu(){menu.style.display='none';}

function showPlaces(){
 list.innerHTML="";
 places.forEach(p=>{
  list.innerHTML+=`
   <div class="place">
    <b>${p.name}</b><br>
    <button onclick="map.setView([${p.lat},${p.lng}],17)">Go</button>
   </div>`;
 });
}

function centerMe(){
 if(current) map.setView(current,16);
}

function deleteAll(){
 let t=prompt("Type DELETE");
 if(t==="DELETE"){
  localStorage.clear();
  location.reload();
 }
}

update();
</script>

</body>
</html>
