<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WanderGlow V17</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  font-family:-apple-system;
}

#map{
  height:100%;
  filter:grayscale(1) brightness(.35);
}

/* USER MARKER */
.user{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#7dffd0;
  box-shadow:0 0 12px #7dffd0;
  position:relative;
  border:3px solid white;
}

/* точное место */
.user::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:5px;
  height:5px;
  border-radius:50%;
  background:#00251b;
  transform:translate(-50%,-50%);
  z-index:3;
}

/* пульс */
.user::after{
  content:"";
  position:absolute;
  width:44px;
  height:44px;
  border-radius:50%;
  background:rgba(125,255,208,.2);
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) scale(.5);
  animation:pulse 2s infinite;
  z-index:-1;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(.5);opacity:.7}
  100%{transform:translate(-50%,-50%) scale(2);opacity:0}
}

/* LIGHT */
.light{
  position:absolute;
  width:260px;
  height:260px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(125,255,208,.35), transparent 70%);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:500;
}

/* UI */
.panel{
  position:absolute;
  bottom:20px;
  left:10px;
  right:10px;
  padding:16px;
  border-radius:20px;
  background:rgba(30,30,30,.6);
  backdrop-filter:blur(20px);
  color:white;
  z-index:1000;
}

.btn{
  padding:12px;
  border-radius:12px;
  border:none;
  background:#333;
  color:white;
  transition:.15s;
}

.btn:active{
  transform:scale(.9);
  background:#555;
}

.main{
  background:linear-gradient(90deg,#7dffd0,#baffea);
  color:black;
  font-weight:700;
}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.stat{
  flex:1;
  text-align:center;
  background:rgba(255,255,255,.05);
  padding:10px;
  border-radius:10px;
}

.toast{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(50,50,50,.9);
  color:white;
  padding:10px 15px;
  border-radius:10px;
  opacity:0;
  transition:.3s;
  z-index:2000;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="light" class="light"></div>
<div id="toast" class="toast"></div>

<div class="panel">

  <div style="display:flex;justify-content:space-between;">
    <div>
      <b>WanderGlow</b><br>
      <span id="status">Ready</span>
    </div>
    <button class="btn main" onclick="toggle()">Explore</button>
  </div>

  <div class="row">
    <div class="stat"><div id="km">0</div><small>KM</small></div>
    <div class="stat"><div id="cells">0</div><small>Cells</small></div>
    <div class="stat"><div id="xp">0</div><small>XP</small></div>
  </div>

  <div class="row">
    <button class="btn" onclick="stop()">Stop</button>
    <button class="btn main" onclick="place()">Place</button>
    <button class="btn" onclick="center()">📍</button>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([56.95,24.1],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19,
  attribution:'© OpenStreetMap contributors'
}).addTo(map);

let exploring=false;
let marker=null;
let lat=0,lng=0;
let lastCell=null;

let cells=Number(localStorage.wg_cells||0);
let xp=Number(localStorage.wg_xp||0);

function toggle(){
  exploring=!exploring;
  status.innerText = exploring ? "Exploring..." : "Paused";
}

function stop(){
  exploring=false;
  status.innerText="Stopped";
}

function center(){
  if(lat) map.setView([lat,lng],17);
}

function place(){
  toastMsg("⭐ Place saved");
}

function toastMsg(t){
  let el=toast;
  el.innerText=t;
  el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,2000);
}

function updateUI(){
  document.getElementById("cells").innerText=cells;
  document.getElementById("xp").innerText=xp;
}

function save(){
  localStorage.wg_cells=cells;
  localStorage.wg_xp=xp;
}

updateUI();

navigator.geolocation.watchPosition(pos=>{

  lat=pos.coords.latitude;
  lng=pos.coords.longitude;

  if(!marker){
    marker=L.marker([lat,lng],{
      icon:L.divIcon({
        html:'<div class="user"></div>',
        className:'',
        iconSize:[24,24],
        iconAnchor:[12,12]
      }),
      zIndexOffset:10000
    }).addTo(map);
  }else{
    marker.setLatLng([lat,lng]);
  }

  map.setView([lat,lng],16);

  let p=map.latLngToContainerPoint([lat,lng]);
  light.style.left=p.x+"px";
  light.style.top=p.y+"px";

  if(exploring){
    let cell = Math.floor(lat*1000)+"_"+Math.floor(lng*1000);

    if(cell!==lastCell){
      lastCell=cell;
      cells++;
      xp+=10;

      save();
      toastMsg("✨ +10 XP");
      updateUI();
    }
  }

},()=>alert("GPS error"),{enableHighAccuracy:true});
</script>

</body>
</html>
