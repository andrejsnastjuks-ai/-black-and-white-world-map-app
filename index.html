<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WanderGlow FINAL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:-apple-system;
}

#map{
  height:100%;
  filter:grayscale(1) brightness(.6);
}

/* ЗЕЛЁНАЯ ТОЧКА */
.player{
  width:14px;
  height:14px;
  background:#00ff88;
  border-radius:50%;
  border:3px solid white;
  box-shadow:0 0 15px #00ff88;
}

/* ПАНЕЛЬ */
.panel{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  background:rgba(40,40,40,.85);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:14px;
  color:white;
}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:0;
  background:#333;
  color:white;
  font-weight:bold;
}

.main{
  background:#00ff88;
  color:black;
}

.stat{
  flex:1;
  text-align:center;
  background:#222;
  padding:10px;
  border-radius:12px;
}

/* МЕНЮ */
.menu{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.menu.open{display:flex;}

.box{
  background:#222;
  padding:20px;
  border-radius:20px;
  width:80%;
}

.toast{
  position:absolute;
  top:20px;
  left:10px;
  right:10px;
  background:#222;
  padding:10px;
  border-radius:10px;
  opacity:0;
  transition:.3s;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="toast" class="toast"></div>

<div id="menu" class="menu">
  <div class="box">
    <button class="btn" onclick="center()">📍 My location</button>
    <button class="btn" onclick="backup()">Backup</button>
    <button class="btn" onclick="importData()">Import</button>
    <button class="btn" onclick="reset()">Delete</button>
    <button class="btn" onclick="toggleMenu()">Close</button>
  </div>
</div>

<div class="panel">
  <div>
    <b>WanderGlow</b><br>
    <span id="status">Ready</span>
  </div>

  <div class="row">
    <div class="stat"><b id="cells">0</b><br>Cells</div>
    <div class="stat"><b id="xp">0</b><br>XP</div>
    <div class="stat"><b id="level">1</b><br>Level</div>
  </div>

  <div class="row">
    <button id="explore" class="btn main">Explore</button>
    <button class="btn" onclick="toggleMenu()">Menu</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map('map').setView([56.95,24.1],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19
}).addTo(map);

let marker;
let exploring=false;

let xp=Number(localStorage.xp||0);
let cells=JSON.parse(localStorage.cells||"{}");

function toast(t){
  let el=document.getElementById("toast");
  el.innerText=t;
  el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,2000);
}

function update(){
  document.getElementById("xp").innerText=xp;
  document.getElementById("cells").innerText=Object.keys(cells).length;
  document.getElementById("level").innerText=Math.floor(xp/100)+1;

  localStorage.xp=xp;
  localStorage.cells=JSON.stringify(cells);
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function center(){
  if(marker) map.setView(marker.getLatLng(),16);
}

function backup(){
  navigator.clipboard.writeText(JSON.stringify({xp,cells}));
  toast("Saved");
}

function importData(){
  let d=prompt("Paste backup");
  if(!d)return;
  let data=JSON.parse(d);
  xp=data.xp;
  cells=data.cells;
  update();
}

function reset(){
  if(prompt("Type DELETE")!=="DELETE")return;
  localStorage.clear();
  location.reload();
}

document.getElementById("explore").onclick=()=>{
  exploring=!exploring;
};

navigator.geolocation.watchPosition(pos=>{
  let lat=pos.coords.latitude;
  let lng=pos.coords.longitude;

  // ГАРАНТИРОВАННАЯ ТОЧКА
  if(!marker){
    marker=L.marker([lat,lng],{
      icon:L.divIcon({
        html:'<div class="player"></div>',
        className:"",
        iconSize:[20,20]
      })
    }).addTo(map);
  }else{
    marker.setLatLng([lat,lng]);
  }

  map.setView([lat,lng],16);

  if(exploring){
    let key=Math.floor(lat*1000)+"_"+Math.floor(lng*1000);

    if(!cells[key]){
      cells[key]=1;
      xp+=10;
      toast("+10 XP");
    }
  }

  update();

},err=>{
  toast("GPS error");
},{
  enableHighAccuracy:true
});

update();
</script>

</body>
</html>
