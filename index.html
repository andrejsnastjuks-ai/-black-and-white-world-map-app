<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Black World Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
#map{height:100vh;filter:grayscale(1) brightness(.45);}
.panel{position:fixed;bottom:18px;left:14px;right:14px;background:rgba(0,0,0,.9);color:white;padding:16px;border-radius:24px;z-index:9999}
h2{margin:0 0 8px}
.stats{display:flex;gap:8px;margin:10px 0}
.box{flex:1;background:#222;border-radius:14px;padding:10px;text-align:center}
.row{display:flex;gap:8px;margin-top:8px}
button{flex:1;padding:14px;border:0;border-radius:14px;font-size:15px;font-weight:700}
.green{background:#00ff99}.dark{background:#222;color:white}.blue{background:#1a73e8;color:white}.red{background:#700;color:white}
.modal{display:none;position:fixed;inset:0;background:#000;color:white;z-index:10000;padding:20px;overflow:auto}
.place{background:#151515;margin:10px 0;padding:12px;border-radius:14px}
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <h2>Black World Map</h2>
  <div id="status">Готово</div>
  <div class="stats">
    <div class="box"><b id="km">0.00</b><br>км</div>
    <div class="box"><b id="zones">0</b><br>зон</div>
    <div class="box"><b id="placesCount">0</b><br>мест</div>
  </div>
  <div class="row">
    <button class="green" onclick="start()">Start</button>
    <button class="dark" onclick="stop()">Stop</button>
  </div>
  <div class="row">
    <button class="blue" onclick="addPlace()">⭐ Place</button>
    <button class="dark" onclick="openMenu()">☰ Menu</button>
  </div>
</div>

<div id="menu" class="modal">
  <h2>Menu</h2>
  <button class="dark" onclick="showPlaces()">⭐ My places</button>
  <button class="dark" onclick="centerMe()">📍 My location</button>
  <button class="red" onclick="deleteAll()">Delete all data</button>
  <button class="dark" onclick="closeMenu()">Close</button>
  <div id="list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([56.95,24.1],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

let watch=null,current=null,last=null;
let total=Number(localStorage.total||0);
let zones=JSON.parse(localStorage.zones||'[]');
let places=JSON.parse(localStorage.places||'[]');
let route=JSON.parse(localStorage.route||'[]');

const path=L.polyline(route,{color:'#00ff99',weight:5}).addTo(map);

function save(){
 localStorage.total=total;
 localStorage.zones=JSON.stringify(zones);
 localStorage.places=JSON.stringify(places);
 localStorage.route=JSON.stringify(route);
}
function ui(){
 km.innerText=(total/1000).toFixed(2);
 document.getElementById('zones').innerText=zones.length;
 placesCount.innerText=places.length;
}
function drawZone(p){L.circle(p,{radius:45,color:'white',fillOpacity:.35}).addTo(map)}
function icon(c){return c==="hotel"?"🏨":c==="food"?"🍽️":c==="fav"?"⭐":"📍"}
function drawPlace(p){L.marker([p.lat,p.lng]).addTo(map).bindPopup(icon(p.cat)+" "+p.name)}
zones.forEach(drawZone);places.forEach(drawPlace);ui();
if(route.length)map.setView(route[route.length-1],16);

function start(){
 status.innerText="GPS работает...";
 watch=navigator.geolocation.watchPosition(pos=>{
  current=[pos.coords.latitude,pos.coords.longitude];
  map.setView(current,16);
  route.push(current); path.addLatLng(current);
  if(last){let d=map.distance(last,current); if(d>3&&d<1000)total+=d}
  last=current;
  if(!zones.some(z=>map.distance(z,current)<35)){zones.push(current);drawZone(current)}
  save();ui();
 },e=>status.innerText="GPS ошибка: "+e.message,{enableHighAccuracy:true,maximumAge:0,timeout:15000});
}
function stop(){if(watch)navigator.geolocation.clearWatch(watch);watch=null;status.innerText="Остановлено"}
function addPlace(){
 if(!current){alert("Сначала нажми Start и дождись GPS");return}
 let name=prompt("Название места:"); if(!name)return;
 let cat=prompt("Категория: fav, hotel, food, other","fav")||"other";
 let p={name,cat,lat:current[0],lng:current[1],date:new Date().toLocaleDateString()};
 places.push(p);drawPlace(p);save();ui();
}
function openMenu(){menu.style.display='block'}
function closeMenu(){menu.style.display='none'}
function centerMe(){if(current)map.setView(current,16);else alert("GPS ещё не найден")}
function showPlaces(){
 list.innerHTML="<h3>My places</h3>";
 places.forEach(p=>{
  list.innerHTML+=`<div class="place"><b>${icon(p.cat)} ${p.name}</b><br>${p.date}<br><button onclick="map.setView([${p.lat},${p.lng}],17);closeMenu()">Show</button></div>`;
 });
}
function deleteAll(){
 let t=prompt("Для полного удаления напиши DELETE");
 if(t==="DELETE"){localStorage.clear();location.reload()}else alert("Отмена");
}
</script>
</body>
</html>
