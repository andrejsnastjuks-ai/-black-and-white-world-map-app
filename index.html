<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WanderGlow</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:sans-serif;background:#000;color:white}
#map{height:100vh;filter:grayscale(1) brightness(.25)}

.panel{
position:fixed;bottom:20px;left:10px;right:10px;
padding:16px;border-radius:30px;
background:rgba(255,255,255,.07);
backdrop-filter:blur(20px);
}

button{padding:12px;border-radius:16px;border:0}

.glow{box-shadow:0 0 20px #7dffd0}

.progress{height:6px;background:#333;border-radius:10px;overflow:hidden}
.progress div{height:100%;background:#7dffd0}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<h2>WanderGlow</h2>
<div id="level">Explorer I</div>

<div class="progress"><div id="bar" style="width:0%"></div></div>

<br>

<button onclick="start()">Explore</button>
<button onclick="stop()">Stop</button>

<div id="stats"></div>
<div id="goal"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map('map').setView([56.95,24.1],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let opened=JSON.parse(localStorage.o||'{}');
let xp=Number(localStorage.xp||0);
let goal=1000;

function key(lat,lng){
return Math.floor(lat*2000)+'_'+Math.floor(lng*2000);
}

function level(){
if(xp<20)return "Explorer I";
if(xp<50)return "Explorer II";
if(xp<100)return "Traveler";
return "Master";
}

function draw(k){
let p=k.split('_');
let lat=p[0]/2000,lng=p[1]/2000;
L.rectangle([[lat,lng],[lat+.0005,lng+.0005]],{
color:'#7dffd0',fillOpacity:.4,stroke:false
}).addTo(map);
}

Object.keys(opened).forEach(draw);

function update(){
document.getElementById('stats').innerText=
"XP: "+xp+" | Cells: "+Object.keys(opened).length;

document.getElementById('level').innerText=level();

document.getElementById('bar').style.width=(xp%100)+"%";

document.getElementById('goal').innerText=
"Daily goal: "+Math.floor(xp%goal)+" / "+goal;
}

update();

let watch,last;

function start(){
watch=navigator.geolocation.watchPosition(p=>{
let lat=p.coords.latitude,lng=p.coords.longitude;
map.setView([lat,lng],16);

let k=key(lat,lng);

if(!opened[k]){
opened[k]=1;
draw(k);

xp+=1;

if(navigator.vibrate)navigator.vibrate(30);

let flash=document.createElement('div');
flash.style.position='fixed';
flash.style.width='120px';
flash.style.height='120px';
flash.style.borderRadius='50%';
flash.style.background='radial-gradient(#7dffd0,transparent)';
flash.style.left='50%';
flash.style.top='50%';
flash.style.transform='translate(-50%,-50%)';
document.body.appendChild(flash);

setTimeout(()=>flash.remove(),500);
}

localStorage.o=JSON.stringify(opened);
localStorage.xp=xp;

update();

});
}

function stop(){
navigator.geolocation.clearWatch(watch);
}
</script>

</body>
</html>
