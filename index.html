<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WanderGlow FINAL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;background:#000;font-family:sans-serif}
#map{height:100%}

#fog{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:500;
}

.userDot{
  width:14px;height:14px;border-radius:50%;
  background:#00ff88;
  border:3px solid white;
  box-shadow:0 0 20px #00ff88;
}

.panel{
  position:absolute;
  bottom:20px;left:10px;right:10px;
  background:rgba(40,40,40,.7);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:14px;
  color:white;
}

.row{display:flex;gap:8px;margin-top:10px}

.stat{
  flex:1;
  text-align:center;
  background:rgba(255,255,255,.1);
  border-radius:12px;
  padding:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,.1);
  color:white;
  font-weight:bold;
}

.main{
  background:#00ff88;
  color:black;
}
</style>
</head>

<body>

<div id="map"></div>
<canvas id="fog"></canvas>

<div class="panel">
  <div style="display:flex;justify-content:space-between">
    <div>
      <b>WanderGlow</b><br>
      <small id="status">GPS...</small>
    </div>
    <button id="exploreBtn" class="main">Explore</button>
  </div>

  <div class="row">
    <div class="stat"><b id="walked">0 m</b><br>Walked</div>
    <div class="stat"><b id="explored">0 m</b><br>Explored</div>
    <div class="stat"><b id="areas">0</b><br>Areas</div>
  </div>

  <div class="row">
    <button onclick="setMode('walk')">🚶</button>
    <button onclick="setMode('car')">🚗</button>
    <button onclick="setMode('train')">🚆</button>
    <button onclick="setMode('plane')">✈️</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map("map").setView([56.95,24.1],15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let lat,lng,marker;
let exploring=false;
let lastPoint;

let walked=0;
let explored=0;
let visited={};

const fog=document.getElementById("fog");
const ctx=fog.getContext("2d");

const modes={
  walk:{r:25,step:25},
  car:{r:80,step:80},
  train:{r:120,step:120},
  plane:{r:500,step:500}
};

let mode="walk";

function resize(){
  fog.width=window.innerWidth;
  fog.height=window.innerHeight;
}
resize();

window.addEventListener("resize", ()=>{
  resize();
  drawFog();
});

map.on("move zoom", drawFog);

function metersToPx(m){
  if(!lat) return m;
  const zoom = map.getZoom();
  const metersPerPixel =
    40075016.686 * Math.cos(lat * Math.PI/180) / Math.pow(2, zoom + 8);
  return m / metersPerPixel;
}

function key(lat,lng){
  return Math.floor(lat*3000)+"_"+Math.floor(lng*3000);
}

function drawFog(){
  ctx.clearRect(0,0,fog.width,fog.height);

  ctx.fillStyle="rgba(0,0,0,.85)";
  ctx.fillRect(0,0,fog.width,fog.height);

  Object.keys(visited).forEach(k=>{
    const [a,b]=k.split("_");
    const p=map.latLngToContainerPoint([a/3000,b/3000]);

    erase(p.x,p.y,metersToPx(30));
  });

  if(lat){
    const p=map.latLngToContainerPoint([lat,lng]);
    erase(p.x,p.y,metersToPx(modes[mode].r));
  }
}

function erase(x,y,r){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,"rgba(0,0,0,1)");
  g.addColorStop(1,"rgba(0,0,0,0)");

  ctx.globalCompositeOperation="destination-out";
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";
}

function updateUI(){
  document.getElementById("walked").innerText=Math.round(walked)+" m";
  document.getElementById("explored").innerText=Math.round(explored)+" m";
  document.getElementById("areas").innerText=Object.keys(visited).length;
}

function setMode(m){
  mode=m;
}

document.getElementById("exploreBtn").onclick=()=>{
  exploring=!exploring;
};

navigator.geolocation.watchPosition(p=>{
  lat=p.coords.latitude;
  lng=p.coords.longitude;

  if(!marker){
    marker=L.marker([lat,lng],{
      icon:L.divIcon({html:'<div class="userDot"></div>'})
    }).addTo(map);
  }else{
    marker.setLatLng([lat,lng]);
  }

  if(lastPoint){
    const d=map.distance(lastPoint,[lat,lng]);
    walked+=d;
  }

  lastPoint=[lat,lng];

  if(exploring){
    const k=key(lat,lng);
    if(!visited[k]){
      visited[k]=true;
      explored+=modes[mode].step;
    }
  }

  drawFog();
  updateUI();

},{
  enableHighAccuracy:true
});
</script>

</body>
</html>
