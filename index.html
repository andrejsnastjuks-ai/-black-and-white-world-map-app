<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WanderGlow V24</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;color:#fff;font-family:-apple-system}
#map{height:100%;filter:grayscale(1) brightness(.6) contrast(.9)}
#fog{position:absolute;inset:0;pointer-events:none}

/* PLAYER */
.player{
  width:10px;height:10px;border-radius:50%;
  background:#00ffb3;
  border:2px solid #fff;
  box-shadow:0 0 12px #00ffb3;
}

/* UI */
.panel,.menu,.toast{
  background:rgba(20,20,20,.75);
  backdrop-filter:blur(20px);
}

.panel{
  position:absolute;bottom:15px;left:10px;right:10px;
  padding:12px;border-radius:14px;
}

.menu{
  position:absolute;bottom:90px;right:10px;
  padding:10px;border-radius:12px;
  display:none;width:170px;
}
.menu.open{display:block}

.row{display:flex;gap:6px;margin-top:6px}
.stat{flex:1;text-align:center;background:#222;padding:6px;border-radius:8px;font-size:13px}

.btn{
  flex:1;padding:8px;border-radius:8px;
  background:#333;color:#fff;border:0;
  font-size:13px;
}
.btn:active{transform:scale(.9)}
.main{background:#7dffd0;color:#000;font-weight:bold}

.barWrap{height:5px;background:#222;border-radius:5px;margin-top:6px}
.bar{height:100%;width:0%;background:#7dffd0}

.toast{
  position:absolute;top:20px;left:50%;
  transform:translateX(-50%);
  padding:6px 10px;border-radius:6px;
  opacity:0;transition:.3s;
  font-size:13px;
}

.place{
  width:14px;height:14px;
  background:#ffcc00;
  border-radius:50%;
  border:2px solid #000;
}

</style>
</head>

<body>

<div id="map"></div>
<canvas id="fog"></canvas>

<div id="toast" class="toast"></div>

<div id="menu" class="menu">
  <button class="btn" onclick="center()">📍</button>
  <button class="btn" onclick="savePlace()">⭐</button>
  <button class="btn" onclick="toggleRoute()">Route</button>
  <button class="btn" onclick="backup()">Backup</button>
  <button class="btn" onclick="importData()">Import</button>
</div>

<div class="panel">

<div style="display:flex;justify-content:space-between">
  <div>
    <b>WanderGlow</b><br>
    <span id="status">Ready</span>
  </div>
  <button id="exploreBtn" class="btn main" onclick="toggle()">Explore</button>
</div>

<div class="row">
  <div class="stat"><b id="cells">0</b><br>Cells</div>
  <div class="stat"><b id="xp">0</b><br>XP</div>
  <div class="stat"><b id="level">1</b><br>Level</div>
</div>

<div class="barWrap"><div id="bar" class="bar"></div></div>

<div class="row">
  <button class="btn" onclick="stop()">Stop</button>
  <button class="btn" onclick="center()">📍</button>
  <button class="btn" onclick="menuToggle()">Menu</button>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map=L.map('map').setView([56.95,24.1],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* STATE */
let exploring=false,marker=null,lat=0,lng=0,follow=true;
let xp=Number(localStorage.xp||0);
let cells=JSON.parse(localStorage.cells||"{}");
let path=JSON.parse(localStorage.path||"[]");
let places=JSON.parse(localStorage.places||"[]");

let route=L.polyline(path,{color:'#7dffd0'}).addTo(map);
let routeVisible=true;

/* DRAW SAVED PLACES */
let placeMarkers=[];
function drawPlaces(){
  placeMarkers.forEach(m=>map.removeLayer(m));
  placeMarkers=[];
  places.forEach(p=>{
    let m=L.marker([p.lat,p.lng],{
      icon:L.divIcon({html:'<div class="place"></div>'})
    }).addTo(map).bindPopup(p.name||"Place");
    placeMarkers.push(m);
  });
}
drawPlaces();

/* FOG */
let fog=document.getElementById("fog");
let ctx=fog.getContext("2d");
fog.width=innerWidth;fog.height=innerHeight;

function reveal(x,y,r){
  let g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,"rgba(0,0,0,1)");
  g.addColorStop(.4,"rgba(0,0,0,.7)");
  g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.globalCompositeOperation="destination-out";
  ctx.fillStyle=g;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.globalCompositeOperation="source-over";
}

function drawFog(){
  ctx.fillStyle="rgba(0,0,0,.55)";
  ctx.fillRect(0,0,fog.width,fog.height);

  Object.keys(cells).forEach(k=>{
    let p=k.split("_");
    let pt=map.latLngToContainerPoint([p[0]/1000,p[1]/1000]);
    reveal(pt.x,pt.y,90);
  });

  let pt=map.latLngToContainerPoint([lat,lng]);
  reveal(pt.x,pt.y,130);
}

/* GAME */
function update(){
  cellsEl.innerText=Object.keys(cells).length;
  xpEl.innerText=xp;
  levelEl.innerText=Math.floor(xp/100)+1;
  bar.style.width=(xp%100)+"%";

  localStorage.xp=xp;
  localStorage.cells=JSON.stringify(cells);
  localStorage.path=JSON.stringify(path);
  localStorage.places=JSON.stringify(places);
}

/* UI */
function toggle(){exploring=!exploring}
function stop(){exploring=false}
function center(){follow=true;map.setView([lat,lng],17)}
function menuToggle(){menu.classList.toggle("open")}

function toggleRoute(){
  routeVisible=!routeVisible;
  if(routeVisible) map.addLayer(route);
  else map.removeLayer(route);
}

/* PLACES */
function savePlace(){
  let name=prompt("Название места")||"Place";
  places.push({lat,lng,name});
  drawPlaces();
  update();
}

/* BACKUP / IMPORT */
function backup(){
  navigator.clipboard.writeText(JSON.stringify({xp,cells,path,places}));
  alert("Saved");
}

function importData(){
  let data=prompt("Paste data");
  if(!data)return;
  let d=JSON.parse(data);
  xp=d.xp||0;
  cells=d.cells||{};
  path=d.path||[];
  places=d.places||[];
  drawPlaces();
  route.setLatLngs(path);
  update();
}

/* GPS */
navigator.geolocation.watchPosition(pos=>{
  lat=pos.coords.latitude;
  lng=pos.coords.longitude;

  if(!marker){
    marker=L.marker([lat,lng],{
      icon:L.divIcon({html:'<div class="player"></div>'})
    }).addTo(map);
  }else marker.setLatLng([lat,lng]);

  if(follow) map.setView([lat,lng],16);

  path.push([lat,lng]);
  if(path.length>500)path.shift();
  route.setLatLngs(path);

  if(exploring){
    let key=Math.floor(lat*1000)+"_"+Math.floor(lng*1000);
    if(!cells[key]){
      cells[key]=true;
      xp+=10;
    }
  }

  ctx.clearRect(0,0,fog.width,fog.height);
  drawFog();
  update();

},()=>alert("GPS error"),{enableHighAccuracy:true});

/* refs */
let cellsEl=document.getElementById("cells");
let xpEl=document.getElementById("xp");
let levelEl=document.getElementById("level");
let bar=document.getElementById("bar");
let menu=document.getElementById("menu");

update();
</script>

</body>
</html>
