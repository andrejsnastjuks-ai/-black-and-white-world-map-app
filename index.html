<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WanderGlow</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body { margin:0; background:#05080a; color:white; font-family:sans-serif; }
#map { height:100vh; }

/* затемнение карты */
.leaflet-tile-pane {
  filter: grayscale(1) brightness(0.25) contrast(1);
}

/* пользователь */
.user {
  width:20px; height:20px;
  background:#7dffd0;
  border-radius:50%;
  border:3px solid white;
  box-shadow:0 0 15px #7dffd0;
  animation:pulse 1.5s infinite;
}
@keyframes pulse {
  0% { box-shadow:0 0 0px #7dffd0; }
  50% { box-shadow:0 0 20px #7dffd0; }
  100% { box-shadow:0 0 0px #7dffd0; }
}

/* кнопки */
button {
  padding:12px 16px;
  border-radius:20px;
  border:none;
  background:#222;
  color:white;
  font-size:16px;
  transition:0.15s;
}

button:active {
  transform:scale(0.9);
  filter:brightness(1.5);
}

/* панель */
.panel {
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:16px;
  border-radius:25px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <button onclick="start()">Explore</button>
  <button onclick="centerMe()">📍</button>
  <button onclick="toggleUI()">Hide UI</button>

  <div>XP: <span id="xp">0</span></div>
  <div>Cells: <span id="cells">0</span></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([56.95, 24.1], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:19
}).addTo(map);

let userMarker;
let opened = {};
let xp = 0;
let watch = null;

/* мягкое открытие */
function reveal(lat, lng) {
  L.circle([lat, lng], {
    radius: 25,
    color: "#7dffd0",
    fillOpacity: 0.2,
    stroke:false
  }).addTo(map);

  /* вспышка */
  let flash = L.circle([lat, lng], {
    radius: 60,
    color: "#7dffd0",
    fillOpacity: 0.3,
    stroke:false
  }).addTo(map);

  setTimeout(()=>map.removeLayer(flash), 600);
}

/* GPS */
function start() {
  if (watch) return;

  watch = navigator.geolocation.watchPosition(pos => {
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    if (!userMarker) {
      userMarker = L.marker([lat, lng], {
        icon: L.divIcon({
          className:"",
          html:'<div class="user"></div>'
        })
      }).addTo(map);
    } else {
      userMarker.setLatLng([lat, lng]);
    }

    map.setView([lat, lng]);

    let key = Math.floor(lat*10000)+"_"+Math.floor(lng*10000);

    if (!opened[key]) {
      opened[key] = true;

      reveal(lat, lng);

      xp += 10;

      document.getElementById("xp").innerText = xp;
      document.getElementById("cells").innerText = Object.keys(opened).length;
    }

  });
}

/* центр */
function centerMe() {
  if (userMarker) {
    map.setView(userMarker.getLatLng());
  }
}

/* скрытие UI */
function toggleUI() {
  let panel = document.querySelector(".panel");
  panel.style.display = panel.style.display === "none" ? "block" : "none";
}
</script>

</body>
</html>
