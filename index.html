<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WanderGlow Travel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

#map{height:100%}

/* карта немного светлее */
.leaflet-tile-pane{
  filter:brightness(1.05) contrast(1.05) saturate(1.1);
}

/* туман */
#fog{
  position:absolute;
  inset:0;
  z-index:500;
  pointer-events:none;
}

/* зелёная точка */
.userDot{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#00ff88;
  border:4px solid white;
  box-shadow:0 0 0 10px rgba(0,255,136,.25),0 0 30px #00ff88;
}

/* UI */
.panel{
  position:absolute;
  left:14px;
  right:14px;
  bottom:18px;
  padding:18px;
  border-radius:26px;
  background:rgba(60,60,60,.7);
  backdrop-filter:blur(20px);
  color:white;
  z-index:9999;
}

.panel.hidden{display:none;}

.title{
  font-size:30px;
  font-weight:900;
}

.status{
  color:rgba(255,255,255,.7);
  margin-top:4px;
}

.row{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.stat{
  flex:1;
  text-align:center;
  background:rgba(255,255,255,.1);
  padding:12px;
  border-radius:16px;
}

.stat b{font-size:24px}

button{
  border:0;
  border-radius:16px;
  padding:12px;
  font-weight:800;
  color:white;
  background:rgba(255,255,255,.15);
}

.main{
  background:linear-gradient(135deg,#00ff88,#7dffd4);
  color:#002c18;
}

.menu{
  display:none;
  position:absolute;
  left:14px;
  right:14px;
  bottom:18px;
  padding:20px;
  border-radius:26px;
  background:rgba(60,60,60,.75);
  backdrop-filter:blur(20px);
  z-index:10000;
}

.menu.open{display:block;}

.showBtn{
  display:none;
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  border-radius:20px;
  background:rgba(60,60,60,.8);
  color:white;
  z-index:10001;
}

.showBtn.visible{display:block;}

.toast{
  position:absolute;
  top:20px;
  left:20px;
  right:20px;
  background:rgba(60,60,60,.85);
  padding:12px;
  border-radius:14px;
  color:white;
  opacity:0;
  transition:.3s;
  z-index:12000;
}
</style>
</head>

<body>

<div id="map"></div>
<canvas id="fog"></canvas>
<div id="toast" class="toast"></div>

<button id="showBtn" class="showBtn" onclick="showUI()">Show UI</button>

<div id="menu" class="menu">
  <button onclick="centerMe()" style="width:100%">📍 My location</button>
  <button onclick="hideUI()" style="width:100%;margin-top:10px">Hide UI</button>
  <button onclick="toggleMenu()" style="width:100%;margin-top:10px">Close</button>
</div>

<div id="panel" class="panel">
  <div style="display:flex;justify-content:space-between">
    <div>
      <div class="title">WanderGlow</div>
      <div id="status" class="status">Waiting for GPS...</div>
    </div>
    <button id="exploreBtn" class="main" onclick="toggleExplore()">Explore</button>
  </div>

  <div class="row">
    <div class="stat"><b id="cellsView">0</b><br>Cells</div>
    <div class="stat"><b id="xpView">0</b><br>XP</div>
    <div class="stat"><b id="kmView">0.00</b><br>KM</div>
  </div>

  <div class="row">
    <button style="flex:1" onclick="centerMe()">📍</button>
    <button style="flex:1" onclick="toggleMenu()">Menu</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([56.95,24.1],15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let lat=null,lng=null;
let marker=null;
let exploring=false;

let cells=JSON.parse(localStorage.cells||"{}");
let xp=Number(localStorage.xp||0);
let total=Number(localStorage.total||0);

const fog=document.getElementById("fog");
const ctx=fog.getContext("2d");

function resize(){
  fog.width=window.innerWidth;
  fog.height=window.innerHeight;
}
resize();

function cellKey(a,b){
  return Math.floor(a*1000)+"_"+Math.floor(b*1000);
}

function cellCenter(key){
  const p=key.split("_");
  return [(Number(p[0])+0.5)/1000,(Number(p[1])+0.5)/1000];
}

function save(){
  localStorage.cells=JSON.stringify(cells);
  localStorage.xp=xp;
  localStorage.total=total;
}

function toast(t){
  const el=document.getElementById("toast");
  el.innerText=t;
  el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,2000);
}

function drawUser(){
  const icon=L.divIcon({
    html:'<div class="userDot"></div>',
    className:'',
    iconSize:[30,30],
    iconAnchor:[15,15]
  });

  if(!marker){
    marker=L.marker([lat,lng],{icon}).addTo(map);
  }else{
    marker.setLatLng([lat,lng]);
  }
}

/* FOG */
function cut(x,y,r){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,"rgba(0,0,0,1)");
  g.addColorStop(1,"rgba(0,0,0,0)");

  ctx.globalCompositeOperation="destination-out";
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";
}

function drawFog(){
  ctx.clearRect(0,0,fog.width,fog.height);

  ctx.fillStyle="rgba(0,0,0,.85)";
  ctx.fillRect(0,0,fog.width,fog.height);

  Object.keys(cells).forEach(k=>{
    const p=map.latLngToContainerPoint(cellCenter(k));
    cut(p.x,p.y,25);
  });

  if(lat){
    const p=map.latLngToContainerPoint([lat,lng]);
    cut(p.x,p.y,60);
  }
}

/* UI */
function toggleExplore(){
  exploring=!exploring;
  document.getElementById("exploreBtn").innerText=exploring?"Exploring":"Explore";
}

function centerMe(){
  if(lat) map.setView([lat,lng],17);
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function hideUI(){
  document.getElementById("panel").classList.add("hidden");
  document.getElementById("menu").classList.remove("open");
  document.getElementById("showBtn").classList.add("visible");
}

function showUI(){
  document.getElementById("panel").classList.remove("hidden");
  document.getElementById("showBtn").classList.remove("visible");
}

/* GPS */
navigator.geolocation.watchPosition(pos=>{
  lat=pos.coords.latitude;
  lng=pos.coords.longitude;

  drawUser();
  map.setView([lat,lng],17);

  document.getElementById("status").innerText="Exploring";

  if(exploring){
    const key=cellKey(lat,lng);
    if(!cells[key]){
      cells[key]=true;
      xp+=10;
      toast("+10 XP");
    }
  }

  document.getElementById("xpView").innerText=xp;
  document.getElementById("cellsView").innerText=Object.keys(cells).length;

  save();
  drawFog();

},{
  enableHighAccuracy:true
});
</script>

</body>
</html>
