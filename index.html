<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WanderGlow V21 FINAL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:-apple-system;color:#fff}
#map{height:100%;filter:grayscale(1) brightness(.35)}
#fog{position:absolute;inset:0;pointer-events:none}

.player{
  width:28px;height:28px;border-radius:50%;
  background:#7dffd0;border:4px solid #fff;
  box-shadow:0 0 0 8px rgba(125,255,208,.3),0 0 30px #7dffd0;
}

.panel{
  position:absolute;bottom:20px;left:10px;right:10px;
  background:rgba(20,20,20,.7);
  backdrop-filter:blur(20px);
  padding:14px;border-radius:18px;
}

.menu{
  position:absolute;top:70px;right:10px;
  background:rgba(20,20,20,.8);
  padding:10px;border-radius:16px;
  display:none;
}
.menu.open{display:block}
.menu.small{width:60px}
.menu.small div{display:none}

.btn{
  padding:10px;border-radius:10px;
  background:#333;color:#fff;border:0;
  margin:3px;
}
.btn:active{transform:scale(.9)}
.main{background:#7dffd0;color:#000;font-weight:bold}

.row{display:flex;gap:8px;margin-top:8px}
.stat{flex:1;text-align:center;background:#222;padding:8px;border-radius:10px}

.barWrap{height:6px;background:#222;border-radius:6px;margin-top:8px}
.bar{height:100%;width:0%;background:#7dffd0}

.showBtn{
  position:absolute;bottom:20px;left:50%;
  transform:translateX(-50%);
  display:none;
}
.showBtn.visible{display:block}
.hidden{display:none}

.toast{
  position:absolute;top:20px;left:50%;
  transform:translateX(-50%);
  background:#333;padding:8px 12px;border-radius:8px;
  opacity:0;transition:.3s;
}
</style>
</head>

<body>

<div id="map"></div>
<canvas id="fog"></canvas>

<div id="toast" class="toast"></div>

<button id="showBtn" class="showBtn btn" onclick="showUI()">Show UI</button>

<div id="menu" class="menu">
  <button class="btn main" onclick="toggleMenu()">☰</button>
  <div>
    <button class="btn" onclick="center()">📍</button>
    <button class="btn" onclick="hideUI()">Hide</button>
    <button class="btn" onclick="backup()">Backup</button>
    <button class="btn" onclick="clearAll()">Reset</button>
  </div>
</div>

<div id="panel" class="panel">
  <div style="display:flex;justify-content:space-between">
    <div>
      <b>WanderGlow</b><br>
      <span id="status">Ready</span>
    </div>
    <button id="exploreBtn" class="btn main" onclick="toggle()">Explore</button>
  </div>

  <div class="row">
    <div class="stat"><b id="cells">0</b><br>Cells</div>
    <div class="stat"><b id="xp">0</b><br>XP</div>
    <div class="stat"><b id="level">1</b><br>Level</div>
  </div>

  <div class="barWrap"><div id="bar" class="bar"></div></div>

  <div class="row">
    <button class="btn" onclick="stop()">Stop</button>
    <button class="btn" onclick="center()">📍</button>
    <button class="btn" onclick="menuToggle()">Menu</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map=L.map('map').setView([56.95,24.1],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* STATE */
let exploring=false,marker=null,lat=0,lng=0;
let xp=Number(localStorage.xp||0);
let cells=JSON.parse(localStorage.cells||"{}");
let path=JSON.parse(localStorage.path||"[]");

let line=L.polyline(path,{color:'#7dffd0'}).addTo(map);

/* FOG */
let fog=document.getElementById("fog");
let ctx=fog.getContext("2d");

function resize(){fog.width=innerWidth;fog.height=innerHeight}
resize();

function reveal(x,y,r){
  let g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,"rgba(0,0,0,1)");
  g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.globalCompositeOperation="destination-out";
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";
}

function drawFog(){
  ctx.fillStyle="rgba(0,0,0,.65)";
  ctx.fillRect(0,0,fog.width,fog.height);

  Object.keys(cells).forEach(k=>{
    let p=k.split("_");
    let pt=map.latLngToContainerPoint([p[0]/1000,p[1]/1000]);
    reveal(pt.x,pt.y,80);
  });

  let pt=map.latLngToContainerPoint([lat,lng]);
  reveal(pt.x,pt.y,120);
}

/* UI */
function toggle(){exploring=!exploring;status.innerText=exploring?"Exploring":"Paused"}
function stop(){exploring=false;status.innerText="Stopped"}
function center(){map.setView([lat,lng],17)}
function menuToggle(){menu.classList.toggle("open")}
function toggleMenu(){menu.classList.toggle("small")}
function hideUI(){panel.classList.add("hidden");showBtn.classList.add("visible")}
function showUI(){panel.classList.remove("hidden");showBtn.classList.remove("visible")}

function backup(){
  navigator.clipboard.writeText(JSON.stringify({xp,cells,path},null,2));
  toast("Backup saved");
}

function clearAll(){
  if(prompt("Type DELETE")!=="DELETE")return;
  localStorage.clear();
  location.reload();
}

function toast(t){
  toastEl.innerText=t;
  toastEl.style.opacity=1;
  setTimeout(()=>toastEl.style.opacity=0,2000);
}

/* UPDATE */
function update(){
  cellsEl.innerText=Object.keys(cells).length;
  xpEl.innerText=xp;
  levelEl.innerText=Math.floor(xp/100)+1;
  bar.style.width=(xp%100)+"%";

  localStorage.xp=xp;
  localStorage.cells=JSON.stringify(cells);
}

/* GPS */
navigator.geolocation.watchPosition(pos=>{
  lat=pos.coords.latitude;
  lng=pos.coords.longitude;

  if(!marker){
    marker=L.marker([lat,lng],{
      icon:L.divIcon({html:'<div class="player"></div>'})
    }).addTo(map);
  }else marker.setLatLng([lat,lng]);

  map.setView([lat,lng],16);

  path.push([lat,lng]);
  if(path.length>600)path.shift();
  line.setLatLngs(path);
  localStorage.path=JSON.stringify(path);

  if(exploring){
    let key=Math.floor(lat*1000)+"_"+Math.floor(lng*1000);
    if(!cells[key]){
      cells[key]=true;
      xp+=10;
      update();
    }
  }

  ctx.clearRect(0,0,fog.width,fog.height);
  drawFog();

},()=>alert("GPS error"),{enableHighAccuracy:true});

update();

/* refs */
let status=document.getElementById("status");
let cellsEl=document.getElementById("cells");
let xpEl=document.getElementById("xp");
let levelEl=document.getElementById("level");
let bar=document.getElementById("bar");
let panel=document.getElementById("panel");
let menu=document.getElementById("menu");
let showBtn=document.getElementById("showBtn");
let toastEl=document.getElementById("toast");
</script>

</body>
</html>
