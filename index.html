<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>WanderGlow 006 PRO MAX PREMIUM A</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

#map{
  height:100%;
  width:100%;
  background:#050505;
}

.leaflet-tile-pane{
  filter:brightness(.78) contrast(1.28) saturate(.85);
}

.leaflet-control-container{
  z-index:3000;
}

#fog{
  position:absolute;
  inset:0;
  z-index:500;
  pointer-events:none;
}

#accuracyCircle{
  position:absolute;
  border-radius:50%;
  background:rgba(0,255,136,.10);
  border:2px solid rgba(0,255,136,.24);
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:3000;
  display:none;
}

#pulse{
  position:absolute;
  z-index:3900;
  width:80px;
  height:80px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,255,136,.35),transparent 70%);
  transform:translate(-50%,-50%) scale(.4);
  opacity:0;
  pointer-events:none;
}

#pulse.on{
  animation:pulse .8s ease-out;
}

@keyframes pulse{
  0%{opacity:.9;transform:translate(-50%,-50%) scale(.4)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(2.2)}
}

#userDot{
  position:absolute;
  z-index:4000;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#00ff88;
  border:4px solid #fff;
  box-shadow:
    0 0 0 16px rgba(0,255,136,.22),
    0 0 36px #00ff88,
    0 0 70px rgba(0,255,136,.35);
  transform:translate(-50%,-50%);
  display:none;
  pointer-events:none;
}

.panel,.menu,.toast,.showBtn,.hudCard{
  background:linear-gradient(180deg,rgba(35,35,35,.88),rgba(18,18,18,.88));
  border:1px solid rgba(255,255,255,.10);
  backdrop-filter:blur(26px);
  -webkit-backdrop-filter:blur(26px);
  color:white;
  box-shadow:
    0 20px 55px rgba(0,0,0,.50),
    inset 0 1px 0 rgba(255,255,255,.08);
}

.panel{
  position:absolute;
  left:14px;
  right:14px;
  bottom:18px;
  z-index:5000;
  padding:18px;
  border-radius:30px;
  box-shadow:
    0 0 0 1px rgba(0,255,136,.28),
    0 0 24px rgba(0,255,136,.30),
    0 22px 60px rgba(0,0,0,.55);
}

.panel.hidden{
  display:none;
}

.title{
  font-size:34px;
  font-weight:950;
  letter-spacing:-1.2px;
  line-height:1;
}

.status{
  margin-top:8px;
  color:#2cff73;
  font-size:16px;
  font-weight:750;
}

.row{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.stat{
  flex:1;
  display:flex;
  align-items:center;
  gap:10px;
  text-align:left;
  padding:13px 10px;
  border-radius:20px;
  background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.06));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
}

.statIcon{
  font-size:26px;
  min-width:32px;
  text-align:center;
}

.stat b{
  display:block;
  font-size:20px;
  line-height:1.05;
}

.stat small{
  color:rgba(255,255,255,.66);
  font-size:14px;
}

.controls{
  display:grid;
  grid-template-columns:.8fr 1.1fr 1fr 1.2fr .9fr .9fr;
  gap:8px;
  margin-top:14px;
}

button{
  border:0;
  border-radius:18px;
  padding:12px 8px;
  font-weight:900;
  font-size:14px;
  color:white;
  background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.07));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}

button:active{
  transform:scale(.94);
}

.main{
  background:linear-gradient(135deg,#00ff72,#baffdd);
  color:#052215;
  padding:15px 24px;
  font-size:18px;
  min-width:132px;
}

.main.active,.tripActive{
  background:linear-gradient(135deg,#4d96ff,#9bd8ff)!important;
  color:white!important;
}

.pauseBtn.paused,.lockBtn.locked,.followBtn.on{
  background:linear-gradient(135deg,#ffd43b,#fff1a8);
  color:#201600;
}

.followBtn.on small{
  color:#00ff72;
}

#hud{
  position:absolute;
  right:12px;
  top:78px;
  z-index:5200;
  display:flex;
  flex-direction:column;
  gap:8px;
  pointer-events:none;
}

.hudCard{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:18px;
  min-width:116px;
}

.hudIcon{
  font-size:28px;
}

.hudCard b{
  display:block;
  font-size:15px;
}

.hudCard small{
  display:block;
  color:rgba(255,255,255,.72);
  margin-top:2px;
}

.menu{
  display:none;
  position:absolute;
  right:14px;
  top:150px;
  width:min(360px,calc(100vw - 28px));
  z-index:6000;
  padding:16px;
  border-radius:28px;
  max-height:calc(100vh - 230px);
  overflow:auto;
}

.menu.open{
  display:block;
}

.modeGrid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:8px;
  margin-bottom:12px;
}

.modeBtn{
  padding:12px 6px;
  font-size:14px;
  border-radius:18px;
}

.modeBtn span{
  display:block;
  font-size:24px;
  margin-bottom:4px;
}

.modeBtn.activeMode{
  background:linear-gradient(135deg,#00ff72,#baffdd);
  color:#052215;
}

.menuItem{
  width:100%;
  margin-top:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  text-align:left;
  padding:13px 16px;
  border-radius:18px;
}

.menuItem .sub{
  display:block;
  color:rgba(255,255,255,.62);
  margin-top:2px;
  font-size:13px;
}

.arrow{
  color:#ffd21f;
  font-size:24px;
}

.danger{
  background:linear-gradient(180deg,rgba(170,45,45,.95),rgba(120,22,22,.95))!important;
}

.tripItem{
  margin-top:10px;
  padding:12px;
  border-radius:18px;
  background:rgba(255,255,255,.10);
}

.tripItem b{
  display:block;
  font-size:16px;
}

.tripItem small{
  display:block;
  margin-top:4px;
  line-height:1.35;
  color:rgba(255,255,255,.68);
}

.tripActions{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.tripActions button{
  font-size:13px;
  padding:10px;
}

.showBtn{
  display:none;
  position:absolute;
  left:50%;
  bottom:24px;
  transform:translateX(-50%);
  z-index:6000;
  padding:14px 24px;
  border-radius:24px;
}

.showBtn.visible{
  display:block;
}

.toast{
  position:absolute;
  top:22px;
  left:18px;
  right:18px;
  z-index:7000;
  padding:16px 18px;
  border-radius:22px;
  opacity:0;
  transition:.25s;
  font-weight:900;
  font-size:18px;
}

@media(max-width:430px){
  .title{font-size:31px}
  .panel{left:12px;right:12px;bottom:16px;padding:16px}
  .stat{padding:12px 8px;gap:8px}
  .statIcon{font-size:23px;min-width:26px}
  .stat b{font-size:18px}
  .stat small{font-size:13px}
  .controls{grid-template-columns:.8fr 1fr .9fr 1.1fr .9fr .9fr;gap:7px}
  button{font-size:13px;padding:11px 6px}
  .menu{top:146px}
}
</style>
</head>

<body>
<div id="map"></div>
<canvas id="fog"></canvas>
<div id="accuracyCircle"></div>
<div id="pulse"></div>
<div id="userDot"></div>
<div id="toast" class="toast"></div>

<div id="hud">
  <div class="hudCard"><div class="hudIcon">🛰️</div><div><b>GPS</b><small id="hudGps">Search</small></div></div>
  <div class="hudCard"><div class="hudIcon">🔒</div><div><b>Indoor</b><small id="hudLock">off</small></div></div>
  <div class="hudCard"><div class="hudIcon">🎯</div><div><b id="hudAcc">± -- m</b><small>Accuracy</small></div></div>
</div>

<button id="showBtn" class="showBtn" onclick="showUI()">Show UI</button>

<div id="menu" class="menu">
  <div class="modeGrid">
    <button id="modeWalk" class="modeBtn" onclick="setMode('walk')"><span>🚶</span>Walk</button>
    <button id="modeCar" class="modeBtn" onclick="setMode('car')"><span>🚗</span>Car</button>
    <button id="modeTrain" class="modeBtn" onclick="setMode('train')"><span>🚆</span>Train</button>
    <button id="modePlane" class="modeBtn" onclick="setMode('plane')"><span>✈️</span>Plane</button>
  </div>

  <button class="menuItem" onclick="toggleFollow()"><span><b>Follow</b><span id="menuFollowSub" class="sub">on</span></span><span class="arrow">›</span></button>
  <button class="menuItem" onclick="toggleIndoorLock()"><span><b>Indoor lock</b><span id="menuLockSub" class="sub">off</span></span><span class="arrow">›</span></button>
  <button class="menuItem" onclick="toggleRoute()"><span><b>Route</b><span id="menuRouteSub" class="sub">on</span></span><span class="arrow">›</span></button>
  <button class="menuItem" onclick="clearRoute()"><b>Clear route only</b></button>
  <button class="menuItem" onclick="clearTripPreview()"><b>Clear trip preview</b></button>
  <button class="menuItem" onclick="hideUI()"><b>Hide UI</b></button>
  <button class="menuItem" onclick="backup()"><b>Backup</b></button>
  <button class="menuItem" onclick="importData()"><b>Import</b></button>
  <button class="menuItem danger" onclick="resetData()"><b>Reset all data</b></button>
  <button class="menuItem" onclick="toggleMenu()" style="justify-content:center"><b>Close</b></button>

  <div style="margin-top:16px;font-weight:900;font-size:18px">Trips history</div>
  <div id="tripsList"></div>
</div>

<div id="panel" class="panel">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
    <div>
      <div class="title">WanderGlow</div>
      <div id="status" class="status">Waiting for GPS...</div>
    </div>
    <button id="exploreBtn" class="main" onclick="toggleExplore()">Explore</button>
  </div>

  <div class="row">
    <div class="stat"><div class="statIcon">👣</div><div><b id="walkedView">0 m</b><small>Walked</small></div></div>
    <div class="stat"><div class="statIcon">🗺️</div><div><b id="exploredView">0 m</b><small>Explored</small></div></div>
    <div class="stat"><div class="statIcon">🚩</div><div><b id="areasView">0</b><small>Areas</small></div></div>
  </div>

  <div class="row">
    <div class="stat"><div class="statIcon">🌍</div><div><b id="countryView">Unknown</b><small>Country</small></div></div>
    <div class="stat"><div class="statIcon" id="modeIcon">🚶</div><div><b id="modeView">Walk</b><small>Mode</small></div></div>
    <div class="stat"><div class="statIcon">📶</div><div><b id="gpsView">GPS</b><small>Signal</small></div></div>
  </div>

  <div class="controls">
    <button onclick="centerMe()">📍</button>
    <button id="pauseBtn" class="pauseBtn" onclick="togglePause()">⏸ Pause</button>
    <button id="lockBtn" class="lockBtn" onclick="toggleIndoorLock()">🔒 Lock</button>
    <button id="followBtn" class="followBtn on" onclick="toggleFollow()">🧭 Follow<br><small>on</small></button>
    <button id="tripBtn" onclick="toggleTrip()">🎒 Trip</button>
    <button onclick="toggleMenu()">☰ Menu</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const KEY="wg_006_premium_a_";
const OLD_KEYS=[
  "wg_006_stable_full_",
  "wg_006_pro_max_ultra_full_",
  "wg_006_pro_max_gps_final_",
  "wg_006_pro_trips_",
  "wg_005_pro_max_ui_upgrade_",
  "wg_005_pro_max_final_plus_",
  "wg_005_ultra_",
  "wg_005_pro_max_plus_",
  "wg_005_pro_full_",
  "wg_005_smart_",
  "wg_005_wow_",
  "wg_005_pro_",
  "wg_005_clean_"
];

function loadValue(name,fallback){
  if(localStorage[KEY+name]!==undefined)return localStorage[KEY+name];
  for(const oldKey of OLD_KEYS){
    if(localStorage[oldKey+name]!==undefined)return localStorage[oldKey+name];
  }
  return fallback;
}

function safeJSON(text,fallback){
  try{return JSON.parse(text)}catch(e){return fallback}
}

const map=L.map("map",{zoomControl:true,preferCanvas:true}).setView([56.95,24.1],15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19,
  attribution:"© OpenStreetMap"
}).addTo(map);

let lat=null,lng=null,accuracy=null;
let exploring=false,paused=false,indoorLock=false,firstFix=true,routeVisible=true;
let followMe=true,suppressMapEvent=false;
let lastAccepted=null,lastSmooth=null,fogQueued=false,lastSave=0,gpsQueue=[];
let gpsStarted=false,watchId=null;

let walked=Number(loadValue("walked",0));
let explored=Number(loadValue("explored",0));
let visited=safeJSON(loadValue("visited","{}"),{});
let routePath=safeJSON(loadValue("routePath","[]"),[]).slice(-1600);
let mode=loadValue("mode","walk");
let trips=safeJSON(loadValue("trips","[]"),[]);
let currentTrip=safeJSON(loadValue("currentTrip","null"),null);

const fog=document.getElementById("fog");
const ctx=fog.getContext("2d");

const routeGlow=L.polyline(routePath,{color:"#7dffd4",weight:9,opacity:.18,smoothFactor:1.5}).addTo(map);
const routeLine=L.polyline(routePath,{color:"#00ff88",weight:4,opacity:.85,smoothFactor:1.5}).addTo(map);
const previewLine=L.polyline([],{color:"#ffffff",weight:5,opacity:.75,dashArray:"8 10",smoothFactor:1.5}).addTo(map);

const modes={
  walk:{label:"Walk",icon:"🚶",radius:25,step:20,keyScale:4000,maxAccuracy:45,minDistance:8,maxJump:45,maxSpeed:3,bridge:35},
  car:{label:"Car",icon:"🚗",radius:35,step:20,keyScale:2000,maxAccuracy:70,minDistance:15,maxJump:120,maxSpeed:40,bridge:90},
  train:{label:"Train",icon:"🚆",radius:70,step:45,keyScale:1200,maxAccuracy:100,minDistance:20,maxJump:600,maxSpeed:90,bridge:220},
  plane:{label:"Plane",icon:"✈️",radius:300,step:90,keyScale:300,maxAccuracy:500,minDistance:80,maxJump:30000,maxSpeed:300,bridge:2000}
};

setTimeout(()=>map.invalidateSize(),300);
setTimeout(()=>map.invalidateSize(),1000);
setTimeout(()=>{if(lat===null||lng===null){map.setView([56.95,24.1],13);requestFogDraw()}},3000);

function currentMode(){return modes[mode]||modes.walk}

function resizeFog(){
  fog.width=window.innerWidth;
  fog.height=window.innerHeight;
  requestFogDraw();
  updateUserDot();
  updateAccuracyCircle();
}

window.addEventListener("resize",resizeFog);
map.on("move zoom",()=>{requestFogDraw();updateUserDot();updateAccuracyCircle()});
map.on("dragstart",()=>{if(!suppressMapEvent){followMe=false;updateUI();toast("Follow off")}});
resizeFog();

function startGPS(){
  if(gpsStarted)return;
  gpsStarted=true;
  if(!navigator.geolocation){
    document.getElementById("status").innerText="GPS unavailable";
    toast("GPS unavailable");
    return;
  }
  watchId=navigator.geolocation.watchPosition(onGPS,onGPSError,{
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:15000
  });
}
setTimeout(startGPS,700);

function requestFogDraw(){
  if(fogQueued)return;
  fogQueued=true;
  requestAnimationFrame(()=>{fogQueued=false;drawFog()});
}

function formatMeters(m){
  return m>=1000?(m/1000).toFixed(2)+" km":Math.round(m)+" m";
}

function formatDate(ts){
  const d=new Date(ts);
  return d.toLocaleDateString()+" "+d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

function getCountry(a,b){
  if(a>=55.6&&a<=58.1&&b>=20.8&&b<=28.3)return "Latvia";
  if(a>=54.8&&a<=56.5&&b>=20.9&&b<=26.9)return "Lithuania";
  if(a>=57.4&&a<=59.8&&b>=21.5&&b<=28.3)return "Estonia";
  return "Unknown";
}

function keyFor(a,b){
  const scale=currentMode().keyScale;
  return mode+"_"+Math.floor(a*scale)+"_"+Math.floor(b*scale);
}

function keyCenter(key){
  const parts=key.split("_");
  const keyMode=parts[0];
  const scale=(modes[keyMode]||modes.walk).keyScale;
  return [(Number(parts[1])+0.5)/scale,(Number(parts[2])+0.5)/scale];
}

function metersToPixels(m,latitude){
  const zoom=map.getZoom();
  const metersPerPixel=40075016.686*Math.cos(latitude*Math.PI/180)/Math.pow(2,zoom+8);
  return Math.max(4,m/metersPerPixel);
}

function gpsQuality(){
  if(accuracy===null)return "Search";
  if(accuracy<=20)return "Good";
  if(accuracy<=45)return "Weak";
  return "Bad";
}

function pruneVisited(){
  const keys=Object.keys(visited);
  if(keys.length<=4200)return;
  keys.slice(0,keys.length-4200).forEach(key=>delete visited[key]);
}

function save(force=false){
  const now=Date.now();
  if(!force&&now-lastSave<1800)return;
  lastSave=now;
  pruneVisited();
  localStorage[KEY+"walked"]=walked;
  localStorage[KEY+"explored"]=explored;
  localStorage[KEY+"visited"]=JSON.stringify(visited);
  localStorage[KEY+"routePath"]=JSON.stringify(routePath.slice(-1600));
  localStorage[KEY+"mode"]=mode;
  localStorage[KEY+"trips"]=JSON.stringify(trips.slice(0,30));
  localStorage[KEY+"currentTrip"]=JSON.stringify(currentTrip);
}

function updateUI(){
  const cm=currentMode();

  document.getElementById("walkedView").innerText=formatMeters(walked);
  document.getElementById("exploredView").innerText=formatMeters(explored);
  document.getElementById("areasView").innerText=Object.keys(visited).length;
  document.getElementById("countryView").innerText=lat!==null?getCountry(lat,lng):"Unknown";
  document.getElementById("modeView").innerText=cm.label;
  document.getElementById("modeIcon").innerText=cm.icon;
  document.getElementById("gpsView").innerText=gpsQuality();

  document.getElementById("hudGps").innerText=gpsQuality();
  document.getElementById("hudLock").innerText=indoorLock?"on":"off";
  document.getElementById("hudAcc").innerText=accuracy?("± "+Math.round(accuracy)+" m"):"± -- m";

  document.querySelectorAll(".modeBtn").forEach(btn=>btn.classList.remove("activeMode"));
  const active=document.getElementById("mode"+cm.label);
  if(active)active.classList.add("activeMode");

  document.getElementById("pauseBtn").innerHTML=paused?"▶ Resume":"⏸ Pause";
  document.getElementById("pauseBtn").classList.toggle("paused",paused);

  document.getElementById("lockBtn").innerHTML=indoorLock?"🔓 Unlock":"🔒 Lock";
  document.getElementById("lockBtn").classList.toggle("locked",indoorLock);

  document.getElementById("followBtn").innerHTML=followMe?"🧭 Follow<br><small>on</small>":"🧭 Follow<br><small>off</small>";
  document.getElementById("followBtn").classList.toggle("on",followMe);

  document.getElementById("tripBtn").innerHTML=currentTrip?"💾 Stop":"🎒 Trip";
  document.getElementById("tripBtn").classList.toggle("tripActive",!!currentTrip);

  document.getElementById("menuFollowSub").innerText=followMe?"on":"off";
  document.getElementById("menuLockSub").innerText=indoorLock?"on":"off";
  document.getElementById("menuRouteSub").innerText=routeVisible?"on":"off";

  renderTrips();
  save(false);
}

function updateStatus(accepted){
  if(paused)document.getElementById("status").innerText="Paused";
  else if(indoorLock)document.getElementById("status").innerText="Indoor lock";
  else if(exploring)document.getElementById("status").innerText=accepted?"Exploring":"GPS filtering";
  else document.getElementById("status").innerText=followMe?"GPS ready • Follow on":"GPS ready";
}

function toast(text){
  const el=document.getElementById("toast");
  el.innerText=text;
  el.style.opacity=1;
  setTimeout(()=>{el.style.opacity=0},2200);
}

function updateUserDot(){
  if(lat===null||lng===null)return;
  const point=map.latLngToContainerPoint([lat,lng]);
  const dot=document.getElementById("userDot");
  dot.style.left=point.x+"px";
  dot.style.top=point.y+"px";
  dot.style.display="block";

  const pulseEl=document.getElementById("pulse");
  pulseEl.style.left=point.x+"px";
  pulseEl.style.top=point.y+"px";
}

function updateAccuracyCircle(){
  if(lat===null||lng===null||accuracy===null)return;
  const point=map.latLngToContainerPoint([lat,lng]);
  const px=Math.min(metersToPixels(accuracy,lat),220);
  const el=document.getElementById("accuracyCircle");
  el.style.left=point.x+"px";
  el.style.top=point.y+"px";
  el.style.width=(px*2)+"px";
  el.style.height=(px*2)+"px";
  el.style.display="block";
}

function pulse(){
  if(lat===null||lng===null)return;
  const el=document.getElementById("pulse");
  el.classList.remove("on");
  void el.offsetWidth;
  el.classList.add("on");
  if(navigator.vibrate)navigator.vibrate(20);
}

function eraseCircle(x,y,r){
  const gradient=ctx.createRadialGradient(x,y,0,x,y,r);
  gradient.addColorStop(0,"rgba(0,0,0,1)");
  gradient.addColorStop(.35,"rgba(0,0,0,.98)");
  gradient.addColorStop(.68,"rgba(0,0,0,.48)");
  gradient.addColorStop(1,"rgba(0,0,0,0)");
  ctx.globalCompositeOperation="destination-out";
  ctx.fillStyle=gradient;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";
}

function drawFog(){
  ctx.clearRect(0,0,fog.width,fog.height);
  ctx.fillStyle="rgba(0,0,0,.82)";
  ctx.fillRect(0,0,fog.width,fog.height);

  const w=fog.width,h=fog.height;

  Object.keys(visited).forEach(key=>{
    const center=keyCenter(key);
    const keyMode=key.split("_")[0];
    const radius=(modes[keyMode]||modes.walk).radius;
    const point=map.latLngToContainerPoint(center);
    if(point.x<-120||point.y<-120||point.x>w+120||point.y>h+120)return;
    eraseCircle(point.x,point.y,metersToPixels(radius,center[0]));
  });

  if(lat!==null&&lng!==null){
    const point=map.latLngToContainerPoint([lat,lng]);
    let baseRadius=currentMode().radius;
    if(gpsQuality()==="Weak")baseRadius*=0.7;
    if(gpsQuality()==="Bad")baseRadius*=0.45;
    if(accuracy&&accuracy>40)baseRadius*=0.75;
    eraseCircle(point.x,point.y,metersToPixels(baseRadius*1.1,lat));
  }
}

function shouldAcceptMovement(distance,seconds,acc){
  const current=currentMode();
  if(paused||indoorLock)return false;
  if(acc!==null&&acc>current.maxAccuracy)return false;
  if(distance<current.minDistance)return false;
  if(distance>current.maxJump)return false;
  if(seconds&&seconds>0){
    const speed=distance/seconds;
    if(speed>current.maxSpeed)return false;
  }
  return true;
}

function smoothPoint(a,b){
  if(!lastSmooth)lastSmooth=[a,b];
  else lastSmooth=[lastSmooth[0]*0.75+a*0.25,lastSmooth[1]*0.75+b*0.25];
  return lastSmooth;
}

function addVisitedAt(a,b,notify=true){
  const key=keyFor(a,b);
  if(!visited[key]&&gpsQuality()!=="Bad"){
    visited[key]=true;
    explored+=Math.min(currentMode().step,30);
    if(currentTrip)currentTrip.areas=(currentTrip.areas||0)+1;
    if(notify){
      toast("New area explored • "+currentMode().label);
      pulse();
    }
  }
}

function revealBetween(from,to){
  if(!from||!to)return;
  const dist=map.distance(from,to);
  const step=Math.max(currentMode().radius*0.65,15);
  const count=Math.max(1,Math.ceil(dist/step));
  for(let i=0;i<=count;i++){
    const t=i/count;
    const a=from[0]+(to[0]-from[0])*t;
    const b=from[1]+(to[1]-from[1])*t;
    addVisitedAt(a,b,false);
  }
}

function addRoutePoint(a,b){
  const point=smoothPoint(a,b);
  const last=routePath[routePath.length-1];

  if(last){
    const dist=map.distance(last,point);
    if(dist>currentMode().bridge)return;
    routePath.push(point);
  }else{
    routePath.push(point);
  }

  if(routePath.length>1600)routePath=routePath.slice(-1600);
  updateRoute();

  if(currentTrip){
    currentTrip.route=currentTrip.route||[];
    currentTrip.route.push(point);
    currentTrip.route=currentTrip.route.slice(-1600);
  }
}

function followMap(){
  if(!followMe||lat===null||lng===null)return;
  suppressMapEvent=true;
  map.panTo([lat,lng],{animate:true,duration:.4});
  setTimeout(()=>{suppressMapEvent=false},500);
}

function toggleFollow(){
  followMe=true;
  centerMe();
  toast("Follow locked");
  updateUI();
}

function setMode(newMode){
  mode=newMode;
  lastAccepted=null;
  lastSmooth=null;
  toast("Mode: "+currentMode().label);
  updateUI();
  requestFogDraw();
  save(true);
}

function toggleExplore(){
  startGPS();
  exploring=!exploring;
  const btn=document.getElementById("exploreBtn");
  btn.classList.toggle("active",exploring);
  btn.innerText=exploring?"Exploring":"Explore";
  if(exploring&&!currentTrip)startTrip();
  updateStatus(false);
  updateUI();
}

function togglePause(){
  paused=!paused;
  lastAccepted=null;
  lastSmooth=null;
  updateStatus(false);
  updateUI();
}

function toggleIndoorLock(){
  indoorLock=!indoorLock;
  lastAccepted=null;
  lastSmooth=null;
  toast(indoorLock?"Indoor lock on":"Indoor lock off");
  updateUI();
}

function centerMe(){
  startGPS();
  if(lat===null||lng===null){
    toast("GPS is still searching...");
    return;
  }
  followMe=true;
  suppressMapEvent=true;
  map.setView([lat,lng],17,{animate:true});
  setTimeout(()=>{suppressMapEvent=false},700);
  updateUI();
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function hideUI(){
  document.getElementById("panel").classList.add("hidden");
  document.getElementById("menu").classList.remove("open");
  document.getElementById("showBtn").classList.add("visible");
}

function showUI(){
  document.getElementById("panel").classList.remove("hidden");
  document.getElementById("showBtn").classList.remove("visible");
}

function toggleRoute(){
  routeVisible=!routeVisible;
  if(routeVisible){
    map.addLayer(routeGlow);
    map.addLayer(routeLine);
    toast("Route shown");
  }else{
    map.removeLayer(routeGlow);
    map.removeLayer(routeLine);
    toast("Route hidden");
  }
  updateUI();
}

function updateRoute(){
  routeGlow.setLatLngs(routePath);
  routeLine.setLatLngs(routePath);
}

function clearRoute(){
  if(!confirm("Clear route only? Opened map will stay."))return;
  routePath=[];
  lastSmooth=null;
  updateRoute();
  save(true);
  toast("Route cleared");
}

function startTrip(){
  if(currentTrip)return;
  currentTrip={id:Date.now(),startedAt:Date.now(),endedAt:null,mode:mode,distance:0,areas:0,route:[]};
  toast("Trip started");
  updateUI();
  save(true);
}

function stopTrip(){
  if(!currentTrip)return;
  currentTrip.endedAt=Date.now();
  currentTrip.distance=currentTrip.distance||0;
  currentTrip.areas=currentTrip.areas||0;
  currentTrip.mode=currentTrip.mode||mode;
  currentTrip.route=(currentTrip.route||[]).slice(-1600);
  trips.unshift(currentTrip);
  trips=trips.slice(0,30);
  currentTrip=null;
  toast("Trip saved");
  updateUI();
  save(true);
}

function toggleTrip(){
  if(currentTrip)stopTrip();
  else startTrip();
}

function renderTrips(){
  const box=document.getElementById("tripsList");
  if(!box)return;
  if(!trips.length){
    box.innerHTML='<div class="tripItem"><small>No trips yet</small></div>';
    return;
  }
  box.innerHTML=trips.slice(0,8).map((t,i)=>{
    const title=formatDate(t.startedAt);
    const duration=t.endedAt?Math.round((t.endedAt-t.startedAt)/60000)+" min":"";
    const modeLabel=(modes[t.mode]||modes.walk).icon+" "+(modes[t.mode]||modes.walk).label;
    return `
      <div class="tripItem">
        <b>${title}</b>
        <small>${modeLabel} · ${formatMeters(t.distance||0)} · ${t.areas||0} areas · ${duration}</small>
        <div class="tripActions">
          <button onclick="showTrip(${i})">View</button>
          <button onclick="deleteTrip(${i})">Delete</button>
        </div>
      </div>
    `;
  }).join("");
}

function showTrip(i){
  const trip=trips[i];
  if(!trip||!trip.route||!trip.route.length){
    toast("No route");
    return;
  }
  previewLine.setLatLngs(trip.route);
  map.fitBounds(L.latLngBounds(trip.route),{padding:[40,40]});
  toast("Trip preview");
}

function deleteTrip(i){
  if(!confirm("Delete this trip?"))return;
  trips.splice(i,1);
  previewLine.setLatLngs([]);
  updateUI();
  save(true);
}

function clearTripPreview(){
  previewLine.setLatLngs([]);
  toast("Preview cleared");
}

function backup(){
  const data={walked,explored,visited,routePath,mode,trips,currentTrip,exportedAt:new Date().toISOString()};
  const text=JSON.stringify(data,null,2);
  navigator.clipboard.writeText(text).then(()=>toast("Backup copied")).catch(()=>prompt("Copy backup:",text));
}

function importData(){
  const text=prompt("Paste backup JSON");
  if(!text)return;
  try{
    const data=JSON.parse(text);
    walked=Number(data.walked||0);
    explored=Number(data.explored||0);
    visited=data.visited||{};
    routePath=(data.routePath||[]).slice(-1600);
    mode=data.mode||"walk";
    trips=data.trips||[];
    currentTrip=data.currentTrip||null;
    updateRoute();
    updateUI();
    requestFogDraw();
    save(true);
    toast("Import complete");
  }catch(e){
    toast("Import error");
  }
}

function resetData(){
  if(prompt("Type DELETE to reset all data")!=="DELETE"){
    toast("Cancelled");
    return;
  }
  Object.keys(localStorage).forEach(key=>{if(key.startsWith(KEY))localStorage.removeItem(key)});
  location.reload();
}

function onGPS(pos){
  const rawLat=pos.coords.latitude;
  const rawLng=pos.coords.longitude;
  const acc=pos.coords.accuracy||null;
  const now=Date.now();

  accuracy=acc;
  gpsQueue.push({lat:rawLat,lng:rawLng,acc});
  if(gpsQueue.length>5)gpsQueue.shift();

  let avgLat=0,avgLng=0;
  gpsQueue.forEach(p=>{avgLat+=p.lat;avgLng+=p.lng});
  avgLat/=gpsQueue.length;
  avgLng/=gpsQueue.length;

  if(lat===null||lng===null){
    lat=avgLat;
    lng=avgLng;
  }else{
    const smooth=gpsQuality()==="Good"?.30:.16;
    lat=lat*(1-smooth)+avgLat*smooth;
    lng=lng*(1-smooth)+avgLng*smooth;
  }

  updateUserDot();
  updateAccuracyCircle();

  if(firstFix){
    suppressMapEvent=true;
    map.setView([lat,lng],17);
    setTimeout(()=>{suppressMapEvent=false},700);
    firstFix=false;
  }

  let accepted=false;

  if(lastAccepted){
    const distance=map.distance([lastAccepted.lat,lastAccepted.lng],[lat,lng]);
    const seconds=(now-lastAccepted.time)/1000;

    if(shouldAcceptMovement(distance,seconds,acc)){
      if(gpsQuality()==="Good"){
        walked+=distance;
        if(currentTrip)currentTrip.distance=(currentTrip.distance||0)+distance;
      }

      accepted=true;
      const from=[lastAccepted.lat,lastAccepted.lng];
      const to=[lat,lng];

      revealBetween(from,to);

      if(gpsQuality()==="Good"&&!indoorLock)addRoutePoint(lat,lng);

      lastAccepted={lat,lng,time:now};
    }
  }else{
    lastAccepted={lat,lng,time:now};
    revealBetween([lat,lng],[lat,lng]);
    if(gpsQuality()==="Good"&&!indoorLock)addRoutePoint(lat,lng);
  }

  if(exploring&&!paused)addVisitedAt(lat,lng,true);

  updateStatus(accepted);
  updateUI();
  requestFogDraw();
  updateUserDot();
  updateAccuracyCircle();
  followMap();
}

function onGPSError(){
  document.getElementById("status").innerText="GPS error";
  toast("Please allow location access");
}

updateUI();
requestFogDraw();
updateRoute();
renderTrips();
</script>
</body>
</html>
