<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>WanderGlow</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --glass:rgba(18,25,32,.34);
  --glass2:rgba(255,255,255,.12);
  --mint:#63f7bf;
  --blue:#74b9ff;
}
html,body{margin:0;height:100%;overflow:hidden;background:#0b1218;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#mapColor,#mapGray{position:fixed;inset:0;height:100vh;width:100vw}
#mapColor{z-index:1}
#mapGray{z-index:2;filter:grayscale(1) brightness(.78) contrast(.95) sepia(.08) hue-rotate(165deg)}
#fogCanvas{position:fixed;inset:0;z-index:3;pointer-events:none}
.leaflet-control-attribution{display:none}

.glass{
  background:var(--glass);
  backdrop-filter:blur(26px);
  -webkit-backdrop-filter:blur(26px);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 18px 45px rgba(0,0,0,.25);
}
.sheet{
  position:fixed;left:14px;right:14px;bottom:18px;z-index:20;
  color:white;border-radius:28px;padding:14px;
}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px}
.brand b{font-size:22px}.brand small{opacity:.78}
.stats{display:flex;gap:8px;margin-top:12px}
.box{flex:1;background:var(--glass2);border-radius:18px;padding:9px;text-align:center}
.box b{font-size:18px}.box span{display:block;font-size:11px;opacity:.75;text-transform:uppercase}
button{border:0;border-radius:16px;padding:13px 14px;font-size:15px;font-weight:800}
.start{background:linear-gradient(135deg,#63f7bf,#b4ffe2);color:#062015;min-width:96px}
.dark{background:rgba(255,255,255,.13);color:white}
.blue{background:linear-gradient(135deg,#4d96ff,#8ed5ff);color:white}
.red{background:rgba(130,20,20,.8);color:white}
.fab{position:fixed;right:16px;bottom:138px;display:flex;flex-direction:column;gap:10px;z-index:20}
.circle{width:52px;height:52px;border-radius:50%;font-size:20px;color:white}
.modal{
  display:none;position:fixed;left:0;right:0;bottom:0;top:18%;z-index:30;
  color:white;padding:20px;border-radius:30px 30px 0 0;overflow:auto;
}
.handle{width:46px;height:5px;background:rgba(255,255,255,.35);border-radius:99px;margin:0 auto 16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.menuBtn{background:rgba(255,255,255,.11);color:white;text-align:left;padding:16px;border-radius:20px}
.item{background:rgba(255,255,255,.10);margin:10px 0;padding:13px;border-radius:16px}
</style>
</head>
<body>

<div id="mapColor"></div>
<div id="mapGray"></div>
<canvas id="fogCanvas"></canvas>

<div class="fab">
  <button class="circle glass" onclick="addPlace()">⭐</button>
  <button class="circle glass" onclick="openMenu()">☰</button>
</div>

<div class="sheet glass">
  <div class="top">
    <div class="brand">
      <b>WanderGlow</b><br>
      <small id="status">Your world is waiting</small>
    </div>
    <button class="start" onclick="start()">Explore</button>
  </div>
  <div class="stats">
    <div class="box"><b id="km">0.00</b><span>km</span></div>
    <div class="box"><b id="zones">0</b><span>opened</span></div>
    <div class="box"><b id="gems">0</b><span>gems</span></div>
  </div>
</div>

<div id="menu" class="modal glass">
  <div class="handle"></div>
  <h2>WanderGlow</h2>
  <p style="opacity:.75">Открывай мир вокруг себя. Цветными остаются только места, где ты уже был.</p>
  <div class="grid">
    <button class="menuBtn" onclick="loadNearbyGems()">✨<br>Find gems</button>
    <button class="menuBtn" onclick="showGems()">🗺️<br>Nearby gems</button>
    <button class="menuBtn" onclick="showPlaces()">⭐<br>My places</button>
    <button class="menuBtn" onclick="centerMe()">📍<br>My location</button>
  </div>
  <br>
  <button class="red" style="width:100%" onclick="deleteAll()">Delete all data</button>
  <button class="dark" style="width:100%;margin-top:10px" onclick="closeMenu()">Close</button>
  <div id="list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const colorMap=L.map('mapColor',{zoomControl:false,attributionControl:false}).setView([56.9496,24.1052],13);
const grayMap=L.map('mapGray',{zoomControl:true,attributionControl:false}).setView([56.9496,24.1052],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(colorMap);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(grayMap);

let syncing=false;
function sync(from,to){
  if(syncing)return;
  syncing=true;
  to.setView(from.getCenter(),from.getZoom(),{animate:false});
  syncing=false;
  drawFog();
}
colorMap.on('move zoom',()=>sync(colorMap,grayMap));
grayMap.on('move zoom',()=>sync(grayMap,colorMap));

const canvas=document.getElementById('fogCanvas');
const ctx=canvas.getContext('2d');

let watch=null,current=null,last=null;
let total=Number(localStorage.total||0);
let zonesData=JSON.parse(localStorage.zones||'[]');
let places=JSON.parse(localStorage.places||'[]');
let gemsData=JSON.parse(localStorage.gemsData||'[]');
let unlocked=JSON.parse(localStorage.unlockedGems||'[]');
let gemMarkers=[];

function resizeCanvas(){
  const w=document.documentElement.clientWidth;
  const h=document.documentElement.clientHeight;
  const d=window.devicePixelRatio||1;
  canvas.width=w*d;
  canvas.height=h*d;
  canvas.style.width=w+'px';
  canvas.style.height=h+'px';
  ctx.setTransform(d,0,0,d,0,0);
  drawFog();
}

function drawFog(){
  const w=document.documentElement.clientWidth;
  const h=document.documentElement.clientHeight;
  ctx.clearRect(0,0,w,h);

  ctx.fillStyle='rgba(245,245,245,0.01)';
  ctx.fillRect(0,0,w,h);

  zonesData.forEach(z=>{
    const p=grayMap.latLngToContainerPoint(z);
    const r=metersToPixels(z,24);
    ctx.globalCompositeOperation='destination-out';

    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
    g.addColorStop(0,'rgba(0,0,0,1)');
    g.addColorStop(.72,'rgba(0,0,0,.82)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fill();
  });

  grayMap.getContainer().style.webkitMaskImage = canvasToMask();
  grayMap.getContainer().style.maskImage = canvasToMask();
  ctx.globalCompositeOperation='source-over';
}

function canvasToMask(){
  return 'url('+canvas.toDataURL()+')';
}

function metersToPixels(latlng,meters){
  const p1=grayMap.latLngToContainerPoint(latlng);
  const lng=latlng[1]+meters/(111320*Math.cos(latlng[0]*Math.PI/180));
  const p2=grayMap.latLngToContainerPoint([latlng[0],lng]);
  return Math.max(16,Math.min(90,Math.abs(p2.x-p1.x)));
}

function save(){
  localStorage.total=total;
  localStorage.zones=JSON.stringify(zonesData);
  localStorage.places=JSON.stringify(places);
  localStorage.gemsData=JSON.stringify(gemsData);
  localStorage.unlockedGems=JSON.stringify(unlocked);
}

function ui(){
  km.innerText=(total/1000).toFixed(2);
  zones.innerText=zonesData.length;
  gems.innerText=unlocked.length;
}

function drawPlace(p){
  L.marker([p.lat,p.lng]).addTo(colorMap).bindPopup('⭐ '+p.name);
}

function clearGemMarkers(){
  gemMarkers.forEach(m=>colorMap.removeLayer(m));
  gemMarkers=[];
}

function drawGems(){
  clearGemMarkers();
  gemsData.forEach(g=>{
    const done=unlocked.includes(g.id);
    const m=L.marker([g.lat,g.lng]).addTo(colorMap).bindPopup((done?'✅ ':'🔒 ')+g.icon+' '+g.name);
    gemMarkers.push(m);
  });
}

function iconFor(tags){
  if(tags.tourism)return'🏛️';
  if(tags.historic)return'🏰';
  if(tags.amenity==='restaurant'||tags.amenity==='cafe')return'🍽️';
  if(tags.leisure==='park')return'🌳';
  if(tags.natural)return'🌿';
  return'✨';
}

places.forEach(drawPlace);
drawGems();
ui();

window.addEventListener('resize',resizeCanvas);
window.addEventListener('orientationchange',()=>setTimeout(resizeCanvas,500));
setTimeout(resizeCanvas,300);
setTimeout(resizeCanvas,1000);

function start(){
  if(!navigator.geolocation){status.innerText='GPS not supported';return}
  status.innerText='Finding GPS...';

  watch=navigator.geolocation.watchPosition(pos=>{
    current=[pos.coords.latitude,pos.coords.longitude];
    grayMap.setView(current,16);

    if(last){
      const d=grayMap.distance(last,current);
      if(d>3&&d<1000)total+=d;
    }
    last=current;

    if(!zonesData.some(z=>grayMap.distance(z,current)<18)){
      zonesData.push(current);
      drawFog();
    }

    gemsData.forEach(g=>{
      if(!unlocked.includes(g.id)&&grayMap.distance(current,[g.lat,g.lng])<80){
        unlocked.push(g.id);
        alert('✨ New place discovered: '+g.name);
        drawGems();
      }
    });

    status.innerText='Exploring...';
    save();ui();
  },e=>status.innerText='GPS error: '+e.message,{enableHighAccuracy:true,maximumAge:0,timeout:15000});
}

async function loadNearbyGems(){
  if(!current){alert('Нажми Explore и дождись GPS');return}
  status.innerText='Searching nearby gems...';

  const lat=current[0],lng=current[1],radius=2500;
  const query=`
  [out:json][timeout:25];
  (
    node(around:${radius},${lat},${lng})["tourism"];
    node(around:${radius},${lat},${lng})["historic"];
    node(around:${radius},${lat},${lng})["amenity"~"restaurant|cafe"];
    node(around:${radius},${lat},${lng})["leisure"="park"];
    node(around:${radius},${lat},${lng})["natural"];
  );
  out 40;
  `;
  try{
    const res=await fetch('https://overpass-api.de/api/interpreter?data='+encodeURIComponent(query));
    const data=await res.json();
    gemsData=data.elements.filter(e=>e.lat&&e.lon&&e.tags&&e.tags.name).slice(0,40).map(e=>({
      id:String(e.id),name:e.tags.name,lat:e.lat,lng:e.lon,icon:iconFor(e.tags)
    }));
    save();drawGems();showGems();status.innerText='Gems found ✨';
  }catch(e){
    status.innerText='Could not load gems';
    alert('Не удалось загрузить интересные места. Попробуй позже.');
  }
}

function addPlace(){
  if(!current){alert('Нажми Explore и дождись GPS');return}
  const name=prompt('Название места:');
  if(!name)return;
  const p={name,lat:current[0],lng:current[1],date:new Date().toLocaleDateString()};
  places.push(p);drawPlace(p);save();ui();
}

function openMenu(){menu.style.display='block'}
function closeMenu(){menu.style.display='none'}
function centerMe(){if(current)grayMap.setView(current,16);else alert('GPS ещё не найден')}

function showPlaces(){
  list.innerHTML='<h3>My places</h3>';
  places.forEach(p=>{
    list.innerHTML+=`<div class="item"><b>⭐ ${p.name}</b><br><small>${p.date}</small><br><br><button class="blue" onclick="grayMap.setView([${p.lat},${p.lng}],17);closeMenu()">Show</button></div>`;
  });
}

function showGems(){
  list.innerHTML='<h3>Nearby gems</h3>';
  gemsData.forEach(g=>{
    const done=unlocked.includes(g.id);
    list.innerHTML+=`<div class="item"><b>${done?'✅':'🔒'} ${g.icon} ${g.name}</b><br><br><button class="blue" onclick="grayMap.setView([${g.lat},${g.lng}],17);closeMenu()">Go</button></div>`;
  });
}

function deleteAll(){
  const t=prompt('Для удаления всех данных напиши DELETE');
  if(t==='DELETE'){localStorage.clear();location.reload()}else alert('Отмена');
}
</script>
</body>
</html>
