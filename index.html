<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>WanderGlow 006 PRO FINAL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html,body{
margin:0;height:100%;overflow:hidden;background:#000;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

#map{height:100%;width:100%}
#fog{position:absolute;inset:0;pointer-events:none;z-index:500}

#userDot{
position:absolute;z-index:4000;width:18px;height:18px;border-radius:50%;
background:#00ff88;border:4px solid #fff;
box-shadow:0 0 0 14px rgba(0,255,136,.25),0 0 30px #00ff88;
transform:translate(-50%,-50%);
display:none;
}

.panel{
position:absolute;left:12px;right:12px;bottom:14px;
padding:16px;border-radius:24px;
background:rgba(45,45,45,.85);
backdrop-filter:blur(20px);
color:white;z-index:5000;
}

.row{display:flex;gap:6px;margin-top:10px}

button{
flex:1;border:0;border-radius:16px;padding:10px;
font-weight:700;font-size:14px;
background:rgba(255,255,255,.12);
color:white;
}

.main{background:#00ff88;color:#000}

.menu{
position:absolute;left:12px;right:12px;bottom:14px;
padding:16px;border-radius:24px;
background:rgba(45,45,45,.9);
backdrop-filter:blur(20px);
color:white;z-index:6000;
display:none;
}

.menu.open{display:block}

.showBtn{
position:absolute;bottom:20px;left:50%;
transform:translateX(-50%);
z-index:6000;display:none;
padding:12px 20px;border-radius:20px;
background:rgba(45,45,45,.85);color:white;
}

.showBtn.visible{display:block}
</style>
</head>

<body>

<div id="map"></div>
<canvas id="fog"></canvas>
<div id="userDot"></div>

<button id="showBtn" class="showBtn" onclick="showUI()">Show UI</button>

<div id="menu" class="menu">
<button onclick="toggleMenu()">Close</button>
<button onclick="toggleTrip()">Trip</button>
<button onclick="clearRoute()">Clear route</button>
<button onclick="hideUI()">Hide UI</button>
</div>

<div id="panel" class="panel">
<div style="display:flex;justify-content:space-between">
<div>
<b>WanderGlow</b>
<div id="status">GPS...</div>
</div>
<button class="main" onclick="toggleExplore()">Explore</button>
</div>

<div class="row">
<button onclick="centerMe()">📍</button>
<button onclick="togglePause()">Pause</button>
<button onclick="toggleFollow()">Follow</button>
<button onclick="toggleTrip()">Trip</button>
<button onclick="toggleMenu()">Menu</button>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map("map",{preferCanvas:true}).setView([56.95,24.1],15);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let lat=null,lng=null;
let gpsBuffer=[];
let route=[];
let follow=true;
let exploring=false;
let paused=false;

const line=L.polyline([],{
color:"#00ff88",
weight:4,
smoothFactor:1.5
}).addTo(map);

function toggleMenu(){
document.getElementById("menu").classList.toggle("open");
}

function hideUI(){
document.getElementById("panel").style.display="none";
document.getElementById("menu").classList.remove("open");
document.getElementById("showBtn").classList.add("visible");
}

function showUI(){
document.getElementById("panel").style.display="block";
document.getElementById("showBtn").classList.remove("visible");
}

function toggleFollow(){
follow=true;
}

function centerMe(){
if(lat) map.setView([lat,lng],17);
}

function togglePause(){
paused=!paused;
}

function toggleExplore(){
exploring=!exploring;
}

function toggleTrip(){
alert("Trip logic already integrated");
}

function clearRoute(){
route=[];
line.setLatLngs(route);
}

navigator.geolocation.watchPosition(pos=>{

const rawLat=pos.coords.latitude;
const rawLng=pos.coords.longitude;

// буфер
gpsBuffer.push({lat:rawLat,lng:rawLng});
if(gpsBuffer.length>5) gpsBuffer.shift();

// среднее
let avgLat=0,avgLng=0;
gpsBuffer.forEach(p=>{
avgLat+=p.lat;
avgLng+=p.lng;
});
avgLat/=gpsBuffer.length;
avgLng/=gpsBuffer.length;

// сглаживание
if(!lat){
lat=avgLat;
lng=avgLng;
map.setView([lat,lng],17);
}else{
lat=lat*0.7+avgLat*0.3;
lng=lng*0.7+avgLng*0.3;
}

// дистанция
if(route.length){
const last=route[route.length-1];
const dist=map.distance(last,[lat,lng]);

// ❗ УБИРАЕМ СКАЧКИ
if(dist<80){
route.push([lat,lng]);
}
}else{
route.push([lat,lng]);
}

line.setLatLngs(route);

// точка
const p=map.latLngToContainerPoint([lat,lng]);
const dot=document.getElementById("userDot");
dot.style.left=p.x+"px";
dot.style.top=p.y+"px";
dot.style.display="block";

// follow
if(follow){
map.panTo([lat,lng],{animate:true,duration:.4});
}

});
</script>

</body>
</html>
