<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WanderGlow</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#05080a;
  color:white;
}
#map {
  height:100vh;
}

/* карта темная */
.leaflet-tile-pane {
  filter:grayscale(1) brightness(0.3);
}

/* пользователь */
.user {
  width:18px;
  height:18px;
  border-radius:50%;
  background:#7dffd0;
  border:3px solid white;
  box-shadow:0 0 15px #7dffd0;
  animation:pulse 1.5s infinite;
}
@keyframes pulse {
  0%{box-shadow:0 0 0px #7dffd0}
  50%{box-shadow:0 0 20px #7dffd0}
  100%{box-shadow:0 0 0px #7dffd0}
}

/* панель */
.panel {
  position:fixed;
  bottom:20px;
  left:20px;
  right:20px;
  padding:15px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
}

/* кнопки */
button {
  padding:10px 14px;
  border:none;
  border-radius:15px;
  margin:5px;
  background:#222;
  color:white;
  font-size:16px;
  transition:0.15s;
}
button:active {
  transform:scale(0.9);
  filter:brightness(1.5);
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <button onclick="start()">Explore</button>
  <button onclick="stop()">Stop</button>
  <button onclick="centerMe()">📍</button>

  <div>XP: <span id="xp">0</span></div>
  <div>Cells: <span id="cells">0</span></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([56.95,24.1],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19,
  attribution:'© OpenStreetMap contributors'
}).addTo(map);

let watch = null;
let current = null;
let userMarker = null;

let opened = JSON.parse(localStorage.opened || "{}");
let xp = Number(localStorage.xp || 0);

/* отрисовка открытых зон */
function drawAll() {
  for (let key in opened) {
    let [lat,lng] = key.split("_").map(Number);

    L.circle([lat,lng],{
      radius:25,
      fillColor:"#fff",
      fillOpacity:0.15,
      stroke:false
    }).addTo(map);

    L.circle([lat,lng],{
      radius:40,
      fillColor:"#7dffd0",
      fillOpacity:0.05,
      stroke:false
    }).addTo(map);
  }
}
drawAll();

/* GPS */
function start() {
  if (watch) return;

  watch = navigator.geolocation.watchPosition(pos=>{
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    current = [lat,lng];

    if (!userMarker) {
      userMarker = L.marker(current,{
        icon:L.divIcon({
          className:"",
          html:'<div class="user"></div>'
        })
      }).addTo(map);
    } else {
      userMarker.setLatLng(current);
    }

    map.setView(current,17);

    let key = lat.toFixed(5)+"_"+lng.toFixed(5);

    if (!opened[key]) {
      opened[key] = true;

      L.circle(current,{
        radius:25,
        fillColor:"#fff",
        fillOpacity:0.2,
        stroke:false
      }).addTo(map);

      L.circle(current,{
        radius:40,
        fillColor:"#7dffd0",
        fillOpacity:0.05,
        stroke:false
      }).addTo(map);

      xp += 10;

      localStorage.opened = JSON.stringify(opened);
      localStorage.xp = xp;

      document.getElementById("xp").innerText = xp;
      document.getElementById("cells").innerText = Object.keys(opened).length;
    }

  },{
    enableHighAccuracy:true
  });
}

/* стоп */
function stop() {
  if (watch) {
    navigator.geolocation.clearWatch(watch);
    watch = null;
  }
}

/* центр */
function centerMe() {
  if (current) {
    map.setView(current,17);
  }
}

/* UI */
document.getElementById("xp").innerText = xp;
document.getElementById("cells").innerText = Object.keys(opened).length;
</script>

</body>
</html>
