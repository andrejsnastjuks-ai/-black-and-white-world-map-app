<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WanderGlow</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;background:#010305;font-family:-apple-system;overflow:hidden}
#map{height:100vh;filter:grayscale(1) brightness(.22)}

.panel{
position:fixed;left:12px;right:12px;bottom:12px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:10px;color:white;
}

.top{display:flex;justify-content:space-between;align-items:center}

.stats{display:flex;margin-top:8px}

.box{flex:1;text-align:center;font-size:12px}

button{
border:0;border-radius:10px;padding:8px 10px;font-weight:bold
}

.fab{
position:fixed;
right:12px;top:60px;
display:flex;flex-direction:column;gap:8px;
}

.btn{
width:46px;height:46px;border-radius:50%;
background:rgba(255,255,255,.1);color:white;
}

.user{
width:18px;height:18px;border-radius:50%;
background:#7dffd0;border:3px solid white;
box-shadow:0 0 20px #7dffd0;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 5px rgba(125,255,208,.3)}
70%{box-shadow:0 0 0 20px rgba(125,255,208,0)}
100%{box-shadow:0 0 0 5px rgba(125,255,208,0)}
}

.modal{
display:none;
position:fixed;
left:12px;right:12px;bottom:12px;
background:rgba(20,20,20,.9);
backdrop-filter:blur(20px);
border-radius:20px;
padding:15px;
color:white;
max-height:70vh;
overflow:auto;
}

.item{
background:rgba(255,255,255,.08);
margin-top:8px;
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="fab">
<button class="btn" onclick="center()">📍</button>
<button class="btn" onclick="openPlace()">⭐</button>
<button class="btn" onclick="openMenu()">☰</button>
</div>

<div class="panel">
<div class="top">
<div>
<b>WanderGlow</b><br>
<small id="status">Ready</small>
</div>
<button onclick="start()">Explore</button>
</div>

<div class="stats">
<div class="box">KM<br><b id="km">0</b></div>
<div class="box">Cells<br><b id="cells">0</b></div>
<div class="box">Progress<br><b id="progress">0%</b></div>
</div>
</div>

<div id="menu" class="modal">
<h3>Menu</h3>

<button onclick="showPlaces()">My places</button>
<button onclick="exportData()">Backup</button>
<button onclick="importData()">Import</button>
<button onclick="resetData()">Reset</button>
<button onclick="closeMenu()">Close</button>

<div id="list"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map('map').setView([56.95,24.1],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19,
attribution:'© OpenStreetMap contributors'
}).addTo(map);

let watch=null,current=null,last=null,userMarker=null;
let follow=true,total=Number(localStorage.total||0);

let gridSize=0.002;
let openedCells=JSON.parse(localStorage.grid||'{}');
let places=JSON.parse(localStorage.places||'[]');

function save(){
localStorage.grid=JSON.stringify(openedCells);
localStorage.places=JSON.stringify(places);
localStorage.total=total;
}

function cellKey(lat,lng){
return Math.floor(lat/gridSize)+"_"+Math.floor(lng/gridSize);
}

function drawCell(lat,lng){
let bounds=[[lat,lng],[lat+gridSize,lng+gridSize]];
L.rectangle(bounds,{
fillColor:'#7dffd0',
fillOpacity:.25,
stroke:false
}).addTo(map);
}

Object.keys(openedCells).forEach(key=>{
let parts=key.split('_');
let lat=parts[0]*gridSize;
let lng=parts[1]*gridSize;
drawCell(lat,lng);
});

function drawUser(p){
const icon=L.divIcon({
html:'<div class="user"></div>',
className:''
});
if(userMarker){
userMarker.setLatLng(p);
}else{
userMarker=L.marker(p,{icon}).addTo(map);
}
}

function updateUI(){
km.innerText=(total/1000).toFixed(2);
cells.innerText=Object.keys(openedCells).length;
progress.innerText=(Object.keys(openedCells).length*0.3).toFixed(1)+'%';
}

map.on('dragstart',()=>follow=false);

function start(){
watch=navigator.geolocation.watchPosition(pos=>{
current=[pos.coords.latitude,pos.coords.longitude];

drawUser(current);

if(follow) map.setView(current,16);

if(last){
let d=map.distance(last,current);
if(d>3&&d<1000) total+=d;
}
last=current;

let key=cellKey(current[0],current[1]);

if(!openedCells[key]){
openedCells[key]=true;
drawCell(current[0],current[1]);

if(navigator.vibrate) navigator.vibrate(30);
}

updateUI();
save();

},{enableHighAccuracy:true});
}

function center(){
if(current){
follow=true;
map.setView(current,16);
}
}

function openMenu(){menu.style.display='block'}
function closeMenu(){menu.style.display='none'}

function openPlace(){
if(!current){alert("Нажми Explore");return}
let name=prompt("Название:");
if(!name)return;
places.push({name,lat:current[0],lng:current[1]});
save();
alert("Saved");
}

function showPlaces(){
list.innerHTML='';
places.forEach(p=>{
list.innerHTML+=`<div class="item">${p.name}</div>`;
});
}

function exportData(){
let data=JSON.stringify({openedCells,places,total});
navigator.clipboard.writeText(data);
alert("Copied");
}

function importData(){
let data=prompt("Paste data:");
if(!data)return;
let d=JSON.parse(data);
openedCells=d.openedCells||{};
places=d.places||[];
total=d.total||0;
save();
location.reload();
}

function resetData(){
if(confirm("Delete all?")){
localStorage.clear();
location.reload();
}
}

updateUI();
</script>

</body>
</html>
