<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WanderGlow</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;background:#0f1720;font-family:-apple-system,sans-serif}

#map{
 height:100vh;
 filter:grayscale(0.85) brightness(0.85) contrast(0.95);
}

.sheet{
 position:fixed;
 left:14px;right:14px;bottom:18px;
 background:rgba(255,255,255,0.12);
 backdrop-filter:blur(25px);
 border-radius:24px;
 padding:14px;
 color:white;
}

.top{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.stats{
 display:flex;
 gap:8px;
 margin-top:10px;
}

.box{
 flex:1;
 background:rgba(255,255,255,0.1);
 border-radius:12px;
 padding:8px;
 text-align:center;
}

button{
 border:0;
 border-radius:12px;
 padding:12px;
 font-weight:bold;
}

.start{
 background:#5ef0b0;
 color:black;
}

.circleBtn{
 position:fixed;
 right:16px;
 bottom:120px;
 width:50px;
 height:50px;
 border-radius:50%;
 background:rgba(0,0,0,0.5);
 color:white;
}
</style>
</head>

<body>

<div id="map"></div>

<button class="circleBtn" onclick="addPlace()">⭐</button>

<div class="sheet">
 <div class="top">
   <div>
     <b>WanderGlow</b><br>
     <small id="status">Your world is waiting</small>
   </div>
   <button class="start" onclick="start()">Explore</button>
 </div>

 <div class="stats">
   <div class="box"><b id="km">0</b><br>km</div>
   <div class="box"><b id="zones">0</b><br>opened</div>
   <div class="box"><b id="gems">0</b><br>gems</div>
 </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([56.9496,24.1052],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 maxZoom:19
}).addTo(map);

let zones=[];
let watch=null;
let current=null;

function start(){
 navigator.geolocation.watchPosition(pos=>{
   current=[pos.coords.latitude,pos.coords.longitude];
   map.setView(current,16);

   // проверка чтобы не дублировать точки
   if(!zones.some(z=>map.distance(z,current)<20)){
     zones.push(current);

     // рисуем цветной круг
     L.circle(current,{
       radius:20,
       color:null,
       fillColor:"#00ff88",
       fillOpacity:0.35
     }).addTo(map);
   }

   status.innerText="Exploring...";
 });
}

function addPlace(){
 if(!current){alert("Нажми Explore");return;}
 L.marker(current).addTo(map).bindPopup("⭐ My place");
}
</script>

</body>
</html>
