<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WanderGlow PRO</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;background:#010305;font-family:-apple-system;overflow:hidden}
#map{height:100vh;filter:grayscale(1) brightness(.22)}

.panel{
position:fixed;left:12px;right:12px;bottom:12px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:10px;color:white;
}

.top{display:flex;justify-content:space-between}
.box{flex:1;text-align:center;font-size:12px}

.fab{
position:fixed;
right:12px;top:60px;
display:flex;flex-direction:column;gap:8px;
}

.btn{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.1);color:white;border:0}

.user{
width:18px;height:18px;border-radius:50%;
background:#7dffd0;border:3px solid white;
box-shadow:0 0 20px #7dffd0;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 5px rgba(125,255,208,.3)}
70%{box-shadow:0 0 0 20px rgba(125,255,208,0)}
100%{box-shadow:0 0 0 5px rgba(125,255,208,0)}
}
</style>
</head>

<body>

<div id="map"></div>

<div class="fab">
<button class="btn" onclick="center()">📍</button>
</div>

<div class="panel">
<div class="top">
<div>WanderGlow</div>
<button onclick="start()">Explore</button>
</div>
<div style="display:flex">
<div class="box">KM<br><b id="km">0</b></div>
<div class="box">Cells<br><b id="cells">0</b></div>
<div class="box">Progress<br><b id="progress">0%</b></div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map('map').setView([56.95,24.1],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19,
attribution:'© OpenStreetMap contributors'
}).addTo(map);

let watch=null,current=null,last=null,userMarker=null;
let follow=true,total=0;

let gridSize=0.002; // размер клетки
let openedCells={};

function cellKey(lat,lng){
let x=Math.floor(lat/gridSize);
let y=Math.floor(lng/gridSize);
return x+"_"+y;
}

function drawCell(lat,lng){
let bounds=[
[lat, lng],
[lat+gridSize, lng+gridSize]
];

L.rectangle(bounds,{
color:null,
fillColor:'#7dffd0',
fillOpacity:.25
}).addTo(map);
}

function drawUser(p){
const icon=L.divIcon({
html:'<div class="user"></div>',
className:'',
iconSize:[24,24]
});

if(userMarker){
userMarker.setLatLng(p);
}else{
userMarker=L.marker(p,{icon}).addTo(map);
}
}

function updateUI(){
km.innerText=(total/1000).toFixed(2);
cells.innerText=Object.keys(openedCells).length;
progress.innerText=(Object.keys(openedCells).length*0.3).toFixed(1)+"%";
}

map.on('dragstart',()=>follow=false);

function start(){
navigator.geolocation.watchPosition(pos=>{
current=[pos.coords.latitude,pos.coords.longitude];

drawUser(current);

if(follow) map.setView(current,16);

if(last){
let d=map.distance(last,current);
if(d>3 && d<1000) total+=d;
}
last=current;

let key=cellKey(current[0],current[1]);

if(!openedCells[key]){
openedCells[key]=true;
drawCell(current[0],current[1]);

if(navigator.vibrate) navigator.vibrate(20);
}

updateUI();

},{enableHighAccuracy:true});
}

function center(){
if(current){
follow=true;
map.setView(current,16);
}
}
</script>

</body>
</html>
