<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WanderGlow Reveal</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

#map{
  height:100%;
}

/* Карта изначально почти чёрная */
.leaflet-tile-pane{
  filter:brightness(.12) grayscale(1) contrast(1.1);
}

/* Слой открытия */
#reveal{
  position:absolute;
  inset:0;
  z-index:500;
  pointer-events:none;
}

/* зелёная точка */
.userDot{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#00ff88;
  border:4px solid white;
  box-shadow:0 0 0 12px rgba(0,255,136,.22),0 0 30px #00ff88;
}

.panel,.menu,.toast{
  background:rgba(70,70,70,.72);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  color:white;
}

.panel{
  position:absolute;
  left:14px;
  right:14px;
  bottom:18px;
  z-index:9999;
  padding:18px;
  border-radius:28px;
}

.title{
  font-size:32px;
  font-weight:900;
}

.status{
  margin-top:4px;
  color:rgba(255,255,255,.7);
  font-size:16px;
}

.row{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.stat{
  flex:1;
  text-align:center;
  padding:14px 8px;
  border-radius:20px;
  background:rgba(255,255,255,.10);
}

.stat b{font-size:28px}
.stat small{color:rgba(255,255,255,.65)}

button{
  border:0;
  border-radius:18px;
  padding:14px;
  font-weight:900;
  font-size:16px;
  color:white;
  background:rgba(255,255,255,.12);
}

button:active{transform:scale(.94)}

.main{
  background:linear-gradient(135deg,#00ff88,#baffdd);
  color:#052215;
}

.main.active{
  background:linear-gradient(135deg,#4d96ff,#9bd8ff);
  color:white;
}

.menu{
  display:none;
  position:absolute;
  left:14px;
  right:14px;
  bottom:18px;
  z-index:10000;
  padding:20px;
  border-radius:28px;
}

.menu.open{display:block}

.toast{
  position:absolute;
  top:22px;
  left:18px;
  right:18px;
  z-index:12000;
  padding:14px;
  border-radius:18px;
  opacity:0;
  transition:.25s;
  font-weight:800;
}
</style>
</head>

<body>

<div id="map"></div>
<canvas id="reveal"></canvas>
<div id="toast" class="toast"></div>

<div id="menu" class="menu">
  <button onclick="centerMe()" style="width:100%">📍 My location</button>
  <button onclick="backup()" style="width:100%;margin-top:10px">Backup</button>
  <button onclick="resetData()" style="width:100%;margin-top:10px;background:#9e2f2f">Reset</button>
  <button onclick="toggleMenu()" style="width:100%;margin-top:10px">Close</button>
</div>

<div class="panel">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
    <div>
      <div class="title">WanderGlow</div>
      <div id="status" class="status">Waiting for GPS...</div>
    </div>
    <button id="exploreBtn" class="main" onclick="toggleExplore()">Explore</button>
  </div>

  <div class="row">
    <div class="stat"><b id="cellsView">0</b><br><small>Cells</small></div>
    <div class="stat"><b id="xpView">0</b><br><small>XP</small></div>
    <div class="stat"><b id="levelView">1</b><br><small>Level</small></div>
  </div>

  <div class="row">
    <button style="flex:1" onclick="centerMe()">📍</button>
    <button style="flex:1" onclick="toggleMenu()">Menu</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([56.95,24.1],15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19,
  attribution:"© OpenStreetMap"
}).addTo(map);

let lat=null,lng=null;
let marker=null;
let firstFix=true;
let exploring=false;

let xp=Number(localStorage.wg_reveal_xp||0);
let cells=JSON.parse(localStorage.wg_reveal_cells||"{}");

const revealCanvas=document.getElementById("reveal");
const ctx=revealCanvas.getContext("2d");

function resizeReveal(){
  revealCanvas.width=window.innerWidth;
  revealCanvas.height=window.innerHeight;
  drawReveal();
}

window.addEventListener("resize",resizeReveal);
map.on("move zoom",drawReveal);
resizeReveal();

function cellKey(a,b){
  return Math.floor(a*1000)+"_"+Math.floor(b*1000);
}

function cellCenter(key){
  const p=key.split("_");
  return [
    (Number(p[0])+0.5)/1000,
    (Number(p[1])+0.5)/1000
  ];
}

function level(){
  return Math.floor(xp/100)+1;
}

function save(){
  localStorage.wg_reveal_xp=xp;
  localStorage.wg_reveal_cells=JSON.stringify(cells);
}

function updateUI(){
  document.getElementById("xpView").innerText=xp;
  document.getElementById("cellsView").innerText=Object.keys(cells).length;
  document.getElementById("levelView").innerText=level();
  save();
}

function toast(text){
  const el=document.getElementById("toast");
  el.innerText=text;
  el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,2000);
}

function drawUser(){
  const icon=L.divIcon({
    html:'<div class="userDot"></div>',
    className:'',
    iconSize:[34,34],
    iconAnchor:[17,17]
  });

  if(!marker){
    marker=L.marker([lat,lng],{
      icon,
      zIndexOffset:10000
    }).addTo(map).bindPopup("Ты здесь");
  }else{
    marker.setLatLng([lat,lng]);
  }
}

/* ВАЖНО:
   Canvas затемняет всё чёрным.
   Потом вырезает круги в местах, где ты был.
*/
function revealCircle(x,y,r){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,"rgba(0,0,0,1)");
  g.addColorStop(.55,"rgba(0,0,0,.85)");
  g.addColorStop(1,"rgba(0,0,0,0)");

  ctx.globalCompositeOperation="destination-out";
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";
}

function drawReveal(){
  ctx.clearRect(0,0,revealCanvas.width,revealCanvas.height);

  // полностью чёрный мир
  ctx.fillStyle="rgba(0,0,0,.92)";
  ctx.fillRect(0,0,revealCanvas.width,revealCanvas.height);

  // открытые сохранённые места
  Object.keys(cells).forEach(key=>{
    const center=cellCenter(key);
    const p=map.latLngToContainerPoint(center);
    revealCircle(p.x,p.y,120);
  });

  // вокруг текущей точки всегда светлее
  if(lat!==null&&lng!==null){
    const p=map.latLngToContainerPoint([lat,lng]);
    revealCircle(p.x,p.y,170);
  }
}

function toggleExplore(){
  exploring=!exploring;
  document.getElementById("exploreBtn").classList.toggle("active",exploring);
  document.getElementById("exploreBtn").innerText=exploring?"Exploring":"Explore";
  document.getElementById("status").innerText=exploring?"Exploring...":"Paused";
}

function centerMe(){
  if(lat===null||lng===null){
    toast("GPS ещё ищет локацию");
    return;
  }
  map.setView([lat,lng],17);
  document.getElementById("status").innerText="Centered";
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function backup(){
  const data={
    xp,
    cells,
    exportedAt:new Date().toISOString()
  };

  const text=JSON.stringify(data,null,2);

  navigator.clipboard.writeText(text)
    .then(()=>toast("Backup copied"))
    .catch(()=>prompt("Copy backup:",text));
}

function resetData(){
  if(prompt("Для удаления напиши DELETE")!=="DELETE"){
    toast("Cancelled");
    return;
  }

  localStorage.removeItem("wg_reveal_xp");
  localStorage.removeItem("wg_reveal_cells");
  location.reload();
}

navigator.geolocation.watchPosition(pos=>{
  lat=pos.coords.latitude;
  lng=pos.coords.longitude;

  drawUser();

  if(firstFix){
    map.setView([lat,lng],17);
    firstFix=false;
  }

  document.getElementById("status").innerText=exploring?"Exploring...":"GPS ready";

  if(exploring){
    const key=cellKey(lat,lng);

    if(!cells[key]){
      cells[key]=true;
      xp+=10;
      toast("+10 XP · карта открыта");
    }
  }

  updateUI();
  drawReveal();

},()=>{
  document.getElementById("status").innerText="GPS error";
  toast("Разреши доступ к геолокации");
},{
  enableHighAccuracy:true,
  maximumAge:0,
  timeout:15000
});

updateUI();
drawReveal();
</script>

</body>
</html>
