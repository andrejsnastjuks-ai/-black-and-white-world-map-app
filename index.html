<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>WanderGlow PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#000;
  font-family:-apple-system, BlinkMacSystemFont;
}

/* MAP */
#map {
  height:100%;
  width:100%;
  filter: grayscale(100%) brightness(0.35);
}

/* LIGHT REVEAL */
.reveal {
  position:absolute;
  pointer-events:none;
  width:300px;
  height:300px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(120,255,200,0.35) 0%, transparent 70%);
  transform:translate(-50%,-50%);
  transition:0.2s;
}

/* USER DOT */
.user-dot {
  width:14px;
  height:14px;
  border-radius:50%;
  background:#78ffc8;
  box-shadow:0 0 12px #78ffc8;
}

.user-pulse {
  width:40px;
  height:40px;
  border-radius:50%;
  background:rgba(120,255,200,0.15);
  position:absolute;
  top:-13px;
  left:-13px;
  animation:pulse 2s infinite;
}

@keyframes pulse {
  0% {transform:scale(0.5);opacity:0.7;}
  100% {transform:scale(2);opacity:0;}
}

/* PANEL */
.panel {
  position:absolute;
  bottom:20px;
  left:10px;
  right:10px;
  padding:16px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(40,40,40,0.65);
  color:white;
}

/* BUTTON */
.btn {
  padding:12px;
  border-radius:14px;
  border:none;
  font-size:16px;
  background:#2f2f2f;
  color:white;
  transition:0.15s;
}

.btn:active {
  transform:scale(0.93);
  background:#444;
}

/* MAIN BUTTON */
.btn-main {
  background:linear-gradient(90deg,#78ffc8,#b6ffd9);
  color:#000;
  font-weight:600;
  box-shadow:0 0 12px rgba(120,255,200,0.5);
}

.row {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.stat {
  flex:1;
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.progress {
  height:6px;
  background:#333;
  border-radius:4px;
  overflow:hidden;
  margin-top:10px;
}

.progress-bar {
  height:100%;
  width:0%;
  background:#78ffc8;
  transition:0.3s;
}

/* TOAST */
.toast {
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(60,60,60,0.9);
  padding:10px 16px;
  border-radius:12px;
  color:white;
  opacity:0;
  transition:0.3s;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="reveal" class="reveal"></div>
<div id="toast" class="toast"></div>

<div class="panel">

  <div style="display:flex;justify-content:space-between;">
    <div>
      <div style="font-size:20px;font-weight:600;">WanderGlow</div>
      <div id="status">Ready</div>
    </div>
    <button class="btn btn-main" onclick="toggleExplore()">Explore</button>
  </div>

  <div class="row">
    <div class="stat"><div id="km">0.00</div><small>KM</small></div>
    <div class="stat"><div id="cells">0</div><small>Cells</small></div>
    <div class="stat"><div id="xp">0</div><small>XP</small></div>
  </div>

  <div class="progress">
    <div id="progress" class="progress-bar"></div>
  </div>

  <div class="row">
    <button class="btn" onclick="stop()">Stop</button>
    <button class="btn btn-main" onclick="place()">Place</button>
    <button class="btn" onclick="center()">📍</button>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([56.95,24.1], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let exploring = false;
let userMarker = null;
let lat = 0;
let lng = 0;

let xp = 0;
let cells = 0;

function toggleExplore(){
  exploring = !exploring;
  document.getElementById("status").innerText = exploring ? "Exploring..." : "Ready";
}

function stop(){
  exploring = false;
  document.getElementById("status").innerText = "Stopped";
}

function center(){
  if(lat) map.setView([lat,lng],17);
}

function place(){
  showToast("📍 Place saved");
}

function showToast(text){
  let t = document.getElementById("toast");
  t.innerText = text;
  t.style.opacity = 1;
  setTimeout(()=>t.style.opacity=0,2000);
}

function updateStats(){
  document.getElementById("cells").innerText = cells;
  document.getElementById("xp").innerText = xp;
  document.getElementById("progress").style.width = (cells%10)*10+"%";
}

navigator.geolocation.watchPosition(pos=>{
  lat = pos.coords.latitude;
  lng = pos.coords.longitude;

  if(!userMarker){
    let icon = L.divIcon({
      className:'',
      html:'<div class="user-dot"><div class="user-pulse"></div></div>',
      iconSize:[20,20]
    });

    userMarker = L.marker([lat,lng],{icon}).addTo(map);
  } else {
    userMarker.setLatLng([lat,lng]);
  }

  map.setView([lat,lng],16);

  let point = map.latLngToContainerPoint([lat,lng]);
  let reveal = document.getElementById("reveal");
  reveal.style.left = point.x+"px";
  reveal.style.top = point.y+"px";

  if(exploring){
    cells++;
    xp += 10;
    updateStats();
    showToast("✨ +10 XP");
  }

});
</script>

</body>
</html>
