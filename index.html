<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>WanderGlow 005 PRO GPS SMART</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#map{height:100%}
.leaflet-tile-pane{filter:brightness(1.09) contrast(1.06) saturate(1.1)}
#fog{position:absolute;inset:0;z-index:500;pointer-events:none}

#accuracyCircle{
  position:absolute;
  border-radius:50%;
  background:rgba(0,255,136,.10);
  border:2px solid rgba(0,255,136,.24);
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:3000;
  display:none;
}

#userDot{
  position:absolute;
  z-index:4000;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#00ff88;
  border:4px solid #fff;
  box-shadow:0 0 0 12px rgba(0,255,136,.22),0 0 34px #00ff88;
  transform:translate(-50%,-50%);
  display:none;
  pointer-events:none;
}

#pulse{
  position:absolute;
  z-index:3900;
  width:80px;
  height:80px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,255,136,.35),transparent 70%);
  transform:translate(-50%,-50%) scale(.4);
  opacity:0;
  pointer-events:none;
}
#pulse.on{animation:pulse .8s ease-out}
@keyframes pulse{
  0%{opacity:.9;transform:translate(-50%,-50%) scale(.4)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(2.2)}
}

.panel,.menu,.toast,.showBtn{
  background:rgba(62,62,62,.76);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  color:white;
  box-shadow:0 18px 45px rgba(0,0,0,.35);
}

.panel{
  position:absolute;
  left:14px;
  right:14px;
  bottom:18px;
  z-index:5000;
  padding:18px;
  border-radius:28px;
}
.panel.hidden{display:none}
.title{font-size:34px;font-weight:900;letter-spacing:-1px}
.status{margin-top:4px;color:rgba(255,255,255,.72);font-size:16px}
.row{display:flex;gap:10px;margin-top:14px}
.stat{flex:1;text-align:center;padding:13px 7px;border-radius:20px;background:rgba(255,255,255,.10)}
.stat b{display:block;font-size:22px}
.stat small{color:rgba(255,255,255,.65)}

button{
  border:0;
  border-radius:18px;
  padding:14px;
  font-weight:900;
  font-size:16px;
  color:white;
  background:rgba(255,255,255,.13);
}
button:active{transform:scale(.94)}
.main{background:linear-gradient(135deg,#00ff88,#baffdd);color:#052215}
.main.active{background:linear-gradient(135deg,#4d96ff,#9bd8ff);color:white}
.pauseBtn.paused,.lockBtn.locked{background:linear-gradient(135deg,#ffcc66,#fff2b0);color:#2c1d00}

.menu{
  display:none;
  position:absolute;
  left:14px;
  right:14px;
  bottom:18px;
  z-index:6000;
  padding:20px;
  border-radius:28px;
  max-height:78vh;
  overflow:auto;
}
.menu.open{display:block}
.modeGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.modeBtn.activeMode{background:linear-gradient(135deg,#00ff88,#baffdd);color:#052215}
.showBtn{
  display:none;
  position:absolute;
  left:50%;
  bottom:24px;
  transform:translateX(-50%);
  z-index:6000;
  padding:14px 22px;
  border-radius:22px;
}
.showBtn.visible{display:block}
.toast{
  position:absolute;
  top:22px;
  left:18px;
  right:18px;
  z-index:7000;
  padding:14px;
  border-radius:18px;
  opacity:0;
  transition:.25s;
  font-weight:800;
}
</style>
</head>

<body>
<div id="map"></div>
<canvas id="fog"></canvas>
<div id="accuracyCircle"></div>
<div id="pulse"></div>
<div id="userDot"></div>
<div id="toast" class="toast"></div>

<button id="showBtn" class="showBtn" onclick="showUI()">Show UI</button>
