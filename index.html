<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>WanderGlow</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#05080a;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

/* карта */
#map{
  position:fixed;
  inset:0;
}

.leaflet-tile-pane{
  filter:grayscale(1) brightness(.28) contrast(.95);
}

/* UI */
.glass{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:28px;
}

.panel{
  position:fixed;
  bottom:16px;
  left:12px;
  right:12px;
  padding:16px;
  z-index:9999;
}

button{
  border:0;
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,.08);
  color:white;
  font-weight:700;
}

button:active{
  transform:scale(.92);
  filter:brightness(1.6);
}

/* кнопки справа */
.capsule{
  position:fixed;
  right:14px;
  top:60px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:9999;
}

.circle{
  width:50px;
  height:50px;
  border-radius:50%;
}

/* точка пользователя */
.user-dot{
  width:30px;
  height:30px;
  border-radius:50%;
  background:#7dffd0;
  border:4px solid white;
  box-shadow:0 0 0 10px rgba(125,255,208,.2),0 0 30px #7dffd0;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 5px rgba(125,255,208,.4),0 0 20px #7dffd0}
  70%{box-shadow:0 0 0 25px rgba(125,255,208,0),0 0 30px #7dffd0}
  100%{box-shadow:0 0 0 5px rgba(125,255,208,0),0 0 20px #7dffd0}
}
</style>
</head>

<body>

<div id="map"></div>

<div class="capsule glass">
  <button class="circle" onclick="centerMe()">📍</button>
  <button class="circle" onclick="start()">▶</button>
  <button class="circle" onclick="stop()">⏸</button>
</div>

<div class="panel glass">
  <div>KM: <b id="km">0</b></div>
  <div>Cells: <b id="cells">0</b></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([56.9496,24.1052],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

let watch=null;
let current=null;
let last=null;
let total=0;
let opened={};
let userMarker=null;

/* рисуем пользователя */
function drawUser(pos){
  const icon=L.divIcon({
    html:'<div class="user-dot"></div>',
    className:'',
    iconSize:[40,40],
    iconAnchor:[20,20]
  });

  if(userMarker){
    userMarker.setLatLng(pos);
  }else{
    userMarker=L.marker(pos,{icon}).addTo(map);
  }
}

/* клетки */
function cellKey(lat,lng){
  return Math.floor(lat*4000)+'_'+Math.floor(lng*4000);
}

function drawCell(key){
  const parts=key.split('_');
  const lat=parts[0]/4000;
  const lng=parts[1]/4000;

  L.rectangle([[lat,lng],[lat+0.00025,lng+0.00025]],{
    color:false,
    fillColor:'#7dffd0',
    fillOpacity:.3
  }).addTo(map);
}

/* старт */
function start(){
  if(!navigator.geolocation){
    alert('Нет GPS');
    return;
  }

  watch=navigator.geolocation.watchPosition(pos=>{
    const p=[pos.coords.latitude,pos.coords.longitude];
    current=p;

    drawUser(p);

    map.setView(p,17);

    if(last){
      const d=map.distance(last,p);
      if(d<1000) total+=d;
    }

    last=p;

    const key=cellKey(p[0],p[1]);

    if(!opened[key]){
      opened[key]=true;
      drawCell(key);
    }

    km.innerText=(total/1000).toFixed(2);
    cells.innerText=Object.keys(opened).length;

  },err=>{
    alert(err.message);
  },{
    enableHighAccuracy:true
  });
}

/* стоп */
function stop(){
  if(watch){
    navigator.geolocation.clearWatch(watch);
    watch=null;
  }
}

/* центр */
function centerMe(){
  if(current){
    map.setView(current,17);
  }else{
    navigator.geolocation.getCurrentPosition(pos=>{
      const p=[pos.coords.latitude,pos.coords.longitude];
      current=p;
      drawUser(p);
      map.setView(p,17);
    });
  }
}
</script>

</body>
</html>
