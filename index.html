<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>WanderGlow 005 Final Clean</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#map{height:100%}
.leaflet-tile-pane{filter:brightness(1.06) contrast(1.05) saturate(1.08)}
#fog{position:absolute;inset:0;z-index:500;pointer-events:none}
#userDot{position:absolute;z-index:4000;width:18px;height:18px;border-radius:50%;background:#00ff88;border:4px solid #fff;box-shadow:0 0 0 12px rgba(0,255,136,.22),0 0 30px #00ff88;transform:translate(-50%,-50%);display:none;pointer-events:none}
.panel,.menu,.toast,.showBtn{background:rgba(62,62,62,.76);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);color:white;box-shadow:0 18px 45px rgba(0,0,0,.35)}
.panel{position:absolute;left:14px;right:14px;bottom:18px;z-index:5000;padding:18px;border-radius:28px}
.panel.hidden{display:none}
.title{font-size:34px;font-weight:900;letter-spacing:-1px}
.status{margin-top:4px;color:rgba(255,255,255,.72);font-size:16px}
.row{display:flex;gap:10px;margin-top:14px}
.stat{flex:1;text-align:center;padding:13px 7px;border-radius:20px;background:rgba(255,255,255,.10)}
.stat b{display:block;font-size:22px}
.stat small{color:rgba(255,255,255,.65)}
button{border:0;border-radius:18px;padding:14px;font-weight:900;font-size:16px;color:white;background:rgba(255,255,255,.13)}
button:active{transform:scale(.94)}
.main{background:linear-gradient(135deg,#00ff88,#baffdd);color:#052215}
.main.active{background:linear-gradient(135deg,#4d96ff,#9bd8ff);color:white}
.pauseBtn.paused{background:linear-gradient(135deg,#ffcc66,#fff2b0);color:#2c1d00}
.menu{display:none;position:absolute;left:14px;right:14px;bottom:18px;z-index:6000;padding:20px;border-radius:28px;max-height:78vh;overflow:auto}
.menu.open{display:block}
.modeGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.modeBtn.activeMode{background:linear-gradient(135deg,#00ff88,#baffdd);color:#052215}
.showBtn{display:none;position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:6000;padding:14px 22px;border-radius:22px}
.showBtn.visible{display:block}
.toast{position:absolute;top:22px;left:18px;right:18px;z-index:7000;padding:14px;border-radius:18px;opacity:0;transition:.25s;font-weight:800}
</style>
</head>

<body>
<div id="map"></div>
<canvas id="fog"></canvas>
<div id="userDot"></div>
<div id="toast" class="toast"></div>

<button id="showBtn" class="showBtn" onclick="showUI()">Show UI</button>

<div id="menu" class="menu">
  <button onclick="centerMe()" style="width:100%">📍 My location</button>

  <div style="margin-top:16px;font-weight:900;font-size:18px">Travel mode</div>
  <div class="modeGrid">
    <button id="modeWalk" class="modeBtn" onclick="setMode('walk')">🚶 Walk</button>
    <button id="modeCar" class="modeBtn" onclick="setMode('car')">🚗 Car</button>
    <button id="modeTrain" class="modeBtn" onclick="setMode('train')">🚆 Train</button>
    <button id="modePlane" class="modeBtn" onclick="setMode('plane')">✈️ Plane</button>
  </div>

  <button onclick="toggleRoute()" style="width:100%;margin-top:10px">🗺 Route on/off</button>
  <button onclick="clearRoute()" style="width:100%;margin-top:10px">Clear route only</button>
  <button onclick="hideUI()" style="width:100%;margin-top:10px">Hide UI</button>
  <button onclick="backup()" style="width:100%;margin-top:10px">Backup</button>
  <button onclick="importData()" style="width:100%;margin-top:10px">Import</button>
  <button onclick="resetData()" style="width:100%;margin-top:10px;background:#9e2f2f">Reset all data</button>
  <button onclick="toggleMenu()" style="width:100%;margin-top:10px">Close</button>
</div>

<div id="panel" class="panel">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
    <div>
      <div class="title">WanderGlow</div>
      <div id="status" class="status">Waiting for GPS...</div>
    </div>
    <button id="exploreBtn" class="main" onclick="toggleExplore()">Explore</button>
  </div>

  <div class="row">
    <div class="stat"><b id="walkedView">0 m</b><small>Walked</small></div>
    <div class="stat"><b id="exploredView">0 m</b><small>Explored</small></div>
    <div class="stat"><b id="areasView">0</b><small>Areas</small></div>
  </div>

  <div class="row">
    <div class="stat"><b id="countryView">Unknown</b><small>Country</small></div>
    <div class="stat"><b id="modeView">🚶 Walk</b><small>Mode</small></div>
    <div class="stat"><b id="gpsView">GPS</b><small>Signal</small></div>
  </div>

  <div class="row">
    <button style="flex:1" onclick="centerMe()">📍</button>
    <button id="pauseBtn" class="pauseBtn" style="flex:1" onclick="togglePause()">Pause</button>
    <button style="flex:1" onclick="toggleMenu()">Menu</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const KEY="wg_005_clean_";

const map=L.map("map",{zoomControl:true}).setView([56.95,24.1],15);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19,
  attribution:"© OpenStreetMap"
}).addTo(map);

let lat=null,lng=null,accuracy=null;
let exploring=false,paused=false,firstFix=true,routeVisible=true;
let lastAccepted=null,fogQueued=false;
let lastSave=0;

let walked=Number(localStorage[KEY+"walked"]||0);
let explored=Number(localStorage[KEY+"explored"]||0);
let visited=JSON.parse(localStorage[KEY+"visited"]||"{}");
let routePath=JSON.parse(localStorage[KEY+"routePath"]||"[]").slice(-1200);
let mode=localStorage[KEY+"mode"]||"walk";

const fog=document.getElementById("fog");
const ctx=fog.getContext("2d");

const routeLine=L.polyline(routePath,{
  color:"#00ff88",
  weight:4,
  opacity:.72,
  smoothFactor:1.5
}).addTo(map);

const modes={
  walk:{label:"Walk",icon:"🚶",radius:25,step:25,keyScale:4000,maxAccuracy:30,minDistance:6,maxJump:35,maxSpeed:8},
  car:{label:"Car",icon:"🚗",radius:80,step:80,keyScale:1500,maxAccuracy:70,minDistance:12,maxJump:350,maxSpeed:160},
  train:{label:"Train",icon:"🚆",radius:130,step:130,keyScale:1000,maxAccuracy:100,minDistance:18,maxJump:700,maxSpeed:320},
  plane:{label:"Plane",icon:"✈️",radius:800,step:800,keyScale:220,maxAccuracy:600,minDistance:80,maxJump:30000,maxSpeed:1000}
};

function currentMode(){return modes[mode]||modes.walk}

function resizeFog(){
  fog.width=window.innerWidth;
  fog.height=window.innerHeight;
  requestFogDraw();
  updateUserDot();
}

window.addEventListener("resize",resizeFog);
map.on("move zoom",()=>{requestFogDraw();updateUserDot()});
resizeFog();

function requestFogDraw(){
  if(fogQueued)return;
  fogQueued=true;
  requestAnimationFrame(()=>{
    fogQueued=false;
    drawFog();
  });
}

function formatMeters(m){
  return m>=1000?(m/1000).toFixed(2)+" km":Math.round(m)+" m";
}

function getCountry(a,b){
  if(a>=55.6&&a<=58.1&&b>=20.8&&b<=28.3)return "Latvia";
  if(a>=54.8&&a<=56.5&&b>=20.9&&b<=26.9)return "Lithuania";
  if(a>=57.4&&a<=59.8&&b>=21.5&&b<=28.3)return "Estonia";
  return "Unknown";
}

function keyFor(a,b){
  const s=currentMode().keyScale;
  return mode+"_"+Math.floor(a*s)+"_"+Math.floor(b*s);
}

function keyCenter(key){
  const parts=key.split("_");
  const keyMode=parts[0];
  const s=(modes[keyMode]||modes.walk).keyScale;
  return [(Number(parts[1])+0.5)/s,(Number(parts[2])+0.5)/s];
}

function metersToPixels(m,latitude){
  const zoom=map.getZoom();
  const metersPerPixel=40075016.686*Math.cos(latitude*Math.PI/180)/Math.pow(2,zoom+8);
  return Math.max(4,m/metersPerPixel);
}

function gpsQuality(){
  if(accuracy===null)return "Search";
  if(accuracy<=20)return "Good";
  if(accuracy<=40)return "Weak";
  return "Bad";
}

function pruneVisited(){
  const keys=Object.keys(visited);
  if(keys.length<=3000)return;
  const remove=keys.slice(0,keys.length-3000);
  remove.forEach(k=>delete visited[k]);
}

function save(force=false){
  const now=Date.now();
  if(!force && now-lastSave<1800)return;
  lastSave=now;

  pruneVisited();

  localStorage[KEY+"walked"]=walked;
  localStorage[KEY+"explored"]=explored;
  localStorage[KEY+"visited"]=JSON.stringify(visited);
  localStorage[KEY+"routePath"]=JSON.stringify(routePath.slice(-1200));
  localStorage[KEY+"mode"]=mode;
}

function updateUI(){
  document.getElementById("walkedView").innerText=formatMeters(walked);
  document.getElementById("exploredView").innerText=formatMeters(explored);
  document.getElementById("areasView").innerText=Object.keys(visited).length;
  document.getElementById("countryView").innerText=lat!==null?getCountry(lat,lng):"Unknown";
  document.getElementById("modeView").innerText=currentMode().icon+" "+currentMode().label;
  document.getElementById("gpsView").innerText=gpsQuality();

  document.querySelectorAll(".modeBtn").forEach(btn=>btn.classList.remove("activeMode"));
  const active=document.getElementById("mode"+currentMode().label);
  if(active)active.classList.add("activeMode");

  document.getElementById("pauseBtn").innerText=paused?"Resume":"Pause";
  document.getElementById("pauseBtn").classList.toggle("paused",paused);

  save(false);
}

function toast(text){
  const el=document.getElementById("toast");
  el.innerText=text;
  el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,2200);
}

function updateUserDot(){
  if(lat===null||lng===null)return;
  const p=map.latLngToContainerPoint([lat,lng]);
  const dot=document.getElementById("userDot");
  dot.style.left=p.x+"px";
  dot.style.top=p.y+"px";
  dot.style.display="block";
}

function eraseCircle(x,y,r){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,"rgba(0,0,0,1)");
  g.addColorStop(.45,"rgba(0,0,0,.92)");
  g.addColorStop(.78,"rgba(0,0,0,.42)");
  g.addColorStop(1,"rgba(0,0,0,0)");

  ctx.globalCompositeOperation="destination-out";
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";
}

function drawFog(){
  ctx.clearRect(0,0,fog.width,fog.height);
  ctx.fillStyle="rgba(0,0,0,.84)";
  ctx.fillRect(0,0,fog.width,fog.height);

  const w=fog.width;
  const h=fog.height;

  Object.keys(visited).forEach(key=>{
    const center=keyCenter(key);
    const keyMode=key.split("_")[0];
    const radius=(modes[keyMode]||modes.walk).radius;
    const p=map.latLngToContainerPoint(center);

    if(p.x<-120||p.y<-120||p.x>w+120||p.y>h+120)return;

    eraseCircle(p.x,p.y,metersToPixels(radius,center[0]));
  });

  if(lat!==null&&lng!==null){
    const p=map.latLngToContainerPoint([lat,lng]);
    eraseCircle(p.x,p.y,metersToPixels(currentMode().radius*1.25,lat));
  }
}

function shouldAcceptMovement(distance,seconds,acc){
  const m=currentMode();

  if(paused)return false;
  if(acc!==null&&acc>m.maxAccuracy)return false;
  if(distance<m.minDistance)return false;
  if(distance>m.maxJump)return false;

  if(seconds&&seconds>0){
    const speedKmh=(distance/seconds)*3.6;
    if(speedKmh>m.maxSpeed)return false;
  }

  return true;
}

function setMode(newMode){
  mode=newMode;
  lastAccepted=null;
  toast("Mode: "+currentMode().label);
  updateUI();
  requestFogDraw();
  save(true);
}

function toggleExplore(){
  exploring=!exploring;
  const btn=document.getElementById("exploreBtn");
  btn.classList.toggle("active",exploring);
  btn.innerText=exploring?"Exploring":"Explore";
  document.getElementById("status").innerText=exploring?"Exploring...":"Paused";
  updateUI();
}

function togglePause(){
  paused=!paused;
  lastAccepted=null;
  document.getElementById("status").innerText=paused?"Tracking paused":(exploring?"Exploring...":"GPS ready");
  updateUI();
}

function centerMe(){
  if(lat===null||lng===null){
    toast("GPS is still searching...");
    return;
  }
  map.setView([lat,lng],17);
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function hideUI(){
  document.getElementById("panel").classList.add("hidden");
  document.getElementById("menu").classList.remove("open");
  document.getElementById("showBtn").classList.add("visible");
}

function showUI(){
  document.getElementById("panel").classList.remove("hidden");
  document.getElementById("showBtn").classList.remove("visible");
}

function toggleRoute(){
  routeVisible=!routeVisible;
  if(routeVisible){
    map.addLayer(routeLine);
    toast("Route shown");
  }else{
    map.removeLayer(routeLine);
    toast("Route hidden");
  }
}

function clearRoute(){
  if(!confirm("Clear route only? Opened map will stay."))return;
  routePath=[];
  routeLine.setLatLngs([]);
  save(true);
  toast("Route cleared");
}

function backup(){
  const data={
    walked,
    explored,
    visited,
    routePath,
    mode,
    exportedAt:new Date().toISOString()
  };

  const text=JSON.stringify(data,null,2);

  navigator.clipboard.writeText(text)
    .then(()=>toast("Backup copied"))
    .catch(()=>prompt("Copy backup:",text));
}

function importData(){
  const text=prompt("Paste backup JSON");
  if(!text)return;

  try{
    const data=JSON.parse(text);

    walked=Number(data.walked||0);
    explored=Number(data.explored||0);
    visited=data.visited||{};
    routePath=(data.routePath||[]).slice(-1200);
    mode=data.mode||"walk";

    routeLine.setLatLngs(routePath);
    updateUI();
    requestFogDraw();
    save(true);

    toast("Import complete");
  }catch(e){
    toast("Import error");
  }
}

function resetData(){
  if(prompt("Type DELETE to reset all data")!=="DELETE"){
    toast("Cancelled");
    return;
  }

  Object.keys(localStorage).forEach(k=>{
    if(k.startsWith(KEY))localStorage.removeItem(k);
  });

  location.reload();
}

navigator.geolocation.watchPosition(pos=>{
  const rawLat=pos.coords.latitude;
  const rawLng=pos.coords.longitude;
  const acc=pos.coords.accuracy||null;
  const now=Date.now();

  accuracy=acc;

  if(lat===null||lng===null){
    lat=rawLat;
    lng=rawLng;
  }else{
    lat=lat*0.65+rawLat*0.35;
    lng=lng*0.65+rawLng*0.35;
  }

  updateUserDot();

  if(firstFix){
    map.setView([lat,lng],17);
    firstFix=false;
  }

  let accepted=false;

  if(lastAccepted){
    const distance=map.distance([lastAccepted.lat,lastAccepted.lng],[lat,lng]);
    const seconds=(now-lastAccepted.time)/1000;

    if(shouldAcceptMovement(distance,seconds,acc)){
      walked+=distance;
      accepted=true;

      routePath.push([lat,lng]);
      if(routePath.length>1200)routePath.shift();
      routeLine.setLatLngs(routePath);

      lastAccepted={lat,lng,time:now};
    }
  }else{
    lastAccepted={lat,lng,time:now};
    routePath.push([lat,lng]);
    routeLine.setLatLngs(routePath);
  }

  if(paused){
    document.getElementById("status").innerText="Tracking paused";
  }else if(exploring){
    document.getElementById("status").innerText=accepted?"Exploring...":"Exploring · GPS filtering";
  }else{
    document.getElementById("status").innerText="GPS ready";
  }

  if(exploring&&!paused&&gpsQuality()!=="Bad"){
    const key=keyFor(lat,lng);

    if(!visited[key]){
      visited[key]=true;
      explored+=currentMode().step;
      toast("New area explored · "+currentMode().label);
    }
  }

  updateUI();
  requestFogDraw();
  updateUserDot();

},()=>{
  document.getElementById("status").innerText="GPS error";
  toast("Please allow location access");
},{
  enableHighAccuracy:true,
  maximumAge:0,
  timeout:15000
});

updateUI();
requestFogDraw();
routeLine.setLatLngs(routePath);
</script>
</body>
</html>
