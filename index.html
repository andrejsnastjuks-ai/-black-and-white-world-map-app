<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WanderGlow Travel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

#map{
  height:100%;
}

.leaflet-tile-pane{
  filter:brightness(1.05) contrast(1.05) saturate(1.08);
}

/* ВЕРХНИЙ СЛОЙ, КОТОРЫЙ СТИРАЕТСЯ */
#fog{
  position:absolute;
  inset:0;
  z-index:500;
  pointer-events:none;
}

/* ЗЕЛЁНАЯ ТОЧКА */
.userDot{
  width:18px;
  height:18px;
  border-radius:50%;
  background:#00ff88;
  border:4px solid white;
  box-shadow:0 0 0 12px rgba(0,255,136,.22),0 0 30px #00ff88;
}

.panel,.menu,.toast,.showBtn{
  background:rgba(70,70,70,.72);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  color:white;
  box-shadow:0 18px 45px rgba(0,0,0,.35);
}

.panel{
  position:absolute;
  left:14px;
  right:14px;
  bottom:18px;
  z-index:9999;
  padding:18px;
  border-radius:28px;
}

.panel.hidden{display:none}

.title{
  font-size:32px;
  font-weight:900;
}

.status{
  margin-top:4px;
  color:rgba(255,255,255,.72);
  font-size:16px;
}

.row{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.stat{
  flex:1;
  text-align:center;
  padding:14px 8px;
  border-radius:20px;
  background:rgba(255,255,255,.10);
}

.stat b{font-size:26px}
.stat small{color:rgba(255,255,255,.65)}

button{
  border:0;
  border-radius:18px;
  padding:14px;
  font-weight:900;
  font-size:16px;
  color:white;
  background:rgba(255,255,255,.12);
}

button:active{transform:scale(.94)}

.main{
  background:linear-gradient(135deg,#00ff88,#baffdd);
  color:#052215;
}

.main.active{
  background:linear-gradient(135deg,#4d96ff,#9bd8ff);
  color:white;
}

.menu{
  display:none;
  position:absolute;
  left:14px;
  right:14px;
  bottom:18px;
  z-index:10000;
  padding:20px;
  border-radius:28px;
}

.menu.open{display:block}

.showBtn{
  display:none;
  position:absolute;
  left:50%;
  bottom:24px;
  transform:translateX(-50%);
  z-index:10001;
  padding:14px 22px;
  border-radius:22px;
}

.showBtn.visible{display:block}

.toast{
  position:absolute;
  top:22px;
  left:18px;
  right:18px;
  z-index:12000;
  padding:14px;
  border-radius:18px;
  opacity:0;
  transition:.25s;
  font-weight:800;
}
</style>
</head>

<body>

<div id="map"></div>
<canvas id="fog"></canvas>
<div id="toast" class="toast"></div>

<button id="showBtn" class="showBtn" onclick="showUI()">Show UI</button>

<div id="menu" class="menu">
  <button onclick="centerMe()" style="width:100%">📍 My location</button>
  <button onclick="hideUI()" style="width:100%;margin-top:10px">Hide UI</button>
  <button onclick="backup()" style="width:100%;margin-top:10px">Backup</button>
  <button onclick="resetData()" style="width:100%;margin-top:10px;background:#9e2f2f">Reset</button>
  <button onclick="toggleMenu()" style="width:100%;margin-top:10px">Close</button>
</div>

<div id="panel" class="panel">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
    <div>
      <div class="title">WanderGlow</div>
      <div id="status" class="status">Waiting for GPS...</div>
    </div>
    <button id="exploreBtn" class="main" onclick="toggleExplore()">Explore</button>
  </div>

  <div class="row">
    <div class="stat"><b id="kmView">0.00</b><br><small>KM</small></div>
    <div class="stat"><b id="cellsView">0</b><br><small>Places</small></div>
    <div class="stat"><b id="xpView">0</b><br><small>XP</small></div>
  </div>

  <div class="row">
    <button style="flex:1" onclick="centerMe()">📍</button>
    <button style="flex:1" onclick="toggleMenu()">Menu</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map=L.map("map").setView([56.95,24.1],15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19,
  attribution:"© OpenStreetMap"
}).addTo(map);

let lat=null,lng=null;
let marker=null;
let exploring=false;
let firstFix=true;
let lastPoint=null;

let xp=Number(localStorage.wg_travel_xp||0);
let total=Number(localStorage.wg_travel_total||0);
let visited=JSON.parse(localStorage.wg_travel_visited||"{}");

const fog=document.getElementById("fog");
const ctx=fog.getContext("2d");

function resizeFog(){
  fog.width=window.innerWidth;
  fog.height=window.innerHeight;
  drawFog();
}

window.addEventListener("resize",resizeFog);
map.on("move zoom",drawFog);
resizeFog();

function keyFor(a,b){
  return Math.floor(a*4000)+"_"+Math.floor(b*4000);
}

function keyCenter(key){
  const p=key.split("_");
  return [
    (Number(p[0])+0.5)/4000,
    (Number(p[1])+0.5)/4000
  ];
}

function metersToPixels(m, latitude){
  const zoom=map.getZoom();
  const metersPerPixel=40075016.686*Math.cos(latitude*Math.PI/180)/Math.pow(2,zoom+8);
  return m/metersPerPixel;
}

function save(){
  localStorage.wg_travel_xp=xp;
  localStorage.wg_travel_total=total;
  localStorage.wg_travel_visited=JSON.stringify(visited);
}

function updateUI(){
  document.getElementById("xpView").innerText=xp;
  document.getElementById("cellsView").innerText=Object.keys(visited).length;
  document.getElementById("kmView").innerText=(total/1000).toFixed(2);
  save();
}

function toast(text){
  const el=document.getElementById("toast");
  el.innerText=text;
  el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,2000);
}

function drawUser(){
  const icon=L.divIcon({
    html:'<div class="userDot"></div>',
    className:'',
    iconSize:[34,34],
    iconAnchor:[17,17]
  });

  if(!marker){
    marker=L.marker([lat,lng],{
      icon,
      zIndexOffset:10000
    }).addTo(map);
  }else{
    marker.setLatLng([lat,lng]);
  }
}

/* СТИРАЕМ ВЕРХНИЙ СЛОЙ */
function eraseCircle(x,y,r){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,"rgba(0,0,0,1)");
  g.addColorStop(.55,"rgba(0,0,0,.8)");
  g.addColorStop(1,"rgba(0,0,0,0)");

  ctx.globalCompositeOperation="destination-out";
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation="source-over";
}

function drawFog(){
  ctx.clearRect(0,0,fog.width,fog.height);

  /* Верхний слой: неизведанная карта */
  ctx.fillStyle="rgba(0,0,0,.88)";
  ctx.fillRect(0,0,fog.width,fog.height);

  /* Сохранённые открытые места */
  Object.keys(visited).forEach(key=>{
    const c=keyCenter(key);
    const p=map.latLngToContainerPoint(c);
    eraseCircle(p.x,p.y,metersToPixels(28,c[0]));
  });

  /* Текущий обзор путешественника */
  if(lat!==null&&lng!==null){
    const p=map.latLngToContainerPoint([lat,lng]);
    eraseCircle(p.x,p.y,metersToPixels(35,lat));
  }
}

function toggleExplore(){
  exploring=!exploring;
  document.getElementById("exploreBtn").classList.toggle("active",exploring);
  document.getElementById("exploreBtn").innerText=exploring?"Exploring":"Explore";
  document.getElementById("status").innerText=exploring?"Exploring...":"Paused";
}

function centerMe(){
  if(lat===null||lng===null){
    toast("GPS ещё ищет локацию");
    return;
  }
  map.setView([lat,lng],17);
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function hideUI(){
  document.getElementById("panel").classList.add("hidden");
  document.getElementById("menu").classList.remove("open");
  document.getElementById("showBtn").classList.add("visible");
}

function showUI(){
  document.getElementById("panel").classList.remove("hidden");
  document.getElementById("showBtn").classList.remove("visible");
}

function backup(){
  const data={
    xp,
    total,
    visited,
    exportedAt:new Date().toISOString()
  };

  const text=JSON.stringify(data,null,2);

  navigator.clipboard.writeText(text)
    .then(()=>toast("Backup copied"))
    .catch(()=>prompt("Copy backup:",text));
}

function resetData(){
  if(prompt("Для удаления напиши DELETE")!=="DELETE"){
    toast("Cancelled");
    return;
  }

  localStorage.removeItem("wg_travel_xp");
  localStorage.removeItem("wg_travel_total");
  localStorage.removeItem("wg_travel_visited");
  location.reload();
}

navigator.geolocation.watchPosition(pos=>{
  lat=pos.coords.latitude;
  lng=pos.coords.longitude;

  drawUser();

  if(lastPoint){
    const d=map.distance(lastPoint,[lat,lng]);
    if(d>2&&d<1000){
      total+=d;
    }
  }

  lastPoint=[lat,lng];

  if(firstFix){
    map.setView([lat,lng],17);
    firstFix=false;
  }

  document.getElementById("status").innerText=exploring?"Exploring...":"GPS ready";

  if(exploring){
    const key=keyFor(lat,lng);

    if(!visited[key]){
      visited[key]=true;
      xp+=10;
      toast("+10 XP · new place discovered");
    }
  }

  updateUI();
  drawFog();

},()=>{
  document.getElementById("status").innerText="GPS error";
  toast("Разреши доступ к геолокации");
},{
  enableHighAccuracy:true,
  maximumAge:0,
  timeout:15000
});

updateUI();
drawFog();
</script>

</body>
</html>
